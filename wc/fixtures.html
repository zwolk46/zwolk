<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Fixtures · World Cup 26</title>
<link rel="icon" type="image/svg+xml" href="/wc/assets/emblem.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem("wc-theme");if(t!=="light"&&t!=="dark")t=(window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
<link rel="stylesheet" href="/wc/lib/shell.css" data-wc-shell-css>
<link rel="modulepreload" href="/wc/lib/shell.js">
<style id="shell-css"></style>
<style>
  main{position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:18px 28px 120px}
  /* The page title + emblem now live permanently in the nav bar (top-left), so
     there's no big hero band here anymore — the stats row leads the page. */
  header.hero{padding:20px 28px 4px;max-width:1240px;margin:0 auto;position:relative;z-index:1}

  /* Hero stat tiles — uses the shared .wc-stats / .wc-stat pattern; 4-up on
     desktop, 2×2 on mobile (replacing the old never-collapsing 4-up grid). */
  .stats{grid-template-columns:repeat(4,1fr)}

  /* ── Day selector (sticky strip under the nav) ───────────────────────────
     Replaces the old long vertical stack of every match day. Sits flush
     beneath the nav, scrolls horizontally, and snaps each day centered. */
  /* Fully opaque surface so the collapsing hero logo / watermark can't bleed
     through the gaps between day cells (was a translucent color-mix + blur). */
  .daystrip-bar{position:sticky;top:var(--nav-h,64px);z-index:30;
    margin:0 -28px;padding:12px 0 12px;
    background:var(--bg);
    border-bottom:1px solid var(--border-subtle)}
  .daystrip-inner{display:flex;align-items:center;gap:10px;padding:0 28px}
  .daystrip-nav{flex:none;display:inline-flex;align-items:center;justify-content:center;
    width:38px;height:48px;border-radius:var(--r-md);border:1px solid var(--border);
    background:var(--surface-1);color:var(--text-2);cursor:pointer;
    transition:border-color var(--dur-2),color var(--dur-2),background var(--dur-2)}
  .daystrip-nav:hover{border-color:var(--accent-line);color:var(--text)}
  .daystrip-nav:active{transform:scale(.94)}
  .daystrip-nav .wc-ic{width:18px;height:18px}
  /* the strip itself reuses the shared .wc-daystrip / .wc-day classes */
  .wc-daystrip{flex:1;padding:2px}
  .wc-day{min-width:78px}
  .wc-day:active{transform:scale(.96)}
  .wc-day .dct{display:flex;align-items:center;justify-content:center;gap:4px}
  /* TODAY marker dot — always rendered for today (selected or not). Green when
     unselected; recolored to --on-accent by the shell's .wc-day.today.on rule
     so it stays legible on the gold selected fill. */
  .wc-day.today .ringdot{width:5px;height:5px;border-radius:50%;
    background:var(--success);display:inline-block}
  .wc-day:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* ── Status filter (within the selected day) ─────────────────────────────
     A sliders-horizontal toggle reveals the reused status filter chips. */
  .filter-anchor{display:flex;align-items:center;gap:0;margin:20px 0 6px}
  .filter-toggle{flex:none}
  .filter-toggle .wc-ic{width:15px;height:15px}
  .filter-toggle .toggle-arrow{display:inline-flex;align-items:center;
    margin-left:1px;transition:transform .3s var(--ease-spring)}
  .filter-toggle .toggle-arrow .wc-ic{display:block}
  .filter-anchor.expanded .filter-toggle .toggle-arrow{transform:rotate(180deg)}

  #filter-chips{display:flex;gap:8px;align-items:center;max-width:0;overflow:hidden;opacity:0;
    transition:max-width .28s ease-in,opacity .18s ease-in}
  .filter-anchor.expanded #filter-chips{max-width:2200px;opacity:1;padding-left:10px;
    overflow-x:auto;scrollbar-width:none;
    transition:max-width .55s cubic-bezier(.34,1.1,.64,1),opacity .28s ease}
  .filter-anchor.expanded #filter-chips::-webkit-scrollbar{display:none}

  @keyframes chip-spring-in{
    0%{transform:scale(.45);opacity:0}
    65%{transform:scale(1.1)}
    100%{transform:scale(1);opacity:1}
  }
  .filter-anchor.expanded #filter-chips .wc-chip{animation:chip-spring-in .38s cubic-bezier(.34,1.56,.64,1) both}
  .filter-anchor.expanded #filter-chips .wc-chip:nth-child(1){animation-delay:0ms}
  .filter-anchor.expanded #filter-chips .wc-chip:nth-child(2){animation-delay:38ms}
  .filter-anchor.expanded #filter-chips .wc-chip:nth-child(3){animation-delay:76ms}
  .filter-anchor.expanded #filter-chips .wc-chip:nth-child(4){animation-delay:114ms}
  .filter-anchor.expanded #filter-chips .wc-chip:nth-child(5){animation-delay:152ms}
  .filter-anchor.expanded #filter-chips .wc-chip:nth-child(6){animation-delay:190ms}
  .filter-anchor.expanded #filter-chips .wc-chip:nth-child(7){animation-delay:228ms}
  .filter-anchor.expanded #filter-chips .wc-chip:nth-child(8){animation-delay:266ms}
  .filter-anchor.expanded #filter-chips .wc-chip:nth-child(9){animation-delay:304ms}
  .filter-anchor.expanded #filter-chips .wc-chip:nth-child(10){animation-delay:342ms}
  .wc-chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* ── Selected-day header ── */
  .day-head{display:flex;align-items:baseline;gap:14px;padding:6px 0 4px;flex-wrap:wrap}
  .day-head .date{font-family:var(--f-display);font-size:clamp(26px,4vw,40px);color:var(--text);text-transform:uppercase}
  .day-head .count{font-family:var(--f-body);font-weight:700;font-size:13px;color:var(--text-3)}
  .day-head .today-pill{font-family:var(--f-body);font-weight:900;font-size:11px;letter-spacing:0.14em;color:var(--on-accent);background:var(--success);border-radius:var(--r-pill);padding:4px 11px;animation:wc-pulse 2.4s ease-in-out infinite}

  /* ── Match row: fixed 5-column grid ──────────────────────────────────────
     time | home (right-anchored) | score-or-VS (centered) | away (left) | meta */
  .card{display:grid;grid-template-columns:64px 1fr 96px 1fr 188px;align-items:center;gap:14px;
    padding:14px 20px;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r-lg);
    text-decoration:none;color:inherit;cursor:pointer;box-shadow:var(--sh-1);
    transition:transform var(--dur-2) var(--ease-press),border-color var(--dur-2),box-shadow var(--dur-2),background var(--dur-2)}
  .card:hover{transform:translateY(-3px);border-color:var(--accent-line);box-shadow:var(--sh-3)}
  .card:active{transform:scale(.99)}
  .card:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .card.finished{background:var(--surface-sunken)}
  .card.finished .team-code,.card.finished .score{color:var(--text-2)}
  .card.finished:hover{border-color:var(--accent-line)}

  .time-col{display:flex;flex-direction:column;gap:2px;min-width:0}
  .time-num{font-family:var(--f-display);font-size:22px;color:var(--text);line-height:.95;white-space:nowrap}
  .time-num.live{color:var(--live)}
  .time-ampm{font-family:var(--f-body);font-weight:800;font-size:10px;letter-spacing:0.1em;color:var(--text-3)}

  .side{display:flex;align-items:center;gap:12px;min-width:0}
  .side-r{justify-content:flex-end;text-align:right}
  .side-l{justify-content:flex-start}
  .team-link{display:flex;align-items:center;gap:12px;cursor:pointer;color:inherit;text-decoration:none;min-width:0;
    transition:transform var(--dur-2) var(--ease-press),filter var(--dur-2)}
  .team-link.r{transform-origin:right center}
  .team-link.l{transform-origin:left center}
  .team-link:hover{transform:scale(1.04);filter:drop-shadow(0 0 10px var(--accent-line))}
  .team-text{min-width:0}
  .team-text.r{text-align:right}
  .team-text.l{text-align:left}
  .team-code{font-family:var(--f-display);color:var(--text);line-height:.95;letter-spacing:0.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:clamp(28px,4.2vw,44px)}
  .team-code.ko{font-family:var(--f-body);font-weight:800;text-transform:uppercase;
    font-size:clamp(14px,1.9vw,18px);color:var(--text-2);letter-spacing:0.03em;white-space:normal}
  .team-name{font-family:var(--f-body);font-weight:600;font-size:12px;color:var(--text-3);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .wc-flag{width:42px;height:30px;border-radius:5px;background-size:cover;background-position:center;
    box-shadow:0 0 0 1px rgba(0,0,0,.18)}
  .wc-flag.tbd{width:42px;height:30px;font-size:14px}

  .mid{text-align:center;min-width:0}
  .score{font-family:var(--f-mono);font-weight:800;font-size:30px;color:var(--text);line-height:1;
    letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .score.live{color:var(--live)}
  .vs{font-family:var(--f-display);font-size:15px;color:var(--accent-text)}

  .meta-col{justify-self:end;display:flex;flex-direction:column;align-items:flex-end;gap:6px;text-align:right;min-width:0}
  .venue{font-family:var(--f-body);font-weight:600;font-size:12px;color:var(--text-2);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

  .loading{padding:60px 20px;text-align:center;font-family:var(--f-body);font-weight:700;font-size:13px;color:var(--text-3)}
  .loading::before{content:'';display:inline-block;width:14px;height:14px;border:2px solid var(--border-strong);
    border-top-color:var(--accent);border-radius:50%;animation:wc-spin .9s linear infinite;
    vertical-align:middle;margin-right:10px}
  .error{padding:30px 20px;text-align:center;font-family:var(--f-body);font-weight:600;font-size:13px;
    color:var(--danger-text);background:var(--danger-quiet);border:1px solid var(--danger);
    border-radius:var(--r-md);max-width:580px;margin:30px auto}

  .day-list{display:flex;flex-direction:column;gap:12px;margin-top:8px}

  .footer-note{margin-top:64px;text-align:center;font-family:var(--f-body);font-weight:600;font-size:12px;color:var(--text-3);letter-spacing:0.05em}

  @media (max-width:760px){
    main{padding:14px 16px 120px}
    header.hero{padding:14px 16px 4px}
    .daystrip-bar{margin:0 -16px}
    .daystrip-inner{padding:0 16px}
    /* On phones, drop the prev/next arrows — the strip is swipeable. */
    .daystrip-nav{display:none}
    .wc-day{min-width:58px;padding:8px 10px}
    .wc-day .dnum{font-size:21px}
  }
  @media (max-width:760px){
    /* 2×2 stat grid on tablet/phone (was a never-collapsing 4-up). The desktop
       5-col match grid also starves the team columns below ~760px, so the
       compact row layout must take over here (not only at 560px). */
    .stats{grid-template-columns:1fr 1fr}
    /* Compact match row: hide full team names + venue text, shrink code/score. */
    .card{grid-template-columns:46px 1fr auto 1fr;gap:8px;padding:11px 12px;border-radius:var(--r-md)}
    .meta-col{grid-column:1 / -1;flex-direction:row;justify-content:center;
      align-items:center;gap:8px;margin-top:2px;text-align:center}
    .venue{display:none}
    .team-name{display:none}
    .team-code{font-size:clamp(20px,7vw,30px)}
    .team-code.ko{font-size:11px}
    .team-link{gap:8px}
    .wc-flag,.wc-flag.tbd{width:30px;height:21px}
    .time-num{font-size:16px}
    .score{font-size:22px}
    .mid{min-width:46px}
  }
</style>
</head>
<body>

<header class="hero">
  <div class="wc-stats stats">
    <div class="wc-stat"><div class="v" id="stat-remaining">—</div><div class="l">Matches left</div></div>
    <div class="wc-stat"><div class="v">48</div><div class="l">Nations</div></div>
    <div class="wc-stat"><div class="v">16</div><div class="l">Stadiums</div></div>
    <div class="wc-stat"><div class="v" id="stat-days">—</div><div class="l">Days to Final</div></div>
  </div>
</header>

<main>
  <!-- Day selector: sticky horizontal strip of every match day -->
  <div class="daystrip-bar">
    <div class="daystrip-inner">
      <button class="daystrip-nav" id="day-prev" type="button" aria-label="Previous days"></button>
      <div class="wc-daystrip" id="daystrip" role="tablist" aria-label="Match days"></div>
      <button class="daystrip-nav" id="day-next" type="button" aria-label="Next days"></button>
    </div>
  </div>

  <!-- Secondary status filter, scoped to the selected day -->
  <div class="filter-anchor" id="filter-anchor">
    <button class="wc-chip filter-toggle" id="filter-toggle" type="button" aria-expanded="false">
      <span id="filter-toggle-ic" aria-hidden="true"></span>Filter<span class="toggle-arrow" id="filter-toggle-arrow" aria-hidden="true"></span>
    </button>
    <div id="filter-chips" role="tablist" aria-label="Match status filters"></div>
  </div>

  <div id="schedule"><div class="wc-skel-stack" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i></div></div>
  <p class="footer-note" id="footer-note"></p>
</main>

<script type="module">
import { SHELL_CSS, injectShell, revealVisible, viewSwap } from '/wc/lib/shell.js';
import * as api from '/wc/lib/api.js';
import { getTeams48, getMatchesSample, resolveTeam as resolveTeamFromData } from '/wc/lib/data.js';
import { flagSrc } from '/wc/lib/flags.js';
import { dayLabel, timeLabel, isToday } from '/wc/lib/format.js';
import { icon } from '/wc/lib/icons.js';
import { enablePopupLinks } from '/wc/lib/popup.js';
enablePopupLinks();

document.getElementById('shell-css').textContent = SHELL_CSS;
injectShell({ active: 'fixtures', subtitle: 'Match Tracker' });

// Day-of-week + day-number formatters for the day strip (Eastern Time).
const TZ = 'America/New_York';
const dowLabel  = (d) => d.toLocaleDateString('en-US', { weekday:'short', timeZone:TZ }).toUpperCase();
const dnumLabel = (d) => d.toLocaleDateString('en-US', { month:'short', day:'numeric', timeZone:TZ }).toUpperCase();

const ROUND_LABEL = {
  group: 'Group',
  round_of_32: 'Round of 32',
  round_of_16: 'Round of 16',
  quarter_final: 'Quarterfinal',
  semi_final: 'Semifinal',
  third_place: 'Third place',
  final: 'Final',
};

// Secondary status filter — applies WITHIN the day chosen in the day strip.
// (Date navigation is handled by the day strip, so there's no "Today" chip.)
const FILTERS = [
  { key:'ALL',      label:'All',       match: m => true },
  { key:'LIVE',     label:'Live now',  match: m => m.status === 'live' },
  { key:'UPCOMING', label:'Upcoming',  match: m => m.status === 'scheduled' },
  { key:'FINISHED', label:'Finished',  match: m => m.status === 'finished' },
  { key:'group',    label:'Group stage', match: m => m.round === 'group' },
  { key:'round_of_32', label:'R32',    match: m => m.round === 'round_of_32' },
  { key:'round_of_16', label:'R16',    match: m => m.round === 'round_of_16' },
  { key:'quarter_final', label:'Quarters', match: m => m.round === 'quarter_final' },
  { key:'semi_final', label:'Semis',   match: m => m.round === 'semi_final' },
  { key:'final',    label:'Final',     match: m => m.round === 'final' || m.round === 'third_place' },
];

const POLL_LIVE_MS = 75_000;

const state = {
  matches: [],
  days: [],            // [{ key, date, matches[] }] sorted ascending by kickoff
  selectedDay: null,   // dayLabel key of the currently-shown day
  activeFilter: 'ALL',
  lastFetched: null,
  pollTimer: null,
};

async function loadMatches() {
  try {
    const arr = await api.getMatches();
    const list = Array.isArray(arr) ? arr : (arr?.data || []);
    if (!Array.isArray(list) || !list.length) throw new Error('proxy returned no matches');
    state.matches = await Promise.all(list.map(decorate));
    state.lastFetched = new Date();
    return { ok: true, source: 'live' };
  } catch (live) {
    try {
      const arr = await getMatchesSample();
      state.matches = await Promise.all(arr.map(decorate));
      state.lastFetched = new Date();
      return { ok: true, source: 'fallback', warn: live.message };
    } catch (fallback) {
      return { ok: false, error: `${live.message} (fallback also failed: ${fallback.message})` };
    }
  }
}

async function decorate(m) {
  m._kickoff = new Date(m.kickoff_utc);
  m._home = await resolveTeamFromData(m.home_team);
  m._away = await resolveTeamFromData(m.away_team);
  return m;
}

// Group all matches into day buckets (keyed by the ET day label), sorted by
// earliest kickoff. Powers both the day strip and the schedule list.
function buildDays() {
  const byDay = new Map();
  for (const m of state.matches) {
    const key = dayLabel(m._kickoff);
    if (!byDay.has(key)) byDay.set(key, []);
    byDay.get(key).push(m);
  }
  state.days = Array.from(byDay.entries())
    .map(([key, matches]) => {
      matches.sort((a, b) => a._kickoff - b._kickoff);
      return { key, date: matches[0]._kickoff, matches };
    })
    .sort((a, b) => a.date - b.date);
}

// Default the selected day to today, else the nearest upcoming day, else last.
function pickDefaultDay() {
  if (!state.days.length) return null;
  const today = state.days.find(d => isToday(d.date));
  if (today) return today.key;
  const now = Date.now();
  const upcoming = state.days.find(d => d.date.getTime() >= now)
    || state.days.find(d => d.matches.some(m => m.status !== 'finished'));
  return (upcoming || state.days[state.days.length - 1]).key;
}

// Matches for the currently-selected day (the day strip drives this).
function selectedDayMatches() {
  const day = state.days.find(d => d.key === state.selectedDay);
  return day ? day.matches : [];
}

function renderDaystrip() {
  const strip = document.getElementById('daystrip');
  strip.innerHTML = '';
  for (const d of state.days) {
    const today = isToday(d.date);
    const on = d.key === state.selectedDay;
    const b = document.createElement('button');
    b.type = 'button';
    b.role = 'tab';
    b.className = 'wc-day' + (on ? ' on' : '') + (today ? ' today' : '');
    b.dataset.key = d.key;
    b.setAttribute('aria-selected', String(on));
    b.setAttribute('aria-label', `${dowLabel(d.date)} ${dnumLabel(d.date)}, ${d.matches.length} match${d.matches.length > 1 ? 'es' : ''}`);
    b.innerHTML =
      `<div class="dow">${dowLabel(d.date)}</div>` +
      `<div class="dnum">${dnumLabel(d.date)}</div>` +
      `<div class="dct">${today ? '<span class="ringdot" aria-hidden="true"></span>' : ''}${d.matches.length}</div>`;
    b.addEventListener('click', () => selectDay(d.key));
    strip.appendChild(b);
  }
}

function selectDay(key, behavior = 'smooth') {
  state.selectedDay = key;
  // Update active state without a full rebuild so focus/scroll stay smooth.
  const strip = document.getElementById('daystrip');
  strip.querySelectorAll('.wc-day').forEach(el => {
    const on = el.dataset.key === key;
    el.classList.toggle('on', on);
    el.setAttribute('aria-selected', String(on));
    const dct = el.querySelector('.dct');
    const isTodayEl = el.classList.contains('today');
    if (dct) {
      const count = state.days.find(d => d.key === el.dataset.key)?.matches.length ?? '';
      dct.innerHTML = (isTodayEl ? '<span class="ringdot" aria-hidden="true"></span>' : '') + count;
    }
  });
  centerActiveDay(behavior);
  renderFilters();
  renderSchedule();
}

function centerActiveDay(behavior = 'smooth') {
  const strip = document.getElementById('daystrip');
  const active = strip.querySelector('.wc-day.on');
  if (!active) return;
  const target = active.offsetLeft - (strip.clientWidth - active.clientWidth) / 2;
  strip.scrollTo({ left: Math.max(0, target), behavior });
}

function renderFilters() {
  const bar = document.getElementById('filter-chips');
  bar.innerHTML = '';
  const dayMatches = selectedDayMatches();
  for (const f of FILTERS) {
    const matched = dayMatches.filter(f.match).length;
    if (matched === 0 && f.key !== 'ALL') continue;
    const b = document.createElement('button');
    b.className = 'wc-chip' + (state.activeFilter === f.key ? ' on' : '');
    b.type = 'button';
    b.dataset.key = f.key;
    b.role = 'tab';
    b.ariaSelected = state.activeFilter === f.key;
    b.innerHTML = f.key === 'ALL'
      ? f.label
      : `${f.label}<span class="n">${matched}</span>`;
    b.addEventListener('click', () => {
      state.activeFilter = f.key;
      renderFilters();
      renderSchedule();
    });
    bar.appendChild(b);
  }
}

function teamCell(team, sourceText, side, kind) {
  // Span (not anchor) so nesting under the card anchor is valid HTML.
  // The popup-delegation handler picks up data-popup-team and opens the team
  // popup instead of bubbling up to the card's game popup.
  const wrap = document.createElement('span');
  wrap.className = `team-link ${side}`;
  if (team) {
    wrap.setAttribute('data-popup-team', team.fifa_code);
    wrap.style.cursor = 'pointer';
  }
  const flagEl = document.createElement('span');
  flagEl.className = 'wc-flag';
  if (team && flagSrc(team.fifa_code)) flagEl.style.backgroundImage = `url(${flagSrc(team.fifa_code)})`;
  else { flagEl.classList.add('tbd'); flagEl.textContent = '?'; }

  const text = document.createElement('div');
  // Home side ('r') reads right-aligned (flush against the score); away ('l')
  // reads left-aligned. Matters most for multi-line KO source text.
  text.className = `team-text ${side}`;
  const code = document.createElement('div');
  code.className = `team-code${kind === 'ko' && !team ? ' ko' : ''}`;
  code.textContent = team ? team.fifa_code : (sourceText || '?');
  const name = document.createElement('div');
  name.className = 'team-name';
  name.textContent = team ? team.name : (sourceText ? '' : 'TBD');
  text.appendChild(code); text.appendChild(name);

  if (side === 'r') { wrap.appendChild(text); wrap.appendChild(flagEl); }
  else { wrap.appendChild(flagEl); wrap.appendChild(text); }
  return wrap;
}

function statusBadge(m) {
  const b = document.createElement('span');
  if (m.status === 'live') {
    b.className = 'wc-badge live';
    b.innerHTML = `<span class="d" aria-hidden="true"></span>${m.phase || 'LIVE'}`;
  } else if (m.status === 'finished') {
    b.className = 'wc-badge ft';
    b.textContent = m.phase === 'FT_PEN' ? 'FT (pens)' : 'Full time';
  } else if (m.round === 'group') {
    b.className = 'wc-badge group';
    b.textContent = `Group ${m.group_name || '?'}`;
  } else {
    b.className = 'wc-badge ko';
    b.textContent = ROUND_LABEL[m.round] || m.round;
  }
  return b;
}

function buildCard(m) {
  const a = document.createElement('a');
  a.className = 'card' + (m.status === 'finished' ? ' finished' : '');
  a.href = `/wc/game/${m.id}`;
  a.dataset.no = m.id;
  a.setAttribute('data-reveal', '');

  // ── Column 1: time / live minute / FT ──
  const timeCol = document.createElement('div');
  timeCol.className = 'time-col';
  if (m.status === 'live') {
    timeCol.innerHTML = `<span class="time-num live">${m.phase || 'LIVE'}</span><span class="time-ampm">Live</span>`;
  } else if (m.status === 'finished') {
    timeCol.innerHTML = `<span class="time-num">FT</span><span class="time-ampm">${m.phase === 'FT_PEN' ? 'Pens' : 'Final'}</span>`;
  } else {
    const [hm, ampm] = timeLabel(m._kickoff).split(' ');
    timeCol.innerHTML = `<span class="time-num">${hm}</span><span class="time-ampm">${ampm || ''} ET</span>`;
  }

  // ── Column 2: home team, anchored to the RIGHT ──
  const homeSide = document.createElement('div');
  homeSide.className = 'side side-r';
  homeSide.appendChild(teamCell(m._home, m.home_team_source, 'r', m.round === 'group' ? 'group' : 'ko'));

  // ── Column 3: score (live/finished) or VS (scheduled), dead-center ──
  const middle = document.createElement('div');
  middle.className = 'mid';
  if (m.status === 'scheduled') {
    middle.innerHTML = `<span class="vs">VS</span>`;
  } else {
    const score = document.createElement('span');
    score.className = 'score' + (m.status === 'live' ? ' live' : '');
    score.textContent = `${m.home_score ?? '-'} – ${m.away_score ?? '-'}`;
    middle.appendChild(score);
  }

  // ── Column 4: away team, anchored to the LEFT ──
  const awaySide = document.createElement('div');
  awaySide.className = 'side side-l';
  awaySide.appendChild(teamCell(m._away, m.away_team_source, 'l', m.round === 'group' ? 'group' : 'ko'));

  // ── Column 5: status badge + venue, right-aligned ──
  const meta = document.createElement('div');
  meta.className = 'meta-col';
  meta.appendChild(statusBadge(m));
  if (m.stadium) {
    const venue = document.createElement('span');
    venue.className = 'venue';
    venue.textContent = m.stadium;
    meta.appendChild(venue);
  }

  a.appendChild(timeCol);
  a.appendChild(homeSide);
  a.appendChild(middle);
  a.appendChild(awaySide);
  a.appendChild(meta);
  return a;
}

function renderSchedule() {
  viewSwap(() => {
  const root = document.getElementById('schedule');
  root.innerHTML = '';

  const day = state.days.find(d => d.key === state.selectedDay);
  const foot = document.getElementById('footer-note');
  const ts = state.lastFetched ? state.lastFetched.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }) : '—';

  if (!day) {
    const empty = document.createElement('div');
    empty.className = 'loading';
    empty.style.cssText = 'animation:none';
    empty.textContent = 'No fixtures scheduled.';
    root.appendChild(empty);
    foot.textContent = `Data refreshed ${ts} ET · ${state.matches.length} matches total · all kickoff times Eastern`;
    return;
  }

  // Header for the selected day.
  const header = document.createElement('div');
  header.className = 'day-head';
  const date = document.createElement('span'); date.className = 'date'; date.textContent = day.key;
  const count = document.createElement('span'); count.className = 'count';
  count.textContent = `${day.matches.length} match${day.matches.length > 1 ? 'es' : ''}`;
  header.appendChild(date); header.appendChild(count);
  if (isToday(day.date)) {
    const pill = document.createElement('span'); pill.className = 'today-pill'; pill.textContent = 'TODAY';
    header.appendChild(pill);
  }
  root.appendChild(header);

  // Apply the secondary status filter within the day.
  const filter = FILTERS.find(f => f.key === state.activeFilter) || FILTERS[0];
  const visible = day.matches.filter(filter.match);

  if (visible.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'wc-empty';
    empty.innerHTML =
      `<div class="ic">${icon('scan-search', { size: 26, stroke: 1.8 })}</div>` +
      `<h4>No matches</h4>` +
      `<p>No ${(FILTERS.find(f => f.key === state.activeFilter)?.label || '').toLowerCase()} matches on this day.</p>`;
    const btn = document.createElement('button');
    btn.className = 'wc-btn';
    btn.type = 'button';
    btn.textContent = 'Clear filter';
    btn.addEventListener('click', () => { state.activeFilter = 'ALL'; renderFilters(); renderSchedule(); });
    empty.appendChild(btn);
    root.appendChild(empty);
  } else {
    const list = document.createElement('div');
    list.className = 'day-list';
    for (const m of visible) list.appendChild(buildCard(m));
    root.appendChild(list);
  }

  foot.textContent = `Data refreshed ${ts} ET · ${state.matches.length} matches total · ${visible.length} shown · all kickoff times Eastern`;
  requestAnimationFrame(revealVisible);
  });
}

function updateStats() {
  const now = new Date();
  const remaining = state.matches.filter(m => m.status !== 'finished').length;
  document.getElementById('stat-remaining').textContent = remaining || '—';
  const final = new Date('2026-07-19T15:00:00-04:00');
  const days = Math.max(0, Math.ceil((final - now) / 86_400_000));
  document.getElementById('stat-days').textContent = days;
}

// ── Day strip prev/next arrows (scroll the strip by ~80% of its width) ──────
function initDaystripNav() {
  const strip = document.getElementById('daystrip');
  document.getElementById('day-prev')?.addEventListener('click',
    () => strip.scrollBy({ left: -strip.clientWidth * 0.8, behavior: 'smooth' }));
  document.getElementById('day-next')?.addEventListener('click',
    () => strip.scrollBy({ left:  strip.clientWidth * 0.8, behavior: 'smooth' }));
  // Keep the active day centered when the viewport resizes.
  window.addEventListener('resize', () => centerActiveDay('auto'), { passive: true });
}

// ── Status filter toggle (collapse / expand the within-day filter chips) ────
let _filtersExpanded = false;
function initFilterToggle() {
  const btn = document.getElementById('filter-toggle');
  const anchor = document.getElementById('filter-anchor');
  btn.addEventListener('click', () => {
    _filtersExpanded = !_filtersExpanded;
    anchor.classList.toggle('expanded', _filtersExpanded);
    btn.setAttribute('aria-expanded', String(_filtersExpanded));
  });
}

function shouldPollLive() {
  const now = new Date();
  for (const m of state.matches) {
    if (m.status === 'live') return true;
    if (m.status === 'scheduled' && (m._kickoff - now) < 15 * 60_000 && (m._kickoff - now) > -5 * 60_000) return true;
  }
  return false;
}

// Re-render after a live refresh: rebuild day buckets (scores/phases may have
// changed) but keep the user's selected day if it still exists.
function refreshView() {
  buildDays();
  if (!state.days.some(d => d.key === state.selectedDay)) state.selectedDay = pickDefaultDay();
  updateStats();
  renderDaystrip();
  centerActiveDay('auto');
  renderFilters();
  renderSchedule();
}

function rescheduleLivePoll() {
  if (state.pollTimer) clearTimeout(state.pollTimer);
  state.pollTimer = null;
  if (!shouldPollLive()) return;
  state.pollTimer = setTimeout(async () => {
    if (document.hidden) { rescheduleLivePoll(); return; }
    await loadMatches();
    refreshView();
    rescheduleLivePoll();
  }, POLL_LIVE_MS);
}

async function bootstrap() {
  // Render the filter-toggle icon up front.
  document.getElementById('filter-toggle-ic').innerHTML = icon('sliders-horizontal', { size: 15, stroke: 2 });
  document.getElementById('filter-toggle-arrow').innerHTML = icon('chevron-down', { size: 13 });
  document.getElementById('day-prev').innerHTML = icon('chevron-left', { size: 18 });
  document.getElementById('day-next').innerHTML = icon('chevron-right', { size: 18 });

  // Touch teams-48 early so the resolver index is warm when matches arrive.
  getTeams48().catch(() => {});
  const result = await loadMatches();
  if (!result.ok) {
    document.getElementById('schedule').innerHTML =
      `<div class="error">Couldn't load matches: ${result.error}. Try refreshing in a moment.</div>`;
    return;
  }
  if (result.source === 'fallback') {
    console.warn('Live proxy failed; using checked-in sample.', result.warn);
  }

  buildDays();
  state.selectedDay = pickDefaultDay();
  updateStats();
  renderDaystrip();
  renderFilters();
  renderSchedule();
  initDaystripNav();
  initFilterToggle();
  // Center the default (today / nearest) day once the strip has painted.
  requestAnimationFrame(() => centerActiveDay('auto'));
  rescheduleLivePoll();
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) return;
  if (!state.lastFetched || (Date.now() - state.lastFetched.getTime()) > 45_000) {
    loadMatches().then(() => { refreshView(); rescheduleLivePoll(); });
  }
});

bootstrap();
</script>
</body>
