<header class="hero">
  <p>The qualification picture for every team, and exactly what to root for. Built from a live Monte-Carlo of the rest of the tournament — odds are the modelled chance to reach the Round of 32.</p>
  <div class="sk-controls" id="sk-controls"></div>

<script type="module">
import { SHELL_CSS, injectShell, revealVisible } from '/wc/lib/shell.js';
import * as api from '/wc/lib/api.js';
import { getTeams48 } from '/wc/lib/data.js';
import { getForecast, getCrossImpact } from '/wc/lib/forecast-client.js';
import { flagSrc } from '/wc/lib/flags.js';
import { dayLabel, timeLabel, TZ } from '/wc/lib/format.js';
import { enablePopupLinks } from '/wc/lib/popup.js';
import { icon } from '/wc/lib/icons.js';
import { analyzeAll, analyzeTeam } from '/wc/lib/clinch.js';
enablePopupLinks();

document.getElementById('shell-css').textContent = SHELL_CSS;
injectShell({ active: 'stakes', subtitle: 'Stakes' });

/* ---------- tiny DOM helper ---------- */
function el(tag, attrs = {}, ...kids) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null) continue;
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k === 'bool') { if (v) e.setAttribute(k, ''); }
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  for (const c of kids) if (c != null) e.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  return e;
}

/* ---------- odds + swing helpers ---------- */
const pct = (v) => v == null ? '—' : v >= 0.9995 ? 'in' : v <= 0.0005 ? 'out' : Math.min(99, Math.max(1, Math.round(v * 100))) + '%';
const pctNode = (v, size = 15) => (v != null && v >= 0.9995) ? el('span', { class: 'ck', html: icon('check', { size }) }) : document.createTextNode(pct(v));
const swingSafe = (q) => { if (!q) return 0; const v = [q.H, q.D, q.A].filter((x) => x != null); return v.length < 2 ? 0 : Math.max(...v) - Math.min(...v); };
const bestOfSafe = (q) => { const a = [['H', q.H], ['D', q.D], ['A', q.A]].filter((x) => x[1] != null).sort((x, y) => y[1] - x[1]); return a.length ? a[0][0] : null; };

/* ---------- date helpers (Eastern Time) ---------- */
const dayKeyOf = (d) => d.toLocaleDateString('en-US', { timeZone: TZ });
const dayHeader = (d) => d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', timeZone: TZ });

const MATTERS = 0.02; // >= 2pt swing counts as "root for"; below is noise

// Information architecture: 'B' = Games-first (the day-grouped Games list is the
// default landing; the personalized "My Guide" tab appears once a team is picked).
const state = {
  f: null, cx: null, byNum: new Map(), name: new Map(), teams48: [],
  myTeam: null, ia: 'B', view: null,
};
try { state.myTeam = localStorage.getItem('wc-stakes-team') || null; } catch {}

const nm = (c) => state.name.get(c) || c;

/* ---------- flag + team-tag builders ---------- */
function flagEl(code, cls) {
  const fl = el('span', { class: 'fl' + (cls ? ' ' + cls : '') });
  const s = flagSrc(code); if (s) fl.style.backgroundImage = `url(${s})`;
  fl.setAttribute('role', 'img'); fl.setAttribute('aria-label', nm(code));
  return fl;
}
function teamTag(code, { name = false, cls = '' } = {}) {
  const t = el('span', { class: 'sk-tag' + (cls ? ' ' + cls : '') }, flagEl(code, 'sm'), el('span', { class: 'cd' }, code));
  if (name) t.appendChild(el('span', { class: 'nm' }, nm(code)));
  return t;

/* =====================================================================
   BOOTSTRAP
   ===================================================================== */
async function bootstrap() {
  const [f, cx, teams, allMatches] = await Promise.all([
    getForecast(), getCrossImpact(), getTeams48().catch(() => []), api.getMatches().catch(() => null),
  ]);
  state.f = f; state.cx = cx;
  for (const t of (teams || [])) { const c = t.fifa_code || t.code; if (c) { state.name.set(c, t.name || c); } }
  state.teams48 = (teams || []).map((t) => ({ code: t.fifa_code || t.code, name: t.name, group: t.group }))
    .filter((t) => t.code).sort((a, b) => a.name.localeCompare(b.name));
  const arr = Array.isArray(allMatches) ? allMatches : (allMatches && allMatches.data) || [];
  for (const m of arr) if (m && m.match_number != null) state.byNum.set(Number(m.match_number), m);
  // DETERMINISTIC status for every team (alive/clinched/eliminated) — so the guide
  // never says "out" when a real path exists (matches the team page exactly).
  state.matches = arr;
  try { state.clinch = analyzeAll(arr); } catch { state.clinch = null; }

  validateView();
  render();
}

/* ---------- view / segment plumbing ---------- */
function segmentsFor() {
  if (state.ia === 'C') return [['myteam', 'My Team'], ['games', 'Games'], ['teams', 'Teams']];
  if (state.ia === 'A') return [['guide', 'My Guide'], ['games', 'Games'], ['teams', 'Teams']];
  // B: games-first; guide tab only appears once a team is chosen
  return state.myTeam
    ? [['guide', 'My Guide'], ['games', 'Games'], ['teams', 'Teams']]
    : [['games', 'Games'], ['teams', 'Teams']];
}
const defaultView = () => state.ia === 'A' ? 'guide' : state.ia === 'C' ? 'myteam' : 'games';
function validateView() {
  const ids = segmentsFor().map((s) => s[0]);
  if (!state.view || !ids.includes(state.view)) state.view = defaultView();
}
function setView(v) { state.view = v; render(); }
function setMyTeam(code) {
  state.myTeam = code || null;
  try { code ? localStorage.setItem('wc-stakes-team', code) : localStorage.removeItem('wc-stakes-team'); } catch {}
  if (code) { if (state.ia === 'A') state.view = 'guide'; else if (state.ia === 'C') state.view = 'myteam'; }
  validateView(); render();
}

/* =====================================================================
   RENDER
   ===================================================================== */
function render() {
  // controls (picker for A/B + segmented + note)
  const ctr = document.getElementById('sk-controls');
  ctr.innerHTML = '';
  if (state.ia !== 'C') ctr.appendChild(buildPicker());
  ctr.appendChild(buildSeg());
  ctr.appendChild(buildNote());

  // body
  const root = document.getElementById('view');
  root.innerHTML = '';
  let node;
  if (state.view === 'games') node = renderGames();
  else if (state.view === 'teams') node = renderTeams();
  else if (state.view === 'guide') node = state.myTeam ? renderGuide(state.myTeam) : renderPrompt(false);
  else if (state.view === 'myteam') node = renderMyTeamTab();
  root.appendChild(node);
  requestAnimationFrame(revealVisible);
}

function buildSeg() {
  const seg = el('div', { class: 'sk-seg', role: 'tablist', 'aria-label': 'View' });
  for (const [id, label] of segmentsFor()) {
    const b = el('button', { role: 'tab', 'aria-selected': String(state.view === id), onclick: () => setView(id) }, label);
    seg.appendChild(b);
  }
  return seg;
}
function buildNote() {
  const liveN = Object.values(state.cx.cross).filter((m) => m.status === 'live').length;
  const n = Object.keys(state.cx.cross).length;
  const txt = `${n} game${n === 1 ? '' : 's'} still to be decided` + (liveN ? ` · ${liveN} live now` : '');
  return el('div', { class: 'sk-note' }, txt);
}

/* =====================================================================
   TEAM PICKER (combobox)
   ===================================================================== */
function buildPicker() {
  const wrap = el('div', { class: 'sk-pick' });
  if (state.myTeam) {
    wrap.appendChild(el('div', { class: 'sk-picklabel' }, 'Your team'));
    const chip = el('button', { class: 'sk-pickchip', type: 'button', 'aria-label': `Change team (currently ${nm(state.myTeam)})`, onclick: () => setMyTeam(null) },
      flagEl(state.myTeam), el('span', { class: 'cd' }, state.myTeam), el('span', { class: 'nm' }, nm(state.myTeam)),
      el('span', { class: 'x', html: icon('x', { size: 15 }) }));
    wrap.appendChild(chip);
    return wrap;
  }
  wrap.appendChild(el('div', { class: 'sk-picklabel' }, 'Rooting for a team? Get a personalized guide'));
  const box = el('div', { class: 'wc-search sk-search' });
  const input = el('input', { type: 'text', placeholder: 'Search 48 teams…', role: 'combobox', 'aria-expanded': 'false', 'aria-autocomplete': 'list', 'aria-controls': 'sk-listbox', autocomplete: 'off' });
  box.appendChild(el('span', { class: 'wc-ic', html: icon('search', { size: 18 }) }));
  box.appendChild(input);
  const list = el('div', { class: 'sk-picklist', id: 'sk-listbox', role: 'listbox', bool: false });
  list.setAttribute('hidden', '');
  const pw = el('div', { class: 'sk-pickwrap' }, box, list);
  wrap.appendChild(pw);

  let active = -1, shown = [];
  const open = () => { input.setAttribute('aria-expanded', 'true'); list.removeAttribute('hidden'); };
  const close = () => { input.setAttribute('aria-expanded', 'false'); list.setAttribute('hidden', ''); active = -1; };
  function build(filter) {
    const f = filter.trim().toLowerCase();
    shown = state.teams48.filter((t) => !f || t.name.toLowerCase().includes(f) || t.code.toLowerCase().includes(f));
    // startsWith first
    if (f) shown.sort((a, b) => (b.name.toLowerCase().startsWith(f) || b.code.toLowerCase().startsWith(f)) - (a.name.toLowerCase().startsWith(f) || a.code.toLowerCase().startsWith(f)));
    list.innerHTML = '';
    if (!shown.length) { list.appendChild(el('div', { class: 'sk-optnone' }, 'No team matches that.')); return; }
    shown.forEach((t, i) => {
      const o = el('button', { class: 'sk-opt', type: 'button', role: 'option', id: 'sk-opt-' + i, 'aria-selected': 'false' },
        flagEl(t.code), el('span', { class: 'nm' }, t.name), el('span', { class: 'cd' }, t.code), el('span', { class: 'gp' }, 'Grp ' + t.group));
      o.addEventListener('mousedown', (e) => { e.preventDefault(); setMyTeam(t.code); });
      list.appendChild(o);
    });
    active = -1;
  }
  const paint = () => [...list.querySelectorAll('.sk-opt')].forEach((o, i) => o.classList.toggle('active', i === active));
  build('');
  input.addEventListener('focus', () => { open(); });
  input.addEventListener('input', () => { build(input.value); open(); });
  input.addEventListener('blur', () => setTimeout(close, 120));
  input.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); open(); active = Math.min(shown.length - 1, active + 1); paint(); list.querySelector('.sk-opt.active')?.scrollIntoView({ block: 'nearest' }); input.setAttribute('aria-activedescendant', 'sk-opt-' + active); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); active = Math.max(0, active - 1); paint(); list.querySelector('.sk-opt.active')?.scrollIntoView({ block: 'nearest' }); input.setAttribute('aria-activedescendant', 'sk-opt-' + active); }
    else if (e.key === 'Enter') { e.preventDefault(); const t = shown[active] || shown[0]; if (t) setMyTeam(t.code); }
    else if (e.key === 'Escape') { close(); input.blur(); }
  });
  return wrap;
}

/* =====================================================================
   GAMES view — grouped by day, ordered by kickoff
   ===================================================================== */
function gamesByDay() {
  const items = Object.values(state.cx.cross).map((m) => {
    const md = state.byNum.get(m.matchNumber) || {};
    const ko = md.kickoff_utc ? new Date(md.kickoff_utc) : null;
    return { m, md, ko };
  });
  const map = new Map();
  for (const it of items) {
    const k = it.ko ? dayKeyOf(it.ko) : 'tbd';
    if (!map.has(k)) map.set(k, { label: it.ko ? dayHeader(it.ko) : 'Date TBD', t: it.ko ? it.ko.getTime() : Infinity, items: [] });
    map.get(k).items.push(it);
  }
  const days = [...map.values()].sort((a, b) => a.t - b.t);
  for (const d of days) d.items.sort((a, b) =>
    (a.m.status === 'live' ? 0 : 1) - (b.m.status === 'live' ? 0 : 1) ||
    (a.ko ? a.ko.getTime() : 0) - (b.ko ? b.ko.getTime() : 0) || a.m.matchNumber - b.m.matchNumber);
  return days;
}
function renderGames() {
  const days = gamesByDay();
  if (!days.length) return el('div', { class: 'sk-error' }, 'No undecided group games right now.');
  const wrap = el('div', {});
  for (const d of days) {
    const sec = el('div', { class: 'sk-day' });
    sec.appendChild(el('div', { class: 'sk-dayhdr' }, el('span', { class: 'd' }, d.label), el('span', { class: 'c' }, d.items.length + (d.items.length === 1 ? ' game' : ' games'))));
    const rows = el('div', { class: 'sk-rows' });
    for (const it of d.items) rows.appendChild(gameRow(it));
    sec.appendChild(rows);
    wrap.appendChild(sec);
  }
  return wrap;
}
function rowSide(code, q, away) {
  const odds = el('span', { class: 'pc' + (q != null && q >= 0.9995 ? ' thru' : '') }, pctNode(q, 13));
  const cd = el('span', { class: 'cd' }, code);
  const nmn = el('span', { class: 'nm' }, nm(code));
  return away
    ? el('div', { class: 'sk-side away' }, flagEl(code), cd, nmn, odds)
    : el('div', { class: 'sk-side home' }, flagEl(code), cd, nmn, odds);
}
function gameRow(it) {
  const { m, md } = it;
  const fT = state.f.teams || {};
  const live = m.status === 'live';
  const mine = state.myTeam && (m.homeCode === state.myTeam || m.awayCode === state.myTeam);
  const row = el('a', { class: 'sk-row' + (mine ? ' mine' : ''), href: md.id ? `/wc/game/${md.id}` : '/wc/fixtures', 'data-reveal': '' });

  const meta = live
    ? el('span', { class: 'sk-live' }, el('span', { class: 'd' }), 'Live')
    : el('span', { class: 'sk-rtime' }, it.ko ? timeLabel(it.ko) : 'Upcoming');
  row.appendChild(el('div', { class: 'sk-rtop' }, meta, el('span', { class: 'sk-rgrp' }, 'Group ' + (m.group || ''))));
  row.appendChild(el('div', { class: 'sk-match' },
    rowSide(m.homeCode, fT[m.homeCode] && fT[m.homeCode].qualify, false),
    el('span', { class: 'sk-vs' }, 'v'),
    rowSide(m.awayCode, fT[m.awayCode] && fT[m.awayCode].qualify, true)));

  // who else is watching (now with flags)
  const others = Object.keys(m.qual).filter((c) => c !== m.homeCode && c !== m.awayCode)
    .map((c) => ({ c, q: m.qual[c], s: swingSafe(m.qual[c]) }))
    .filter((x) => x.s >= 0.03).sort((a, b) => b.s - a.s).slice(0, 3);
  const watch = el('div', { class: 'sk-watch' }, el('div', { class: 'h' }, 'Who else is watching'));
  if (!others.length) watch.appendChild(el('div', { class: 'none' }, 'Only these two have something riding on it.'));
  else for (const { c, q, s } of others) {
    const b = bestOfSafe(q);
    const wnt = b === 'D' ? el('span', { class: 'wnt draw' }, 'a draw') : el('span', { class: 'wnt win' }, teamTag(b === 'H' ? m.homeCode : m.awayCode));
    watch.appendChild(el('div', { class: 'sk-wrow' }, teamTag(c), el('span', { class: 'lbl' }, 'wants'), wnt, el('span', { class: 'sw' }, '±' + Math.round(s * 100) + 'pt')));
  }
  row.appendChild(watch);
  return row;
}

/* =====================================================================
   TEAMS view — grouped, with flags + verdicts (mobile keeps the "need")
   ===================================================================== */
function renderTeams() {
  const wrap = el('div', {});
  const fT = state.f.teams || {};
  const groups = {};
  for (const g of Object.values(state.cx.cross)) for (const code of [g.homeCode, g.awayCode]) if (code) (groups[g.group] ||= new Set()).add(code);
  const letters = Object.keys(groups).sort();
  if (!letters.length) return el('div', { class: 'sk-error' }, 'No group-stage scenarios available right now.');
  for (const L of letters) {
    const sec = el('div', { class: 'sk-tgroup' }, el('div', { class: 'gh' }, 'Group ' + L));
    const codes = [...groups[L]].sort((a, b) => (fT[b]?.qualify ?? 0) - (fT[a]?.qualify ?? 0));
    for (const code of codes) sec.appendChild(teamCard(code));
    wrap.appendChild(sec);
  }
  return wrap;
}
function teamCard(code) {
  const fT = state.f.teams || {};
  const q = fT[code] && fT[code].qualify;
  const cs = (state.clinch && state.clinch[code]) || null;
  const through = cs ? cs === 'clinched' : (q >= 0.9995);
  const eliminated = cs ? cs === 'eliminated' : (q <= 0.0005);
  const mine = state.myTeam === code;
  const card = el('a', { class: 'sk-tcard' + (mine ? ' mine' : ''), href: `/wc/team/${code}`, 'data-reveal': '' });
  card.appendChild(flagEl(code));
  card.appendChild(el('span', { class: 'nm' }, nm(code)));

  const need = el('span', { class: 'need' });
  const own = Object.values(state.cx.cross).find((m) => m.homeCode === code || m.awayCode === code);
  if (through) need.appendChild(el('span', {}, 'Through to the Round of 32.'));
  else if (eliminated) need.appendChild(el('span', {}, 'Eliminated.'));
  else if (own) {
    const isHome = own.homeCode === code, qme = own.qual[code] || {};
    const win = isHome ? qme.H : qme.A, draw = qme.D;
    const oppc = isHome ? own.awayCode : own.homeCode;
    const winGood = (win ?? 0) >= 0.99;
    need.appendChild(el('span', { class: 'x-hide' }, own.status === 'live' ? 'Live vs ' : 'Next vs '));
    need.appendChild(teamTag(oppc));
    need.appendChild(el('span', {}, '—'));
    if ((win ?? 0) - (draw ?? 0) > 0.05) { need.appendChild(el('span', { class: 'w' }, 'a win')); need.appendChild(el('span', {}, winGood ? 'clinches' : `→ ${pct(win)}`)); }
    else { need.appendChild(el('span', { class: 'dr' }, 'a draw')); need.appendChild(el('span', {}, `may do → ${pct(draw)}`)); }
  } else {
    const others = Object.values(state.cx.cross)
      .filter((m) => m.homeCode !== code && m.awayCode !== code && m.qual[code])
      .map((m) => ({ m, s: swingSafe(m.qual[code]) })).filter((x) => x.s >= MATTERS)
      .sort((a, b) => b.s - a.s).slice(0, 2);
    if (!others.length) need.appendChild(el('span', {}, 'Awaiting other results.'));
    else {
      need.appendChild(el('span', { class: 'x-hide' }, 'Root for'));
      others.forEach(({ m }, i) => {
        const b = bestOfSafe(m.qual[code]);
        if (i) need.appendChild(el('span', {}, '·'));
        if (b === 'D') need.appendChild(el('span', { class: 'dr' }, `${m.homeCode}–${m.awayCode} draw`));
        else need.appendChild(el('span', { class: 'w' }, teamTag(b === 'H' ? m.homeCode : m.awayCode)));
      });
    }
  }
  card.appendChild(need);
  card.appendChild(el('span', { class: 'odds' + (through ? ' thru' : eliminated ? ' out' : '') },
    (cs === 'alive' && (q == null || q <= 0.0005)) ? el('span', { style: 'font-size:11px;font-weight:900;letter-spacing:.06em;color:var(--text-2)' }, 'ALIVE') : pctNode(q, 16)));
  return card;
}

/* =====================================================================
   PERSONALIZED GUIDE
   ===================================================================== */
function ownMatchFor(code) { return Object.values(state.cx.cross).find((m) => m.homeCode === code || m.awayCode === code); }

function renderGuide(T) {
  const wrap = el('div', {});
  const fT = state.f.teams || {};
  const q = fT[T] && fT[T].qualify;
  // DETERMINISTIC status drives the verdict — never "out" when a real path exists.
  const cs = (state.clinch && state.clinch[T]) || null;
  const through = cs ? cs === 'clinched' : (q != null && q >= 0.9995);
  const out = cs ? cs === 'eliminated' : (q != null && q <= 0.0005);
  const alive = cs === 'alive';
  // exact route (margins + OR-cases), keyed by team-pair for the games list below
  let routeMap = null;
  if (alive && state.matches) { try { const det = analyzeTeam(state.matches, T); routeMap = {}; for (const p of (det.perMatch || [])) routeMap[p.hc + '|' + p.ac] = p; } catch {} }
  state._routeMap = routeMap;
  const own = ownMatchFor(T);

  // ---- status card ----
  const card = el('div', { class: 'sk-statcard' + (through ? ' through' : out ? ' out' : ''), 'data-reveal': '' });
  const id = el('div', { class: 'sk-statid' }, flagEl(T, 'lg'),
    el('div', {}, el('div', { class: 'nm' }, nm(T)), el('div', { class: 'cd' }, T + ' · Group ' + (groupOf(T) || '?'))));
  card.appendChild(id);
  const oddsBox = el('div', { class: 'sk-statodds' + (through ? ' through' : out ? ' out' : '') },
    el('div', { class: 'v' }, pctNode(q, 30)), el('div', { class: 'l' }, 'to reach Round of 32'));
  card.appendChild(oddsBox);
  const live = own && own.status === 'live';
  const pill = through ? ['through', 'Through', 'trophy'] : out ? ['out', 'Eliminated', 'x'] : live ? ['live', 'Live now', 'radio'] : ['cont', 'In contention', 'circle-dot'];
  card.appendChild(el('div', { class: 'sk-say' },
    el('span', { class: 'sk-pill ' + pill[0], html: icon(pill[2], { size: 12 }) + '<span>' + pill[1] + '</span>' }),
    ' ', situationText(T, q, through, out, own)));
  wrap.appendChild(card);

  // ---- your match ----
  if (own) {
    const blk = el('div', { class: 'sk-block' });
    blk.appendChild(el('div', { class: 'sk-blockh' }, own.status === 'live' ? 'Your match — live' : 'Your match'));
    blk.appendChild(el('div', { class: 'sk-blocksub' }, 'What ' + nm(T) + '’s own result does to their odds.'));
    blk.appendChild(yourMatch(own, T));
    wrap.appendChild(blk);
  }

  // ---- games to watch ----
  const watchable = Object.values(state.cx.cross).filter((m) => m.homeCode !== T && m.awayCode !== T);
  if (watchable.length) {
    const blk = el('div', { class: 'sk-block' });
    blk.appendChild(el('div', { class: 'sk-blockh' }, 'Games to watch'));
    blk.appendChild(el('div', { class: 'sk-blocksub' }, through ? 'You’re through — these no longer move your odds.' : out ? 'You’re out — shown for reference.' : 'Other results that move ' + nm(T) + '’s qualification odds.'));
    // day-grouped, time-ordered
    const items = watchable.map((m) => { const md = state.byNum.get(m.matchNumber) || {}; return { m, md, ko: md.kickoff_utc ? new Date(md.kickoff_utc) : null }; });
    const map = new Map();
    for (const it of items) { const k = it.ko ? dayKeyOf(it.ko) : 'tbd'; if (!map.has(k)) map.set(k, { label: it.ko ? dayHeader(it.ko) : 'Date TBD', t: it.ko ? it.ko.getTime() : Infinity, items: [] }); map.get(k).items.push(it); }
    const days = [...map.values()].sort((a, b) => a.t - b.t);
    for (const d of days) {
      d.items.sort((a, b) => (a.m.status === 'live' ? 0 : 1) - (b.m.status === 'live' ? 0 : 1) || (a.ko ? a.ko.getTime() : 0) - (b.ko ? b.ko.getTime() : 0) || a.m.matchNumber - b.m.matchNumber);
      blk.appendChild(el('div', { class: 'sk-dayhdr', style: 'margin-top:16px' }, el('span', { class: 'd', style: 'font-size:14px' }, d.label)));
      for (const it of d.items) blk.appendChild(guideRow(it, T, through || out));
    }
    wrap.appendChild(blk);
  }
  return wrap;
}

function groupOf(code) {
  const t = state.teams48.find((x) => x.code === code); if (t) return t.group;
  const m = Object.values(state.cx.cross).find((g) => g.homeCode === code || g.awayCode === code); return m ? m.group : null;
}
function situationText(T, q, through, out, own) {
  const name = nm(T);
  if (through) return `${name} are through to the Round of 32 — nothing left to sweat.`;
  if (out) return `${name} are out, eliminated from contention.`;
  if (own) {
    const isHome = own.homeCode === T, qme = own.qual[T] || {};
    const win = isHome ? qme.H : qme.A, draw = qme.D, opp = nm(isHome ? own.awayCode : own.homeCode);
    if ((win ?? 0) >= 0.9995) return `Beat ${opp} and ${name} are through — their fate is in their own hands.`;
    if ((draw ?? 0) >= 0.9995) return `Avoid defeat to ${opp} and ${name} go through.`;
    if ((draw ?? 0) >= 0.6 && (win ?? 0) - (draw ?? 0) < 0.12) return `A draw with ${opp} may be enough, but a win makes ${name} safe.`;
    return `${name} likely need to beat ${opp} — and may need results elsewhere to fall their way.`;
  }
  return `${name} have finished their group and need specific results elsewhere to fall their way — see what must happen below.`;
}
function yourMatch(own, T) {
  const md = state.byNum.get(own.matchNumber) || {};
  const ko = md.kickoff_utc ? new Date(md.kickoff_utc) : null;
  const isHome = own.homeCode === T, opp = isHome ? own.awayCode : own.homeCode, qme = own.qual[T] || {};
  const win = isHome ? qme.H : qme.A, draw = qme.D, lose = isHome ? qme.A : qme.H;
  const best = Math.max(...[win, draw, lose].filter((x) => x != null));
  const a = el('a', { class: 'sk-yourmatch', href: md.id ? `/wc/game/${md.id}` : '/wc/fixtures', 'data-reveal': '' });
  const vs = el('div', { class: 'sk-ymvs' }, teamTag(T, { name: true, cls: 'mine' }), el('span', { class: 'vs' }, 'v'), teamTag(opp, { name: true }));
  a.appendChild(el('div', { class: 'sk-ymtop' }, vs,
    el('span', { class: 'sk-ymtime' }, own.status === 'live' ? 'LIVE' : ko ? `${dayLabel(ko)} · ${timeLabel(ko)}` : '')));
  const outc = el('div', { class: 'sk-out3' });
  const cell = (lab, v) => el('div', { class: 'sk-out' + (v != null && v === best ? ' best' : '') }, el('div', { class: 'ol' }, lab), el('div', { class: 'ov' }, pctNode(v, 16)));
  outc.appendChild(cell('Win', win)); outc.appendChild(cell('Draw', draw)); outc.appendChild(cell('Loss', lose));
  a.appendChild(outc);
  a.appendChild(el('div', { class: 'sk-ymsay' }, yourMatchSay(win, draw, lose)));
  return a;
}
function yourMatchSay(win, draw, lose) {
  if ((win ?? 0) >= 0.9995) return 'A win clinches your place in the Round of 32.';
  if ((draw ?? 0) >= 0.9995) return 'Avoid defeat and you’re through.';
  if ((win ?? 0) - (lose ?? 0) > 0.05 && (draw ?? 0) >= 0.5) return 'A draw might be enough — a win makes sure.';
  if ((win ?? 0) > (draw ?? 0)) return 'You’ll want the win here.';
  return 'Every point matters — result still in the balance.';
}
function verdictFor(m, T) {
  const q = m.qual && m.qual[T];
  const s = swingSafe(q);
  if (!q || s < MATTERS) return { kind: 'none', s };
  const b = bestOfSafe(q);
  const vals = [q.H, q.D, q.A].filter((x) => x != null);
  return { kind: b === 'D' ? 'draw' : 'win', code: b === 'H' ? m.homeCode : m.awayCode, s, best: Math.max(...vals), worst: Math.min(...vals) };
}
function guideRow(it, T, decided) {
  const { m, md, ko } = it;
  // Deterministic route condition for this game (exact margins / OR-cases), if any.
  const rp = state._routeMap && state._routeMap[m.homeCode + '|' + m.awayCode];
  const v = decided ? { kind: 'none', s: 0 } : verdictFor(m, T);
  const muted = !rp && v.kind === 'none';
  const a = el('a', { class: 'sk-grow' + (muted ? ' muted' : ''), href: md.id ? `/wc/game/${md.id}` : '/wc/fixtures', 'data-reveal': '' });
  a.appendChild(el('span', { class: 'gtime' }, m.status === 'live' ? 'LIVE' : ko ? timeLabel(ko) : '—'));
  a.appendChild(el('div', { class: 'gvs' }, teamTag(m.homeCode, { name: true }), el('span', { class: 'vs' }, 'v'), teamTag(m.awayCode, { name: true })));
  const right = el('div', { class: 'gright' });
  let chip;
  if (rp && rp.kind === 'cond') chip = el('span', { class: 'sk-verd win' }, 'Need: ', el('b', {}, rp.text));
  else if (rp && rp.kind === 'any') chip = el('span', { class: 'sk-verd none' }, 'Any result');
  else if (v.kind === 'win') chip = el('span', { class: 'sk-verd win' }, 'Root for ', teamTag(v.code, { cls: 'on' }));
  else if (v.kind === 'draw') chip = el('span', { class: 'sk-verd draw' }, 'Root for ', el('b', {}, 'a draw'));
  else chip = el('span', { class: 'sk-verd none' }, decided ? 'No effect' : 'Doesn’t matter');
  right.appendChild(chip);
  if (!muted && !rp) right.appendChild(el('span', { class: 'sk-swing' }, `±${Math.round(v.s * 100)}pt · ${pct(v.worst)}→${pct(v.best)}`));
  a.appendChild(right);
  return a;
}

bootstrap().catch((err) => {
  console.error(err);
  document.getElementById('view').innerHTML = `<div class="sk-error">Couldn't load stakes: ${String(err && err.message || err)}.</div>`;
});
