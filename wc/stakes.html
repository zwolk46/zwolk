<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Stakes · World Cup 26</title>
<link rel="icon" type="image/svg+xml" href="/wc/assets/emblem.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem("wc-theme");if(t!=="light"&&t!=="dark")t=(window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
<link rel="stylesheet" href="/wc/lib/shell.css" data-wc-shell-css>
<link rel="modulepreload" href="/wc/lib/shell.js">
<style id="shell-css"></style>
<style>
  main{max-width:1180px;margin:0 auto;padding:24px 28px 120px}
  header.hero{max-width:1180px;margin:0 auto;padding:52px 28px 12px}
  .hero-spacer{height:150px}
  .hero h1{font-family:var(--f-display);font-size:clamp(34px,6vw,60px);line-height:.92;color:var(--text);text-transform:uppercase;margin:0}
  .hero p{font-family:var(--f-body);font-weight:600;font-size:14px;color:var(--text-2);margin:10px 0 0;max-width:62ch}
  @media (max-width:720px){ .hero-spacer{height:116px} main{padding:16px 16px 80px} header.hero{padding:30px 16px 8px} }

  /* segmented toggle (Games / Teams) */
  .sk-seg{display:inline-flex;gap:4px;margin-top:20px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-pill);padding:4px}
  .sk-seg button{font-family:var(--f-body);font-weight:800;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-3);background:none;border:0;cursor:pointer;padding:8px 18px;border-radius:var(--r-pill);transition:color var(--dur-2),background var(--dur-2)}
  .sk-seg button[aria-selected="true"]{color:var(--on-accent);background:var(--accent)}
  .sk-note{font-family:var(--f-body);font-weight:700;font-size:11px;color:var(--text-3);letter-spacing:.04em;margin-top:12px}

  .sk-loading{padding:46px 20px;text-align:center;font-family:var(--f-body);font-weight:700;font-size:13px;color:var(--text-3)}
  .sk-loading::before{content:'';display:inline-block;width:14px;height:14px;border:2px solid var(--border-strong);border-top-color:var(--accent);border-radius:50%;animation:wc-spin .9s linear infinite;vertical-align:middle;margin-right:10px}

  /* GAMES view */
  .sk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;align-items:start;margin-top:20px}
  @media (max-width:480px){ .sk-grid{grid-template-columns:minmax(0,1fr)} }
  .sk-gcard{display:block;text-decoration:none;color:inherit;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r-lg);padding:15px 16px;transition:transform var(--dur-3) var(--ease-press),border-color var(--dur-2),box-shadow var(--dur-3)}
  .sk-gcard:hover{transform:translateY(-2px);border-color:var(--accent-line);box-shadow:var(--sh-2)}
  .sk-gtop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .sk-gmeta{font-family:var(--f-body);font-weight:800;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3)}
  .sk-live{display:inline-flex;align-items:center;gap:5px;font-family:var(--f-body);font-weight:900;font-size:10px;letter-spacing:.05em;color:var(--live-ink,#fff);background:var(--live,#e5484d);padding:3px 8px;border-radius:var(--r-pill)}
  .sk-live .d{width:6px;height:6px;border-radius:50%;background:currentColor;animation:wc-pulse 1.4s ease infinite}
  .sk-match{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center}
  .sk-side{display:flex;align-items:center;gap:8px;min-width:0}
  .sk-side.away{justify-content:flex-end}
  .sk-side .fl{width:26px;height:18px;border-radius:3px;flex:none;background-size:cover;background-position:center;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
  .sk-side .cd{font-family:var(--f-display);font-size:18px;color:var(--text);letter-spacing:.02em}
  .sk-side .pc{font-family:var(--f-mono);font-weight:800;font-size:13px;color:var(--text-2);font-variant-numeric:tabular-nums}
  .sk-side.home .pc.thru,.sk-side.away .pc.thru{color:var(--success-text)}
  .sk-vs{font-family:var(--f-body);font-weight:800;font-size:10px;color:var(--text-3);text-transform:uppercase}
  .sk-watch{margin-top:12px;border-top:1px solid var(--border-subtle);padding-top:10px}
  .sk-watch .h{font-family:var(--f-body);font-weight:900;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);margin-bottom:7px}
  .sk-wrow{display:flex;align-items:center;gap:7px;font-family:var(--f-body);font-size:12px;color:var(--text-2);margin-bottom:4px}
  .sk-wrow .tc{font-family:var(--f-mono);font-weight:800;color:var(--text);min-width:34px}
  .sk-wrow b{color:var(--text)} .sk-wrow .win b{color:var(--success-text)} .sk-wrow .draw b{color:var(--accent-text)}
  .sk-wrow .sw{margin-left:auto;font-family:var(--f-mono);font-weight:700;font-size:11px;color:var(--text-3)}
  .sk-watch .none{font-family:var(--f-body);font-size:12px;color:var(--text-3)}

  /* TEAMS view */
  .sk-tgroup{margin-top:24px}
  .sk-tgroup .gh{font-family:var(--f-display);font-size:15px;letter-spacing:.04em;text-transform:uppercase;color:var(--accent-text);margin-bottom:10px}
  .sk-tcard{display:flex;align-items:center;gap:14px;text-decoration:none;color:inherit;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r-md);padding:11px 15px;margin-bottom:8px;transition:transform var(--dur-3) var(--ease-press),border-color var(--dur-2)}
  .sk-tcard:hover{transform:translateY(-2px);border-color:var(--accent-line)}
  .sk-tcard .fl{width:30px;height:21px;border-radius:3px;flex:none;background-size:cover;background-position:center;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
  .sk-tcard .nm{font-family:var(--f-display);font-size:18px;color:var(--text);letter-spacing:.02em;min-width:128px}
  .sk-tcard .need{font-family:var(--f-body);font-size:12.5px;color:var(--text-2);flex:1;min-width:0}
  .sk-tcard .need b{color:var(--text)} .sk-tcard .need .w{color:var(--success-text)} .sk-tcard .need .dr{color:var(--accent-text)}
  .sk-tcard .odds{font-family:var(--f-mono);font-weight:800;font-size:17px;color:var(--text);font-variant-numeric:tabular-nums;text-align:right;min-width:54px}
  .sk-tcard .odds.thru{color:var(--success-text)} .sk-tcard .odds.out{color:var(--text-disabled);font-size:11px;font-family:var(--f-body);font-weight:900;letter-spacing:.06em}
  @media (max-width:560px){ .sk-tcard .need{display:none} .sk-tcard .nm{flex:1} }
  .sk-error{padding:24px 18px;text-align:center;font-family:var(--f-body);font-weight:600;font-size:13px;color:var(--danger-text);background:var(--danger-quiet);border:1px solid var(--danger);border-radius:var(--r-md);max-width:580px;margin:30px auto}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-spacer"></div>
  <h1>What's at stake</h1>
  <p>The qualification picture for every team, and exactly what to root for. Built from a live Monte-Carlo of the rest of the tournament — odds are the modelled chance to reach the Round of 32.</p>
  <div class="sk-seg" role="tablist" aria-label="View">
    <button id="seg-games" role="tab" aria-selected="true">Games</button>
    <button id="seg-teams" role="tab" aria-selected="false">Teams</button>
  </div>
  <div class="sk-note" id="sk-note"></div>
</header>

<main>
  <div id="view"><div class="sk-loading">Crunching the tournament…</div></div>
</main>

<script type="module">
import { SHELL_CSS, injectShell, revealVisible } from '/wc/lib/shell.js';
import * as api from '/wc/lib/api.js';
import { getTeams48 } from '/wc/lib/data.js';
import { getForecast, getCrossImpact } from '/wc/lib/forecast-client.js';
import { flagSrc } from '/wc/lib/flags.js';
import { dayLabel, timeLabel } from '/wc/lib/format.js';
import { enablePopupLinks } from '/wc/lib/popup.js';
enablePopupLinks();

document.getElementById('shell-css').textContent = SHELL_CSS;
injectShell({ active: 'stakes', subtitle: 'Stakes' });

function el(tag, attrs = {}, ...kids) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (v == null) continue;
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  for (const c of kids) if (c != null) e.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  return e;
}
const pct = (v) => v == null ? '—' : v >= 0.9995 ? '✓' : v <= 0.0005 ? 'out' : Math.round(v * 100) + '%';
const swing = (q) => q ? Math.max(q.H, q.D, q.A) - Math.min(q.H, q.D, q.A) : 0;
const bestOf = (q) => [['H', q.H], ['D', q.D], ['A', q.A]].sort((a, b) => b[1] - a[1])[0][0];

const state = { f: null, cx: null, byNum: new Map(), name: new Map(), view: 'games' };

async function bootstrap() {
  const [f, cx, teams, allMatches] = await Promise.all([
    getForecast(), getCrossImpact(), getTeams48().catch(() => []), api.getMatches().catch(() => null),
  ]);
  state.f = f; state.cx = cx;
  for (const t of (teams || [])) { const c = t.fifa_code || t.code; if (c) state.name.set(c, t.name || c); }
  const arr = Array.isArray(allMatches) ? allMatches : (allMatches && allMatches.data) || [];
  for (const m of arr) if (m && m.match_number != null) state.byNum.set(Number(m.match_number), m);

  const liveN = Object.values(cx.cross).filter((m) => m.status === 'live').length;
  document.getElementById('sk-note').textContent =
    `${Object.keys(cx.cross).length} games still to be decided` + (liveN ? ` · ${liveN} live now` : '');

  document.getElementById('seg-games').addEventListener('click', () => setView('games'));
  document.getElementById('seg-teams').addEventListener('click', () => setView('teams'));
  render();
}
function setView(v) {
  state.view = v;
  document.getElementById('seg-games').setAttribute('aria-selected', String(v === 'games'));
  document.getElementById('seg-teams').setAttribute('aria-selected', String(v === 'teams'));
  render();
}
const nm = (c) => state.name.get(c) || c;

function render() {
  const root = document.getElementById('view');
  root.innerHTML = '';
  root.appendChild(state.view === 'games' ? renderGames() : renderTeams());
  requestAnimationFrame(revealVisible);
}

function renderGames() {
  const grid = el('div', { class: 'sk-grid' });
  const games = Object.values(state.cx.cross).sort((a, b) => {
    const lv = (m) => (m.status === 'live' ? 0 : 1);
    return lv(a) - lv(b) || a.matchNumber - b.matchNumber;
  });
  for (const g of games) grid.appendChild(gameCard(g));
  if (!games.length) return el('div', { class: 'sk-error' }, 'No undecided group games right now.');
  return grid;
}

function gameCard(g) {
  const md = state.byNum.get(g.matchNumber) || {};
  const H = g.homeCode, A = g.awayCode;
  const fT = state.f.teams || {};
  const live = g.status === 'live';
  const card = el('a', { class: 'sk-gcard', href: md.id ? `/wc/game/${md.id}` : '/wc/fixtures', 'data-reveal': '' });

  const meta = live
    ? el('span', { class: 'sk-live' }, el('span', { class: 'd' }), 'Live')
    : el('span', { class: 'sk-gmeta' }, md.kickoff_utc ? `${dayLabel(new Date(md.kickoff_utc))} · ${timeLabel(new Date(md.kickoff_utc))}` : 'Upcoming');
  card.appendChild(el('div', { class: 'sk-gtop' },
    el('span', { class: 'sk-gmeta' }, 'Group ' + (g.group || '')), meta));

  const side = (code, cls) => {
    const q = fT[code] && fT[code].qualify;
    const fl = el('span', { class: 'fl' }); const src = flagSrc(code); if (src) fl.style.backgroundImage = `url(${src})`;
    const cd = el('span', { class: 'cd' }, code);
    const pc = el('span', { class: 'pc' + (q >= 0.9995 ? ' thru' : '') }, pct(q));
    return cls === 'home' ? el('div', { class: 'sk-side home' }, fl, cd, pc) : el('div', { class: 'sk-side away' }, pc, cd, fl);
  };
  card.appendChild(el('div', { class: 'sk-match' }, side(H, 'home'), el('span', { class: 'sk-vs' }, 'v'), side(A, 'away')));

  // who else is watching
  const others = Object.keys(g.qual).filter((c) => c !== H && c !== A)
    .map((c) => ({ c, q: g.qual[c], s: swing(g.qual[c]) }))
    .filter((x) => x.s >= 0.03).sort((a, b) => b.s - a.s).slice(0, 3);
  const watch = el('div', { class: 'sk-watch' }, el('div', { class: 'h' }, 'Who else is watching'));
  if (!others.length) watch.appendChild(el('div', { class: 'none' }, 'Only these two have something riding on it.'));
  else for (const { c, q, s } of others) {
    const b = bestOf(q), want = b === 'D' ? 'a draw' : b === 'H' ? H : A;
    watch.appendChild(el('div', { class: 'sk-wrow ' + (b === 'D' ? 'draw' : 'win') },
      el('span', { class: 'tc' }, c), 'wants ', el('b', {}, want), el('span', { class: 'sw' }, '±' + Math.round(s * 100) + 'pt')));
  }
  card.appendChild(watch);
  return card;
}

function renderTeams() {
  const wrap = el('div', {});
  const fT = state.f.teams || {};
  // group → teams (codes that appear in the forecast), sorted by advance odds desc
  const groups = {};
  for (const g of Object.values(state.cx.cross)) {
    for (const code of [g.homeCode, g.awayCode]) if (code) (groups[g.group] ||= new Set()).add(code);
  }
  // also catch teams whose games are all played but still in forecast: derive group from byNum
  const letters = Object.keys(groups).sort();
  if (!letters.length) return el('div', { class: 'sk-error' }, 'No group-stage scenarios available right now.');
  for (const L of letters) {
    const sec = el('div', { class: 'sk-tgroup' }, el('div', { class: 'gh' }, 'Group ' + L));
    const codes = [...groups[L]].sort((a, b) => (fT[b]?.qualify ?? 0) - (fT[a]?.qualify ?? 0));
    for (const code of codes) sec.appendChild(teamCard(code, L));
    wrap.appendChild(sec);
  }
  return wrap;
}

function teamCard(code, L) {
  const fT = state.f.teams || {};
  const q = fT[code] && fT[code].qualify;
  const card = el('a', { class: 'sk-tcard', href: `/wc/team/${code}`, 'data-reveal': '' });
  const fl = el('span', { class: 'fl' }); const src = flagSrc(code); if (src) fl.style.backgroundImage = `url(${src})`;
  card.appendChild(fl);
  card.appendChild(el('span', { class: 'nm' }, nm(code)));

  // need: own remaining match first, else top rooting interest
  const need = el('span', { class: 'need' });
  const own = Object.values(state.cx.cross).find((m) => m.homeCode === code || m.awayCode === code);
  if (q >= 0.9995) need.appendChild(el('span', {}, 'Through to the Round of 32.'));
  else if (q <= 0.0005) need.appendChild(el('span', {}, 'Eliminated.'));
  else if (own) {
    const isHome = own.homeCode === code, qme = own.qual[code] || {};
    const win = isHome ? qme.H : qme.A, draw = qme.D;
    const oppc = isHome ? own.awayCode : own.homeCode;
    const winGood = (win ?? 0) >= 0.9995;
    need.appendChild(el('span', {}, own.status === 'live' ? 'Live vs ' : 'Next vs '));
    need.appendChild(el('b', {}, nm(oppc)));
    need.appendChild(el('span', {}, ' — '));
    if ((win ?? 0) - (draw ?? 0) > 0.05) { need.appendChild(el('span', { class: 'w' }, 'a win')); need.appendChild(el('span', {}, winGood ? ' clinches' : ` → ${pct(win)}`)); }
    else { need.appendChild(el('span', {}, 'a draw may do')); need.appendChild(el('span', {}, ` → ${pct(draw)}`)); }
  } else {
    // rooting interest
    const others = Object.values(state.cx.cross)
      .filter((m) => m.homeCode !== code && m.awayCode !== code && m.qual[code])
      .map((m) => ({ m, s: swing(m.qual[code]) })).filter((x) => x.s >= 0.02)
      .sort((a, b) => b.s - a.s).slice(0, 2);
    if (!others.length) need.appendChild(el('span', {}, 'Awaiting other results.'));
    else {
      need.appendChild(el('span', {}, 'Root for '));
      others.forEach(({ m }, i) => {
        const b = bestOf(m.qual[code]);
        const want = b === 'D' ? `${m.homeCode}–${m.awayCode} draw` : (b === 'H' ? m.homeCode : m.awayCode);
        if (i) need.appendChild(el('span', {}, ', '));
        need.appendChild(el('b', { class: b === 'D' ? 'dr' : 'w' }, want));
      });
    }
  }
  card.appendChild(need);
  card.appendChild(el('span', { class: 'odds' + (q >= 0.9995 ? ' thru' : q <= 0.0005 ? ' out' : '') }, pct(q)));
  return card;
}

bootstrap().catch((err) => {
  console.error(err);
  document.getElementById('view').innerHTML = `<div class="sk-error">Couldn't load stakes: ${String(err && err.message || err)}.</div>`;
});
</script>
</body>
</html>
