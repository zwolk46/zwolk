<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e0c">
<title>Live · World Cup 26</title>
<link rel="icon" type="image/svg+xml" href="/wc/assets/emblem.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<!-- Display faces load with font-display:block so the big codes/score/sideways names never flash a fallback (serif) before the real font paints. -->
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&display=block" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem("wc-theme");if(t!=="light"&&t!=="dark")t=(window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
<link rel="stylesheet" href="/wc/lib/shell.css" data-wc-shell-css>
<link rel="modulepreload" href="/wc/lib/shell.js">
<style>
  /* The live module injects SHELL_CSS + LIVE_CSS and the nav shell itself; this
     just frames the content column beneath the collapsing hero logo. */
  main{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:14px clamp(16px,3vw,30px) 110px}
  .hero-spacer{height:0}
  @media (max-width:720px){ .hero-spacer{height:0} main{padding:10px 16px 72px} }
</style>
</head>
<body>
<main>
  <div class="hero-spacer"></div>
  <div id="live-root"><div class="lvx-boot">Finding the live match…</div></div>
</main>
<script type="module">
  // ?v= cache-busts the module + its sub-imports during local dev. A transient
  // module-fetch failure (e.g. loading mid-deploy, or a network blip) auto-retries
  // with a cache-busting suffix before surfacing an error.
  const v = new URLSearchParams(location.search).get('v');
  const base = '/wc/lib/live-page.js' + (v ? '?v=' + encodeURIComponent(v) : '');
  async function start(tries) {
    try {
      const url = tries ? base + (base.includes('?') ? '&' : '?') + 'r=' + tries : base;
      const m = await import(url);
      m.renderLivePage(document.getElementById('live-root'));
    } catch (err) {
      if (tries < 3) { await new Promise((r) => setTimeout(r, 500 * (tries + 1))); return start(tries + 1); }
      document.getElementById('live-root').innerHTML =
        '<div class="lvx-boot" style="color:#e0606c">Could not start the live view: ' + String(err && err.message || err) + ' — please refresh.</div>';
    }
  }
  start(0);
</script>
</body>
</html>
