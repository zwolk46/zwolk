<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e0c">
<title>Live · World Cup 26</title>
<link rel="icon" type="image/svg+xml" href="/wc/assets/emblem.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  /* The live module injects SHELL_CSS + LIVE_CSS and the nav shell itself; this
     just frames the content column beneath the collapsing hero logo. */
  main{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:44px clamp(16px,3vw,30px) 110px}
  .hero-spacer{height:168px}
  @media (max-width:720px){ .hero-spacer{height:112px} main{padding:22px 16px 72px} }
</style>
</head>
<body>
<main>
  <div class="hero-spacer"></div>
  <div id="live-root"><div class="lvx-boot">Finding the live match…</div></div>
</main>
<script type="module">
  // ?v= cache-busts the module + its sub-imports during local dev.
  const v = new URLSearchParams(location.search).get('v');
  import('/wc/lib/live-page.js' + (v ? '?v=' + encodeURIComponent(v) : ''))
    .then((m) => m.renderLivePage(document.getElementById('live-root')))
    .catch((err) => {
      document.getElementById('live-root').innerHTML =
        '<div class="lvx-boot" style="color:#e0606c">Could not start the live view: ' + String(err && err.message || err) + '</div>';
    });
</script>
</body>
</html>
