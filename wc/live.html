<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06080c">
<title>Live · World Cup 26</title>
<link rel="icon" type="image/svg+xml" href="/wc/assets/emblem.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style id="live-css"></style>
</head>
<body>
<div id="live-root"><div class="lvx-boot">Finding the live match…</div></div>
<script type="module">
  // ?v= cache-busts the module during local dev (plain http.server sends no cache headers).
  const v = new URLSearchParams(location.search).get('v');
  import('/wc/lib/live-page.js' + (v ? '?v=' + encodeURIComponent(v) : ''))
    .then((m) => {
      document.getElementById('live-css').textContent = m.LIVE_CSS;
      return m.renderLivePage(document.getElementById('live-root'));
    })
    .catch((err) => {
      document.getElementById('live-root').innerHTML =
        '<div class="lvx-boot lvx-boot-err">Could not start the live view: ' + String(err && err.message || err) + '</div>';
    });
</script>
</body>
</html>
