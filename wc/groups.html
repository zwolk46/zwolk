<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Groups · World Cup 26</title>
<link rel="icon" type="image/svg+xml" href="/wc/assets/emblem.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem("wc-theme");if(t!=="light"&&t!=="dark")t=(window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
<link rel="stylesheet" href="/wc/lib/shell.css" data-wc-shell-css>
<link rel="modulepreload" href="/wc/lib/shell.js">
<style id="shell-css"></style>
<style>
  main{max-width:1280px;margin:0 auto;padding:8px 28px 120px}
  /* Title + emblem live in the nav now; no hero band — the legend leads. */
  header.hero{max-width:1280px;margin:0 auto;padding:18px 28px 2px}
  @media (max-width:720px){ header.hero{padding:14px 16px 2px} main{padding:6px 16px 80px} }

  /* legend (zone key) — colored swatch + label, tokens only */
  .legend{display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin-top:0}
  .legend .item{display:flex;align-items:center;gap:8px;font-family:var(--f-body);font-weight:800;font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-2)}
  .legend .swatch{width:13px;height:13px;border-radius:var(--r-xs);flex:none}
  .legend .qual{background:var(--success)}
  .legend .third{background:var(--warning)}

  /* responsive grid — minmax(0,1fr) lets cards shrink (fixes the 372px overflow) */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px;align-items:start}
  @media (max-width:480px){ .grid{grid-template-columns:minmax(0,1fr);gap:14px} }

  .group-card{position:relative;overflow:hidden;transition:transform var(--dur-3) var(--ease-press),box-shadow var(--dur-3),border-color var(--dur-2)}
  .group-card:hover{transform:translateY(-3px);border-color:var(--accent-line);box-shadow:var(--sh-3)}
  .group-card .bigletter{position:absolute;right:-6px;top:-30px;font-family:var(--f-display);font-size:240px;line-height:.78;color:var(--accent-text);opacity:.05;pointer-events:none;z-index:0;user-select:none}

  /* card head — toggle button for the accordion */
  .grp-head{position:relative;z-index:1;width:100%;display:flex;align-items:center;gap:16px;padding:18px 20px 12px;background:none;border:0;cursor:pointer;text-align:left;font:inherit;color:inherit}
  .grp-head .letter{font-family:var(--f-display);font-size:48px;line-height:.8;color:var(--accent-text)}
  .grp-head .ttl{flex:1;min-width:0}
  .grp-head .ttl .h{font-family:var(--f-display);font-size:20px;letter-spacing:.02em;color:var(--text);text-transform:uppercase;line-height:1}
  .grp-head .ttl .sub{font-family:var(--f-body);font-weight:700;font-size:12px;color:var(--text-3);margin-top:4px}
  .grp-head .caret{display:flex;align-items:center;justify-content:center;width:34px;height:34px;flex:none;border-radius:50%;color:var(--accent-text);background:var(--accent-quiet);transition:transform var(--dur-3) var(--ease-spring),background var(--dur-2)}
  .grp-head:hover .caret{background:var(--accent-line)}
  .grp-head .caret svg{display:block}
  .group-card[data-open] .grp-head .caret{transform:rotate(180deg)}

  /* real standings table — sticky header, full column set, tokens only */
  .stand-wrap{position:relative;z-index:1;padding:0 16px 16px;overflow-x:auto}
  table.stand{width:100%;min-width:336px;border-collapse:separate;border-spacing:0;font-family:var(--f-body);font-size:14px;table-layout:fixed}
  table.stand col.c-pos{width:24px}
  table.stand col.c-pts{width:38px}
  table.stand col.c-num{width:25px}
  table.stand col.c-gd{width:34px}
  table.stand th{font-family:var(--f-body);font-weight:900;font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3);text-align:right;padding:10px 5px;background:var(--surface-2);position:sticky;top:0;z-index:2;border-bottom:1px solid var(--border-subtle);white-space:nowrap}
  table.stand th.lft,table.stand td.lft{text-align:left}
  /* sortable header button — fills the th, keyboard-focusable, shows a sort
     direction icon when active. Icon only via lib/icons.js (no glyphs). */
  table.stand th.sortable{padding:0}
  table.stand th .sort-btn{display:inline-flex;align-items:center;gap:3px;width:100%;justify-content:flex-end;
    font:inherit;letter-spacing:inherit;text-transform:inherit;color:inherit;
    background:none;border:0;cursor:pointer;padding:10px 5px;border-radius:var(--r-xs);
    transition:color var(--dur-2),background var(--dur-2)}
  table.stand th.lft .sort-btn{justify-content:flex-start}
  table.stand th .sort-btn:hover{color:var(--text)}
  table.stand th .sort-btn:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
  table.stand th[aria-sort=ascending] .sort-btn,table.stand th[aria-sort=descending] .sort-btn{color:var(--text)}
  table.stand th .sort-ic{display:inline-flex;align-items:center;color:var(--accent-text);flex:none}
  table.stand th .sort-ic .wc-ic{display:block;width:12px;height:12px}
  table.stand td{padding:9px 5px;text-align:right;border-bottom:1px solid var(--border-subtle);font-variant-numeric:tabular-nums;color:var(--text-2)}
  table.stand tbody tr:last-child td{border-bottom:0}
  table.stand td.team{max-width:0;overflow:hidden}
  table.stand .team-inner{display:flex;align-items:center;gap:9px;min-width:0;overflow:hidden;text-decoration:none;color:inherit}
  table.stand .team-inner .flag{width:24px;height:17px;flex:none;border-radius:3px}
  table.stand .team-inner .cd{font-family:var(--f-display);font-size:17px;color:var(--text);letter-spacing:.02em;flex:none}
  table.stand .team-inner .nm{font-family:var(--f-body);font-weight:600;font-size:12px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  table.stand td .pos{font-family:var(--f-display);font-size:15px;color:var(--text-3);display:inline-flex;align-items:center;justify-content:center;text-align:center;min-width:22px;height:22px;padding:0 3px;border-radius:var(--r-pill);line-height:1}
  table.stand td .pts{font-family:var(--f-display);font-size:18px;color:var(--text)}
  table.stand .gd-pos{color:var(--success-text)} table.stand .gd-neg{color:var(--danger-text)}
  table.stand .lt{color:var(--text-3)}
  /* qualification zones — restrained full-row tint with ROUNDED ends (so the
     band reads as an inset pill, never a hard-cornered block against the card)
     + a filled, rounded position pill. NO left stripe. Status tokens only:
     qualify → --success, 3rd-place race → --warning. */
  table.stand tr.qual td{background:var(--success-quiet)}
  table.stand tr.qual td:first-child{border-top-left-radius:var(--r-md);border-bottom-left-radius:var(--r-md)}
  table.stand tr.qual td:last-child{border-top-right-radius:var(--r-md);border-bottom-right-radius:var(--r-md)}
  table.stand tr.qual .pos{color:var(--on-accent);background:var(--success)}
  table.stand tr.third td{background:var(--warning-quiet)}
  table.stand tr.third td:first-child{border-top-left-radius:var(--r-md);border-bottom-left-radius:var(--r-md)}
  table.stand tr.third td:last-child{border-top-right-radius:var(--r-md);border-bottom-right-radius:var(--r-md)}
  table.stand tr.third .pos{color:var(--on-accent);background:var(--warning)}
  /* clear the cell border under tinted rows so the rounded band isn't cut by a
     straight divider line. */
  table.stand tr.qual td,table.stand tr.third td{border-bottom-color:transparent}
  table.stand tbody tr:hover td{filter:brightness(1.07)}
  @media (hover:none){ table.stand tbody tr:hover td{filter:none} }

  /* Accordion of fixtures / results */
  .accord{position:relative;z-index:1;overflow:hidden;transition:max-height var(--dur-3) var(--ease-out),opacity var(--dur-2);max-height:0;opacity:0}
  .group-card[data-open] .accord{opacity:1}
  .accord-inner{padding:4px 20px 20px;border-top:1px solid var(--border-subtle);margin:0 16px}
  .accord-inner .lbl{font-family:var(--f-body);font-weight:900;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent-text);padding:14px 0 8px}
  .fix-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border-subtle);text-decoration:none;color:inherit;cursor:pointer}
  .fix-row:last-child{border-bottom:0}
  .fix-row .when{min-width:74px;font-family:var(--f-body);font-weight:800;font-size:12px;color:var(--text)}
  .fix-row .when .t{color:var(--text-3);font-weight:700}
  .fix-row .grid3{flex:1;display:grid;grid-template-columns:1fr 30px 1fr;align-items:center;min-width:0}
  .fix-row .t1{display:flex;align-items:center;justify-content:flex-end;gap:6px;font-family:var(--f-display);font-size:17px;color:var(--text);min-width:0}
  .fix-row .t2{display:flex;align-items:center;justify-content:flex-start;gap:6px;font-family:var(--f-display);font-size:17px;color:var(--text);min-width:0}
  .fix-row .t1 .lbl-ko,.fix-row .t2 .lbl-ko{font-family:var(--f-body);font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fix-row .mid{font-family:var(--f-body);font-weight:800;font-size:11px;color:var(--text-3);text-align:center}
  .fix-row .mid.score{font-family:var(--f-mono);font-weight:800;font-size:14px;font-variant-numeric:tabular-nums;color:var(--text)}
  .fix-row .mid.score.live{color:var(--live)}
  .fix-row .ff{width:22px;height:16px;flex:none;border-radius:3px}
  .fix-row .ven{font-family:var(--f-body);font-weight:600;font-size:11px;color:var(--text-3);text-align:right;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .accord-inner .none{font-family:var(--f-body);font-weight:600;font-size:13px;color:var(--text-3);padding:6px 0}

  .loading{padding:60px 20px;text-align:center;font-family:var(--f-body);font-weight:700;font-size:13px;color:var(--text-3)}
  .loading::before{content:'';display:inline-block;width:14px;height:14px;border:2px solid var(--border-strong);border-top-color:var(--accent);border-radius:50%;animation:wc-spin .9s linear infinite;vertical-align:middle;margin-right:10px}
  .error{padding:30px 20px;text-align:center;font-family:var(--f-body);font-weight:600;font-size:13px;color:var(--danger-text);background:var(--danger-quiet);border:1px solid var(--danger);border-radius:var(--r-md);max-width:580px;margin:30px auto}

  /* ADV — prominent modelled qualification odds + live indicators (forecast) */
  table.stand col.c-adv{width:78px}
  table.stand th.adv,table.stand td.adv{text-align:right;padding-right:10px}
  .adv-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:0}
  .adv-pct{font-family:var(--f-display);font-size:18px;line-height:.85;color:var(--accent-text);letter-spacing:.01em}
  .adv-pct i{font-style:normal;font-size:10px;font-weight:700;opacity:.65;margin-left:1px}
  .adv-pct.thru{color:var(--success-text)}
  .adv-pct.out{color:var(--text-disabled);font-family:var(--f-body);font-size:10px;font-weight:900;letter-spacing:.1em}
  .adv-track{width:100%;height:5px;border-radius:99px;background:var(--surface-sunken);overflow:hidden}
  .adv-fill{height:100%;border-radius:99px;background:var(--accent);transition:width var(--dur-3) var(--ease-out)}
  .adv-fill.thru{background:var(--success)}
  .adv-pend{color:var(--text-disabled);font-family:var(--f-mono);font-size:13px}
  .live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--live);margin-left:5px;vertical-align:middle}

  /* per-group stakes summary line under the header */
  .grp-stakes{position:relative;z-index:1;margin:-2px 16px 10px;padding:9px 13px;background:var(--surface-sunken);border-radius:var(--r-md);font-family:var(--f-body);font-size:12px;font-weight:600;color:var(--text-2);line-height:1.5;display:none}
  .grp-stakes.show{display:block}
  .grp-stakes .gs-thru{color:var(--success-text);font-weight:800}
  .grp-stakes .gs-bub{color:var(--accent-text);font-weight:800}
  .grp-stakes .gs-out{color:var(--text-disabled);font-weight:700}
  .grp-stakes .gs-sep{color:var(--border-strong);margin:0 5px}
</style>
</head>
<body>

<header class="hero">
  <div class="legend">
    <span class="item"><span class="swatch qual"></span>Qualifies (top 2)</span>
    <span class="item"><span class="swatch third"></span>3rd-place race (best 8 advance)</span>
    <span class="item" style="color:var(--text-3);text-transform:none;letter-spacing:0">ADV = modelled chance to reach the Round of 32</span>
  </div>
</header>

<main>
  <div id="grid" class="grid"><div class="wc-skel-grid" aria-hidden="true" style="grid-column:1/-1"><i></i><i></i><i></i><i></i><i></i><i></i></div></div>
</main>

<script type="module">
import { SHELL_CSS, injectShell, revealVisible, viewSwap } from '/wc/lib/shell.js';
import * as api from '/wc/lib/api.js';
import { getTeams48, getGroupsSample, getMatchesSample, resolveTeam } from '/wc/lib/data.js';
import { computeTable } from '/wc/lib/standings.js';
import { getForecast } from '/wc/lib/forecast-client.js';
import { flagSrc } from '/wc/lib/flags.js';
import { dayLabel, timeLabel, isToday } from '/wc/lib/format.js';
import { enablePopupLinks } from '/wc/lib/popup.js';
import { icon, qmark } from '/wc/lib/icons.js';
import { analyzeAll } from '/wc/lib/clinch.js';
enablePopupLinks();

document.getElementById('shell-css').textContent = SHELL_CSS;
injectShell({ active: 'groups', subtitle: 'Groups' });

const GROUP_LETTERS = ['A','B','C','D','E','F','G','H','I','J','K','L'];
let state = { groups: [], matches: [], forecast: null };
// Open accordions are tracked by group letter so re-renders (live polling)
// preserve which cards the user expanded.
const openGroups = new Set();

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (v != null) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  }
  return e;
}

// Live cadence: 75s matches fixtures. The wc2026api proxy caps at 490/day and
// caches ~25s, so this is about as fast as the budget sustains across a full
// match day; the proxy degrades to local data if the cap is ever hit.
const POLL_LIVE_MS = 75_000;
let _pollTimer = null;

async function loadGroups() {
  const [g, m] = await Promise.allSettled([
    api.getGroups(),
    api.getMatches({ round: 'group' }),
  ]);
  if (g.status === 'fulfilled') {
    const arr = Array.isArray(g.value) ? g.value : (g.value?.data || g.value?.groups || []);
    if (Array.isArray(arr) && arr.length) state.groups = arr;
  }
  if (!state.groups.length) { try { state.groups = await getGroupsSample(); } catch {} }
  if (m.status === 'fulfilled') {
    const arr = Array.isArray(m.value) ? m.value : (m.value?.data || []);
    if (Array.isArray(arr) && arr.length) state.matches = arr;
  }
  // Complete local schedule as fallback so standings still compute if live is down.
  if (!state.matches.length) {
    try { const all = await getMatchesSample(); state.matches = all.filter(x => x.round === 'group'); } catch {}
  }
}

// Poll while any group match is live (or within 15min pre / ~2.5h post kickoff),
// so standings stay live during play. Pauses while the tab is hidden.
function shouldPollLive() {
  const now = Date.now();
  for (const m of state.matches) {
    if (m.status === 'live') return true;
    const ko = m.kickoff_utc ? new Date(m.kickoff_utc).getTime() : 0;
    if (m.status === 'scheduled' && ko && (ko - now) < 15 * 60_000 && (ko - now) > -150 * 60_000) return true;
  }
  return false;
}
function scheduleLivePoll() {
  if (_pollTimer) clearTimeout(_pollTimer);
  _pollTimer = null;
  if (!shouldPollLive()) return;
  _pollTimer = setTimeout(async () => {
    if (document.hidden) { scheduleLivePoll(); return; }
    try { await loadGroups(); await renderAll(); refreshForecast(); } catch {}
    scheduleLivePoll();
  }, POLL_LIVE_MS);
}

// Fill the prominent ADV cell (big % + flat bar) from the latest forecast.
function applyForecast() {
  const f = state.forecast; if (!f) return;
  // DETERMINISTIC status so a longshot-but-alive team shows ALIVE, not OUT —
  // consistent with the team + stakes pages.
  if (!state.clinch && state.matches && state.matches.length) { try { state.clinch = analyzeAll(state.matches); } catch {} }
  document.querySelectorAll('.adv-wrap[data-adv]').forEach(w => {
    const code = w.getAttribute('data-adv');
    const t = f.teams[code];
    w.innerHTML = '';
    if (!t) { w.appendChild(el('span', { class: 'adv-pend' }, '·')); return; }
    const q = t.qualify;
    const cs = state.clinch && state.clinch[code];
    const through = cs ? cs === 'clinched' : q >= 0.9995;
    const elim = cs ? cs === 'eliminated' : q <= 0.0005;
    const pct = el('span', {});
    let pctCls = 'adv-pct', fillCls = 'adv-fill', title;
    if (through) { pctCls += ' thru'; fillCls += ' thru'; pct.innerHTML = qmark('check', 22); title = 'Through — qualification clinched'; }
    else if (elim) { pctCls += ' out'; pct.innerHTML = '<span style="color:var(--danger-text);display:inline-flex">' + qmark('x', 22) + '</span>'; title = 'Eliminated — cannot reach the Round of 32'; }
    else if (cs === 'alive' && q <= 0.0005) { pctCls += ' out'; pct.textContent = 'ALIVE'; title = 'Still mathematically alive — needs specific results elsewhere'; }
    else { pct.appendChild(document.createTextNode(String(Math.min(99, Math.max(1, Math.round(q * 100)))))); pct.appendChild(el('i', {}, '%')); title = `${(q * 100).toFixed(1)}% chance to reach the Round of 32`; }
    pct.className = pctCls; pct.title = title;
    w.appendChild(pct);
    const track = el('div', { class: 'adv-track' });
    track.appendChild(el('div', { class: fillCls, style: `width:${elim ? 0 : Math.max(4, Math.round(q * 100))}%` }));
    w.appendChild(track);
  });
  document.querySelectorAll('.grp-stakes').forEach(fillStakes);
}

// One-line "what's at stake" summary per group: who's through / in the race / out.
function fillStakes(node) {
  const f = state.forecast; if (!f) return;
  let list; try { list = JSON.parse(node.dataset.stakes || '[]'); } catch { return; }
  if (list.length < 3) return;
  const q = (c) => f.teams[c]?.qualify ?? 0;
  const pctOf = (c) => Math.min(99, Math.max(1, Math.round(q(c) * 100)));
  const esc = (s) => String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
  const cs = (c) => state.clinch && state.clinch[c];   // deterministic status
  const thru = list.filter(t => cs(t.code) ? cs(t.code) === 'clinched' : q(t.code) >= 0.9995);
  const out = list.filter(t => cs(t.code) ? cs(t.code) === 'eliminated' : q(t.code) <= 0.0005);
  const bub = list.filter(t => !thru.includes(t) && !out.includes(t)).sort((a, b) => q(b.code) - q(a.code));
  const parts = [];
  if (thru.length) parts.push(`<span class="gs-thru">${qmark('check', 12)} ${thru.map(t => esc(t.name)).join(', ')}</span> through`);
  if (bub.length) parts.push(`<span class="gs-bub">In the race:</span> ${bub.map(t => `${esc(t.name)} ${pctOf(t.code)}%`).join(', ')}`);
  if (out.length) parts.push(`<span class="gs-out"><span style="color:var(--danger-text);display:inline-flex;vertical-align:middle">${qmark('x', 12)}</span> ${out.map(t => esc(t.name)).join(', ')}</span> out`);
  if (!parts.length) { node.classList.remove('show'); return; }
  node.innerHTML = parts.join('<span class="gs-sep">·</span>');
  node.classList.add('show');
}
async function refreshForecast() {
  try { state.forecast = await getForecast({ liveMatches: state.matches }); applyForecast(); }
  catch (e) { /* forecast is best-effort; tables render regardless */ }
}

async function bootstrap() {
  await getTeams48().catch(() => {});
  await loadGroups();
  await renderAll();
  refreshForecast();
  scheduleLivePoll();
}

async function renderAll() {
  const root = document.getElementById('grid');

  if (!state.groups.length) {
    root.innerHTML = `<div class="error">Group standings unavailable. Try refreshing in a moment.</div>`;
    return;
  }

  // Normalize → 12 groups in order. If the API skips a letter, render an empty card.
  const byLetter = new Map();
  for (const g of state.groups) {
    const letter = g.group_name || g.group || g.letter;
    if (letter) byLetter.set(letter, g);
  }

  // Build all cards (awaiting team resolution) BEFORE the transition, so the
  // startViewTransition callback only does the cheap DOM swap (no long freeze).
  const frag = document.createDocumentFragment();
  for (const letter of GROUP_LETTERS) {
    const g = byLetter.get(letter);
    frag.appendChild(await buildGroupCard(letter, g));
  }
  viewSwap(() => {
    root.innerHTML = '';
    root.appendChild(frag);
    requestAnimationFrame(revealVisible);
    applyForecast();
  });
}

async function buildGroupCard(letter, g) {
  const cardId = 'grp-' + letter;
  const accordId = 'accord-' + letter;
  const card = el('div', { class: 'group-card wc-card', 'data-reveal': '', id: cardId });
  card.appendChild(el('span', { class: 'bigletter', 'aria-hidden': 'true' }, letter));

  // Live /groups returns membership only — compute the table from matches when
  // the source didn't supply one. Falls back to static groups.json standings.
  let standings = computeTable(state.matches, g || { group_name: letter }, { includeLive: true });
  if (!standings.length && g && (g.standings || g.table)) standings = g.standings || g.table;
  const matchesInGroup = state.matches.filter(m => (m.group_name || m.group) === letter);
  const remaining = matchesInGroup.filter(m => m.status !== 'finished').length;
  const liveCount = matchesInGroup.filter(m => m.status === 'live').length;
  const total = matchesInGroup.length || (standings.length ? (standings.length * (standings.length - 1)) / 2 : 6);
  const subText = liveCount
    ? `${liveCount} live now${remaining - liveCount > 0 ? ` · ${remaining - liveCount} to play` : ''}`
    : matchesInGroup.length
      ? (remaining ? `${remaining} of ${total} matches remaining` : 'Group stage complete')
      : (g ? `${standings.length} teams` : 'Awaiting first match');

  // Header (toggleable). aria-expanded/aria-controls wire the accordion for a11y.
  const head = el('button', {
    class: 'grp-head', type: 'button',
    'aria-expanded': 'false', 'aria-controls': accordId,
  },
    el('span', { class: 'letter', 'aria-hidden': 'true' }, letter),
    el('div', { class: 'ttl' },
      el('div', { class: 'h' }, 'Group ' + letter),
      el('div', { class: 'sub' }, subText),
    ),
    el('span', { class: 'caret', 'aria-hidden': 'true', html: icon('chevron-down', { size: 18 }) }),
  );
  card.appendChild(head);

  // Per-group stakes summary line (through / in the race / out), filled by the forecast.
  const stakesNode = el('div', { class: 'grp-stakes' });
  card.appendChild(stakesNode);

  // Standings table — real semantic <table> with the full column set.
  const stand = el('div', { class: 'stand-wrap' });
  const table = el('table', { class: 'stand' });
  table.appendChild(el('colgroup', {},
    el('col', { class: 'c-pos' }), el('col', { class: 'c-team' }),
    el('col', { class: 'c-num' }), el('col', { class: 'c-num' }),
    el('col', { class: 'c-num' }), el('col', { class: 'c-num' }),
    el('col', { class: 'c-gd' }), el('col', { class: 'c-pts' }), el('col', { class: 'c-adv' }),
  ));
  // Resolve every team ONCE up front so the table can be re-sorted synchronously
  // (no re-awaiting on each header click). Each enriched row carries its true
  // LEAGUE POSITION (rank) + qualification flags, which stay fixed under sorting —
  // only the display order of rows changes when a column is sorted.
  const rowTeams = [];
  const enriched = [];
  for (let i = 0; i < (standings.length || 4); i++) {
    const r = standings[i];
    const teamName = r ? (r.team || r.name) : null;
    const team = teamName ? await resolveTeam(teamName) : null;
    const code = team?.fifa_code || (teamName || '—');
    if (team?.fifa_code) rowTeams.push({ code: team.fifa_code, name: team.name || teamName });
    enriched.push({ r, team, teamName, code, rank: i + 1, isQual: i < 2, isThird: i === 2 });
  }

  // Sortable column model. ADV reads the modelled qualify chance from the live
  // forecast (0 until it arrives). Empty rows (no result row) sort to the bottom.
  const advOf = (er) => (er.team?.fifa_code && state.forecast?.teams[er.team.fifa_code]?.qualify) || 0;
  const gdOf  = (er) => er.r ? (er.r.gd != null ? er.r.gd : ((er.r.gf ?? 0) - (er.r.ga ?? 0))) : null;
  // key → { label, title, get(er), lft?, advCol?, firstDir } (firstDir = direction on first click)
  const SORT_COLS = {
    pos: { label: '#',   title: 'League position', get: (er) => er.rank, lft: true, firstDir: 'asc' },
    P:   { label: 'P',   title: 'Played',          get: (er) => er.r?.played,  firstDir: 'desc' },
    W:   { label: 'W',   title: 'Won',             get: (er) => er.r?.won,     firstDir: 'desc' },
    D:   { label: 'D',   title: 'Drawn',           get: (er) => er.r?.drawn,   firstDir: 'desc' },
    L:   { label: 'L',   title: 'Lost',            get: (er) => er.r?.lost,    firstDir: 'desc' },
    GD:  { label: 'GD',  title: 'Goal difference', get: gdOf,                  firstDir: 'desc' },
    PTS: { label: 'PTS', title: 'Points',          get: (er) => er.r?.points,  firstDir: 'desc' },
    ADV: { label: 'ADV', title: 'Modelled chance to reach the knockout rounds', get: advOf, advCol: true, firstDir: 'desc' },
  };
  const COL_ORDER = ['pos', 'team', 'P', 'W', 'D', 'L', 'GD', 'PTS', 'ADV'];

  // Sort state for THIS table. Default: league position, ascending (1 at top).
  let sortKey = 'pos', sortDir = 'asc';
  const headerBtns = {}; // key -> { th, btn, icSpan }

  // Build the header row. Sortable columns get a real <button> (click + keyboard);
  // the Team column stays a plain label.
  const headTr = el('tr', {});
  for (const key of COL_ORDER) {
    if (key === 'team') { headTr.appendChild(el('th', { class: 'lft', scope: 'col' }, 'Team')); continue; }
    const col = SORT_COLS[key];
    const th = el('th', {
      class: `sortable${col.lft ? ' lft' : ''}${col.advCol ? ' adv' : ''}`,
      scope: 'col', 'aria-sort': 'none',
    });
    const icSpan = el('span', { class: 'sort-ic', 'aria-hidden': 'true' });
    const btn = el('button', {
      class: 'sort-btn', type: 'button',
      title: `Sort by ${col.title}`,
      'aria-label': `Sort by ${col.title}`,
    }, col.label, icSpan);
    const onSort = () => {
      sortDir = (sortKey === key) ? (sortDir === 'asc' ? 'desc' : 'asc') : col.firstDir;
      sortKey = key;
      renderBody();
    };
    btn.addEventListener('click', onSort);
    btn.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); onSort(); }
    });
    th.appendChild(btn);
    headTr.appendChild(th);
    headerBtns[key] = { th, btn, icSpan };
  }
  table.appendChild(el('thead', {}, headTr));

  // Build one <tr> from an enriched row (synchronous; reused on every re-sort).
  function buildRow(er) {
    const { r, team, teamName, code } = er;
    const tr = el('tr', { class: `${er.isQual ? 'qual' : ''}${er.isThird ? 'third' : ''}`.trim() || null });

    // # — the team's true league position; tinted for qualification zones via the row class.
    tr.appendChild(el('td', { class: 'lft' }, el('span', { class: 'pos' }, String(er.rank)), (r && r.live) ? el('span', { class: 'live-dot', title: 'In play' }) : null));

    // Team — flag + code + full name; the whole cell links to the team page.
    const teamCell = el('td', { class: 'team lft' });
    const link = el('a', {
      class: 'team-inner',
      href: team ? `/wc/team/${team.fifa_code}` : '#',
      'aria-label': team?.name || teamName || 'TBD',
    });
    const fl = el('span', { class: 'flag wc-flag' });
    if (team && flagSrc(team.fifa_code)) fl.style.backgroundImage = `url(${flagSrc(team.fifa_code)})`;
    else fl.classList.add('tbd');
    link.appendChild(fl);
    link.appendChild(el('span', { class: 'cd' }, code));
    teamCell.appendChild(link);
    tr.appendChild(teamCell);

    // P W D L — GF/GA dropped from the compact view (GD summarises them; full set on the team page)
    tr.appendChild(el('td', { class: 'lt' }, r ? String(r.played ?? 0) : '–'));
    tr.appendChild(el('td', {}, r ? String(r.won ?? 0) : '–'));
    tr.appendChild(el('td', {}, r ? String(r.drawn ?? 0) : '–'));
    tr.appendChild(el('td', { class: 'lt' }, r ? String(r.lost ?? 0) : '–'));

    // GD — colored via tokens
    const gd = gdOf(er);
    tr.appendChild(el('td', { class: gd > 0 ? 'gd-pos' : (gd < 0 ? 'gd-neg' : '') },
      r ? (gd > 0 ? `+${gd}` : String(gd)) : '–'));

    // PTS
    tr.appendChild(el('td', {}, el('span', { class: 'pts' }, r ? String(r.points ?? 0) : '–')));

    // ADV — prominent modelled qualification odds (filled async by the forecast)
    const advTd = el('td', { class: 'adv' });
    const advWrap = el('div', { class: 'adv-wrap' });
    if (team?.fifa_code) advWrap.setAttribute('data-adv', team.fifa_code);
    advWrap.appendChild(el('span', { class: 'adv-pend' }, '·'));
    advTd.appendChild(advWrap);
    tr.appendChild(advTd);

    return tr;
  }

  const tbody = el('tbody');
  table.appendChild(tbody);

  // Sort `enriched` by the active column/direction and repaint the tbody, then
  // update each header's aria-sort + direction icon and re-apply the forecast
  // (so the ADV cells, which key off the DOM, refill after the rows are replaced).
  function renderBody() {
    const col = SORT_COLS[sortKey];
    const sign = sortDir === 'asc' ? 1 : -1;
    const rows = enriched.slice().sort((a, b) => {
      let va = col.get(a), vb = col.get(b);
      // Null/empty rows always sink to the bottom regardless of direction.
      const na = va == null, nb = vb == null;
      if (na && nb) return a.rank - b.rank;
      if (na) return 1;
      if (nb) return -1;
      if (va !== vb) return (va - vb) * sign;
      return a.rank - b.rank; // stable tiebreak by league position
    });
    tbody.innerHTML = '';
    for (const er of rows) tbody.appendChild(buildRow(er));

    for (const [key, h] of Object.entries(headerBtns)) {
      const active = key === sortKey;
      h.th.setAttribute('aria-sort', active ? (sortDir === 'asc' ? 'ascending' : 'descending') : 'none');
      h.icSpan.innerHTML = active ? icon(sortDir === 'asc' ? 'arrow-up' : 'arrow-down', { size: 12 }) : '';
    }

    if (state.forecast) applyForecast();
  }

  renderBody(); // initial paint with the default sort (league position, ascending)
  stand.appendChild(table);
  card.appendChild(stand);
  stakesNode.dataset.stakes = JSON.stringify(rowTeams);
  if (state.forecast) fillStakes(stakesNode);

  // Accordion of remaining fixtures / recent results
  const accord = el('div', { class: 'accord', id: accordId });
  const inner = el('div', { class: 'accord-inner' });
  inner.appendChild(el('div', { class: 'lbl' }, remaining > 0 ? 'Remaining fixtures' : 'Recent results'));
  const showMatches = remaining > 0
    ? matchesInGroup.filter(m => m.status !== 'finished').sort((a, b) => new Date(a.kickoff_utc) - new Date(b.kickoff_utc))
    : matchesInGroup.filter(m => m.status === 'finished').sort((a, b) => new Date(b.kickoff_utc) - new Date(a.kickoff_utc));

  for (const m of showMatches.slice(0, 6)) {
    const kickoff = new Date(m.kickoff_utc);
    const home = await resolveTeam(m.home_team);
    const away = await resolveTeam(m.away_team);
    const homeCode = home?.fifa_code || m.home_team_source || '?';
    const awayCode = away?.fifa_code || m.away_team_source || '?';
    const row = el('a', { class: 'fix-row', href: `/wc/game/${m.id}` });
    row.appendChild(el('div', { class: 'when' },
      dayLabel(kickoff).replace(/^\w+, /, ''), ' · ',
      el('span', { class: 't' }, timeLabel(kickoff)),
    ));
    const grid3 = el('div', { class: 'grid3' });

    // Home side. Knockout placeholders (no team) show the source text.
    const t1 = el('div', { class: 't1' });
    if (home) {
      t1.appendChild(document.createTextNode(homeCode));
      // data-popup-team opens the team popup for this side, taking precedence over
      // the row's match anchor (popup.js delegation).
      t1.setAttribute('data-popup-team', home.fifa_code);
      t1.style.cursor = 'pointer';
      const fl1 = el('span', { class: 'ff wc-flag' });
      if (flagSrc(home.fifa_code)) fl1.style.backgroundImage = `url(${flagSrc(home.fifa_code)})`;
      else fl1.classList.add('tbd');
      t1.appendChild(fl1);
    } else {
      t1.appendChild(el('span', { class: 'lbl-ko' }, homeCode));
    }

    let middle;
    if (m.status === 'finished') middle = el('span', { class: 'mid score' }, `${m.home_score}–${m.away_score}`);
    else if (m.status === 'live') middle = el('span', { class: 'mid score live' }, `${m.home_score ?? 0}–${m.away_score ?? 0}`);
    else middle = el('span', { class: 'mid' }, 'v');

    // Away side.
    const t2 = el('div', { class: 't2' });
    if (away) {
      t2.setAttribute('data-popup-team', away.fifa_code);
      t2.style.cursor = 'pointer';
      const fl2 = el('span', { class: 'ff wc-flag' });
      if (flagSrc(away.fifa_code)) fl2.style.backgroundImage = `url(${flagSrc(away.fifa_code)})`;
      else fl2.classList.add('tbd');
      t2.appendChild(fl2);
      t2.appendChild(document.createTextNode(awayCode));
    } else {
      t2.appendChild(el('span', { class: 'lbl-ko' }, awayCode));
    }

    grid3.appendChild(t1); grid3.appendChild(middle); grid3.appendChild(t2);
    row.appendChild(grid3);
    row.appendChild(el('div', { class: 'ven' }, m.stadium || ''));
    inner.appendChild(row);
  }
  if (!showMatches.length) {
    inner.appendChild(el('div', { class: 'none' }, 'Fixtures for this group are not yet wired.'));
  }
  accord.appendChild(inner);
  card.appendChild(accord);

  // Restore open state across re-renders (live polling rebuilds the cards).
  if (openGroups.has(letter)) {
    card.setAttribute('data-open', '');
    head.setAttribute('aria-expanded', 'true');
    // measure after layout so scrollHeight is correct
    requestAnimationFrame(() => { accord.style.maxHeight = accord.scrollHeight + 24 + 'px'; });
  }

  // Wire up the toggle
  head.addEventListener('click', () => {
    const isOpen = card.hasAttribute('data-open');
    if (isOpen) {
      card.removeAttribute('data-open');
      head.setAttribute('aria-expanded', 'false');
      accord.style.maxHeight = '0';
      openGroups.delete(letter);
    } else {
      card.setAttribute('data-open', '');
      head.setAttribute('aria-expanded', 'true');
      accord.style.maxHeight = accord.scrollHeight + 24 + 'px';
      openGroups.add(letter);
    }
  });

  return card;
}

bootstrap().catch(err => {
  console.error(err);
  document.getElementById('grid').innerHTML =
    `<div class="error">Couldn't load groups: ${String(err && err.message || err)}.</div>`;
});
</script>
</body>
</html>
