<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Team · World Cup 26</title>
<link rel="icon" type="image/svg+xml" href="/wc/assets/emblem.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem("wc-theme");if(t!=="light"&&t!=="dark")t=(window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
<link rel="stylesheet" href="/wc/lib/shell.css" data-wc-shell-css>
<link rel="modulepreload" href="/wc/lib/shell.js">
<style id="shell-css"></style>
<style id="detail-css"></style>
<style>
  /* Title + emblem live in the nav now; the renderer paints its own team
     content hero (which bleeds out with a -22px top margin), so give the content
     area enough top pad to clear the fixed nav and absorb that bleed cleanly. */
  main{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:30px 26px 120px}
  @media (max-width:720px){ main{padding:26px 20px 80px} }
</style>
</head>
<body>
<main>
  <div id="content"></div>
</main>
<script type="module">
import { SHELL_CSS, injectShell } from '/wc/lib/shell.js';
import { teamCss, renderTeamInto } from '/wc/lib/render-team.js';
import { getTeams48 } from '/wc/lib/data.js';

document.getElementById('shell-css').textContent = SHELL_CSS;
document.getElementById('detail-css').textContent = teamCss;
injectShell({ subtitle: 'Team Profile' });
getTeams48().catch(() => {});

const m = location.pathname.match(/\/wc\/team\/([A-Za-z]{3})/);
const container = document.getElementById('content');
if (m) {
  renderTeamInto(container, m[1].toUpperCase()).catch(err => {
    container.innerHTML = `<div class="td-error">${String(err && err.message || err)}</div>`;
  });
} else {
  container.innerHTML = `<div class="td-error">Couldn't parse a team code from this URL. Try <code>/wc/team/USA</code>.</div>`;
}
</script>
</body>
</html>
