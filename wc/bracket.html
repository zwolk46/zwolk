<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bracket · World Cup 26</title>
<link rel="icon" type="image/svg+xml" href="/wc/assets/emblem.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&display=swap" rel="stylesheet">
<style id="shell-css"></style>
<style>
  /* page-local palette: bracket page is deep green */
  html,body{background:#062b19}
  body{color:#eef3ea;background:linear-gradient(180deg,#073a22 0%,#062b19 42%,#04210f 100%) fixed}
  #wc-nav{background:rgba(6,43,25,0)}
  #wc-nav-buttons a{background:#0c3a22;border-color:#155234;color:#bcd1c2}
  #wc-nav-buttons a.active{background:var(--accent);color:#062b19;border-color:transparent}
  #wc-hero-logo .wc-nav-emblem{background:#eef3ea}
  .wc-watermark{left:50% !important;right:auto !important;top:54% !important;transform:translate(-50%,-50%) !important}
  ::-webkit-scrollbar-track{background:#062b19}
  ::-webkit-scrollbar-thumb{background:#155f37;border-color:#062b19}

  main{position:relative;z-index:1;padding:24px 0 80px}
  header.hero{position:relative;z-index:1;max-width:1320px;margin:0 auto;padding:52px 28px 8px}
  .hero-spacer{height:172px}
  @media (max-width:720px){ .hero-spacer{height:120px} }

  /* Lock banner */
  .lock{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-top:26px;padding:18px 22px;background:rgba(245,199,18,0.08);border:1.5px solid var(--accent);border-radius:16px}
  .lock .icon{display:flex;align-items:center;justify-content:center;width:48px;height:48px;flex:none;border-radius:13px;background:var(--accent)}
  .lock .text{flex:1;min-width:260px}
  .lock .h{font-family:Anton;font-size:clamp(21px,2.6vw,32px);color:var(--accent);text-transform:uppercase;line-height:0.95}
  .lock .sub{font-family:Archivo;font-weight:600;font-size:14px;line-height:1.45;color:#cfe0d2;margin-top:6px}
  .lock .days{text-align:center;flex:none;padding:9px 20px;background:#062b19;border:1px solid var(--accent);border-radius:13px}
  .lock .days .n{font-family:Anton;font-size:42px;color:#eef3ea;line-height:0.85}
  .lock .days .l{font-family:Archivo;font-weight:800;font-size:10px;letter-spacing:0.13em;text-transform:uppercase;color:var(--accent);margin-top:3px}

  .key{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:20px;font-family:Archivo;font-weight:700;font-size:12px;letter-spacing:0.04em;color:#9bbaa2}
  .key span{display:flex;align-items:center;gap:9px}
  .key svg path{stroke:var(--accent)}

  /* Bracket grid */
  .bracket-wrap{position:relative;z-index:1;overflow-x:auto;padding:24px 28px 72px}
  .bracket-wrap.locked{filter:grayscale(0.7) opacity(0.55)}
  .bracket{position:relative;display:flex;gap:32px;align-items:stretch;min-width:max-content}
  .column{position:relative;z-index:1;display:flex;flex-direction:column;flex:none}
  .col-head{padding:4px 2px 16px}
  .col-head .lbl{font-family:Anton;font-size:clamp(20px,2.4vw,30px);color:#eef3ea;text-transform:uppercase;line-height:0.9}
  .col-head .sub{font-family:Archivo;font-weight:700;font-size:12px;letter-spacing:0.06em;color:var(--accent);margin-top:5px}
  .col-matches{flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:14px}

  .match{position:relative;background:rgba(255,255,255,0.05);border:1px solid #1a5634;border-radius:12px;padding:12px 14px;transition:transform .28s cubic-bezier(.2,.95,.3,1.35),border-color .25s,background .25s;cursor:pointer;text-decoration:none;color:inherit}
  .match:hover{transform:translateY(-4px);border-color:var(--accent);background:rgba(255,255,255,0.085)}
  .match .h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .match .no{font-family:Anton;font-size:12px;letter-spacing:0.08em;color:var(--accent)}
  .match .when{font-family:Archivo;font-weight:700;font-size:11px;color:#8fb098;white-space:nowrap}
  .match .team{font-family:Archivo;font-weight:800;font-size:15px;color:#eef3ea;line-height:1.15;display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit}
  .match .team:hover{color:var(--accent)}
  .match .team .flag{width:22px;height:16px;border-radius:3px;background-size:cover;background-position:center;flex:none}
  .match .team.tbd{color:#7fa088;font-style:italic;font-weight:600}
  .match .sep{display:flex;align-items:center;gap:8px;margin:5px 0;font-family:Anton;font-size:11px;color:#6f9079}
  .match .sep .line{height:1px;flex:1;background:#1a5634}
  .match .ven{font-family:Archivo;font-weight:600;font-size:11px;color:#7fa088;margin-top:9px;padding-top:8px;border-top:1px solid #133f25}
  .match.live{border-color:#ff6a6f;background:rgba(255,106,111,0.08)}
  .match.live .no{color:#ff6a6f}
  .match.finished{border-color:rgba(245,199,18,0.4)}
  .match .score{margin-left:auto;font-family:Anton;font-size:18px;color:var(--accent)}

  /* Final column */
  .final-col{display:flex;flex-direction:column;justify-content:center;width:336px;flex:none}
  .final{position:relative;background:linear-gradient(165deg,#0a3c23,#072c19);border:2px solid var(--accent);border-radius:20px;padding:22px 22px 24px;text-align:center;overflow:hidden}
  .final img{height:92px;margin:2px auto 12px;display:block;background:#eef3ea;border-radius:12px;padding:8px 10px}
  .final .ttl{font-family:Anton;font-size:38px;line-height:0.85;color:var(--accent);text-transform:uppercase}
  .final .meta{font-family:Archivo;font-weight:800;font-size:12px;letter-spacing:0.1em;color:#bcd1c2;margin-top:7px}
  .final .teams{margin-top:14px;padding-top:14px;border-top:1px solid #155234;display:flex;flex-direction:column;gap:10px}
  .final .teams .t{font-family:Archivo;font-weight:800;font-size:14px;color:#eef3ea;text-align:center}
  .final .teams .t.tbd{color:#8fb098;font-style:italic;font-weight:600}
  .final .ven{font-family:Archivo;font-weight:600;font-size:11px;color:#7fa088;margin-top:12px}

  .third-row{margin-top:30px;display:flex;justify-content:center;padding:0 28px}
  .third{max-width:340px;background:rgba(231,194,0,0.08);border:1.5px solid #c9a227;border-radius:14px;padding:14px 18px;text-decoration:none;color:inherit}
  .third .ttl{font-family:Archivo;font-weight:900;font-size:11px;letter-spacing:0.14em;color:#c9a227;text-transform:uppercase;margin-bottom:8px;text-align:center}
  .third .meta{font-family:Archivo;font-weight:700;font-size:11px;color:#8fb098;text-align:center;margin-top:6px}

  .loading{padding:60px 20px;text-align:center;font-family:Archivo;font-weight:700;font-size:13px;color:#8fb098}
  .loading::before{content:'';display:inline-block;width:14px;height:14px;border:2px solid #1a5634;border-top-color:var(--accent);border-radius:50%;animation:wc-spin .9s linear infinite;vertical-align:middle;margin-right:10px}
  .error{padding:30px 20px;text-align:center;font-family:Archivo;font-weight:600;font-size:13px;color:#ff6a6f;background:#1c0e10;border:1px solid #3a1820;border-radius:12px;max-width:580px;margin:30px auto}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-spacer"></div>
  <div class="lock" id="lock">
    <div class="icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="4.5" y="10.5" width="15" height="9.5" rx="2.2" fill="#062b19"></rect><path d="M7.5 10.5 V8 a4.5 4.5 0 0 1 9 0 V10.5" stroke="#062b19" stroke-width="2.3" fill="none"></path></svg>
    </div>
    <div class="text">
      <div class="h" id="lock-h">Loading bracket status…</div>
      <div class="sub" id="lock-sub"></div>
    </div>
    <div class="days" id="lock-days" style="display:none">
      <div class="n" id="lock-days-n">—</div>
      <div class="l">days to go</div>
    </div>
  </div>
  <div class="key">
    <span><svg width="34" height="12" style="overflow:visible"><path d="M1 6 H33" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-opacity="0.5" stroke-dasharray="7 7"/></svg>To be played</span>
    <span><svg width="34" height="12" style="overflow:visible"><path d="M1 6 H33" fill="none" stroke="var(--accent)" stroke-width="2.6" stroke-opacity="0.95"/></svg>Decided</span>
  </div>
</header>

<main>
  <div class="bracket-wrap" id="wrap"><div class="loading">Loading bracket…</div></div>
  <div class="third-row" id="third-row"></div>
</main>

<script type="module">
import { SHELL_CSS, injectShell, revealVisible } from '/wc/lib/shell.js';
import * as api from '/wc/lib/api.js';
import { getTeams48, resolveTeam, getMatchesSample } from '/wc/lib/data.js';
import { flagSrc } from '/wc/lib/flags.js';
import { dayLabel, timeLabel } from '/wc/lib/format.js';
import { enablePopupLinks } from '/wc/lib/popup.js';
enablePopupLinks();

document.getElementById('shell-css').textContent = SHELL_CSS;
injectShell({ active: 'bracket', subtitle: 'Road to the Final' });

const ROUND_ORDER = ['round_of_32', 'round_of_16', 'quarter_final', 'semi_final'];
const ROUND_META = {
  round_of_32:   { label: 'Round of 32',   sub: 'Jun 28 – Jul 3',  width: '236px' },
  round_of_16:   { label: 'Round of 16',   sub: 'Jul 4 – Jul 7',   width: '236px' },
  quarter_final: { label: 'Quarterfinals', sub: 'Jul 9 – Jul 11',  width: '236px' },
  semi_final:    { label: 'Semifinals',    sub: 'Jul 14 – Jul 15', width: '256px' },
};

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (v != null) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  }
  return e;
}

// Live cadence (knockout): 75s, same budget logic as fixtures/groups.
const POLL_LIVE_MS = 75_000;
let _pollTimer = null;
function shouldPollLive(matches) {
  const now = Date.now();
  for (const m of matches) {
    if (m.status === 'live') return true;
    const ko = m.kickoff_utc ? new Date(m.kickoff_utc).getTime() : 0;
    if (m.status === 'scheduled' && ko && (ko - now) < 15 * 60_000 && (ko - now) > -180 * 60_000) return true;
  }
  return false;
}
function scheduleLivePoll(matches) {
  if (_pollTimer) clearTimeout(_pollTimer);
  _pollTimer = null;
  if (!shouldPollLive(matches)) return;
  _pollTimer = setTimeout(() => {
    if (document.hidden) { scheduleLivePoll(matches); return; }
    bootstrap().catch(() => {});   // re-fetch + re-render the bracket
  }, POLL_LIVE_MS);
}

async function bootstrap() {
  await getTeams48().catch(() => {});
  let matches = [];
  try {
    const r = await api.getMatches();
    const arr = Array.isArray(r) ? r : (r?.data || []);
    matches = Array.isArray(arr) ? arr : [];
  } catch (e) {
    matches = [];
  }
  // Fall back to the complete local schedule if the live API is unavailable/empty,
  // so the bracket always renders the full knockout tree.
  if (!matches.length) {
    try { matches = await getMatchesSample(); } catch {}
  }
  if (!matches.length) {
    document.getElementById('wrap').innerHTML =
      `<div class="error">Couldn't load matches.</div>`;
    return;
  }

  const ko = matches.filter(m => m.round && m.round !== 'group');

  // Lock banner
  setLockBanner(ko);

  // Bracket render
  const wrap = document.getElementById('wrap');
  wrap.innerHTML = '';
  const isLocked = ko.every(m => !m.home_team && !m.away_team);
  if (isLocked) wrap.classList.add('locked');

  const bracket = el('div', { class: 'bracket' });
  for (const round of ROUND_ORDER) {
    const colMatches = ko.filter(m => m.round === round).sort((a, b) => (a.match_number || 0) - (b.match_number || 0));
    if (!colMatches.length) continue;
    const meta = ROUND_META[round];
    const col = el('div', { class: 'column', style: `width:${meta.width}` });
    col.appendChild(el('div', { class: 'col-head' },
      el('div', { class: 'lbl' }, meta.label),
      el('div', { class: 'sub' }, meta.sub + ` · ${colMatches.length} match${colMatches.length > 1 ? 'es' : ''}`),
    ));
    const list = el('div', { class: 'col-matches' });
    for (const m of colMatches) list.appendChild(await buildMatchCard(m));
    col.appendChild(list);
    bracket.appendChild(col);
  }

  // Final column
  const final = ko.find(m => m.round === 'final');
  if (final) {
    const fc = el('div', { class: 'final-col' }, await buildFinalCard(final));
    bracket.appendChild(fc);
  }

  wrap.appendChild(bracket);

  // Third-place row (full-width below)
  const third = ko.find(m => m.round === 'third_place');
  const thirdRow = document.getElementById('third-row');
  thirdRow.innerHTML = '';
  if (third) thirdRow.appendChild(await buildThirdPlaceCard(third));

  requestAnimationFrame(revealVisible);
  scheduleLivePoll(matches);   // keep knockout scores live while ties are being played
}

function setLockBanner(ko) {
  const now = new Date();
  const r32First = ko.filter(m => m.round === 'round_of_32').sort((a, b) => new Date(a.kickoff_utc) - new Date(b.kickoff_utc))[0];
  if (!r32First) {
    document.getElementById('lock-h').textContent = 'Bracket data unavailable';
    document.getElementById('lock-sub').textContent = 'The knockout schedule will appear once wc2026api.com publishes it.';
    return;
  }
  const opens = new Date(r32First.kickoff_utc);
  if (now < opens) {
    const days = Math.ceil((opens - now) / 86_400_000);
    document.getElementById('lock-h').textContent = `Bracket opens ${dayLabel(opens)}`;
    document.getElementById('lock-sub').textContent = `The knockout draw locks until the group stage ends. Matchups fill in once the final group games finish on Jun 27.`;
    document.getElementById('lock-days').style.display = '';
    document.getElementById('lock-days-n').textContent = days;
  } else {
    document.getElementById('lock-h').textContent = `Bracket is live`;
    document.getElementById('lock-sub').textContent = `Knockout matches in progress. Click a tie for the full match centre.`;
    document.getElementById('lock-days').style.display = 'none';
    document.getElementById('lock').style.borderColor = '#1ea85a';
    document.getElementById('lock').style.background = 'rgba(30,168,90,0.08)';
  }
}

async function buildMatchCard(m) {
  const home = await resolveTeam(m.home_team);
  const away = await resolveTeam(m.away_team);
  const a = el('a', { class: 'match' + (m.status === 'live' ? ' live' : '') + (m.status === 'finished' ? ' finished' : ''), href: `/wc/game/${m.id}` });
  const kickoff = new Date(m.kickoff_utc);
  a.appendChild(el('div', { class: 'h' },
    el('span', { class: 'no' }, `MATCH ${m.match_number || m.id}`),
    el('span', { class: 'when' }, `${dayLabel(kickoff).replace(/^\w+, /, '')} · ${timeLabel(kickoff)}`),
  ));
  a.appendChild(teamRow(home, m.home_team_source, m.home_score, m.status === 'finished'));
  a.appendChild(el('div', { class: 'sep' },
    el('span', { class: 'line' }),
    el('span', {}, 'VS'),
    el('span', { class: 'line' }),
  ));
  a.appendChild(teamRow(away, m.away_team_source, m.away_score, m.status === 'finished'));
  if (m.stadium) a.appendChild(el('div', { class: 'ven' }, m.stadium));
  return a;
}

function teamRow(team, sourceText, score, finished) {
  const row = el('div', { class: 'team' + (team ? '' : ' tbd') });
  if (team) {
    // data-popup-team lets the delegated handler open the team popup for this
    // slot, taking precedence over the parent match anchor (see popup.js).
    row.setAttribute('data-popup-team', team.fifa_code);
    row.style.cursor = 'pointer';
    const fl = el('span', { class: 'flag' });
    if (flagSrc(team.fifa_code)) fl.style.backgroundImage = `url(${flagSrc(team.fifa_code)})`;
    row.appendChild(fl);
    row.appendChild(document.createTextNode(team.fifa_code + ' '));
    const sub = el('span', { style: 'font-weight:600;font-size:11px;color:#7fa088;margin-left:4px' }, team.name);
    row.appendChild(sub);
  } else {
    row.appendChild(document.createTextNode(sourceText || 'TBD'));
  }
  if (finished && score != null) row.appendChild(el('span', { class: 'score' }, String(score)));
  return row;
}

async function buildFinalCard(m) {
  const home = await resolveTeam(m.home_team);
  const away = await resolveTeam(m.away_team);
  const a = el('a', { class: 'final', href: `/wc/game/${m.id}` });
  a.appendChild(el('img', { src: '/wc/assets/emblem.svg', alt: '' }));
  a.appendChild(el('div', { class: 'ttl' }, 'The Final'));
  const kickoff = new Date(m.kickoff_utc);
  a.appendChild(el('div', { class: 'meta' }, `MATCH ${m.match_number || m.id} · ${dayLabel(kickoff).replace(/^\w+, /, '')} ${timeLabel(kickoff)}`));
  const teams = el('div', { class: 'teams' });
  teams.appendChild(finalTeam(home, m.home_team_source, m.home_score, m.status === 'finished'));
  teams.appendChild(el('div', { style: 'font-family:Anton;font-size:14px;color:#6f9079' }, 'VS'));
  teams.appendChild(finalTeam(away, m.away_team_source, m.away_score, m.status === 'finished'));
  a.appendChild(teams);
  if (m.stadium) a.appendChild(el('div', { class: 'ven' }, m.stadium));
  return a;
}
function finalTeam(team, sourceText, score, finished) {
  const t = el('div', { class: 't' + (team ? '' : ' tbd') });
  if (team) {
    t.setAttribute('data-popup-team', team.fifa_code);
    t.style.cursor = 'pointer';
    t.innerHTML = `${team.fifa_code} <span style="font-weight:600;font-size:12px;color:#8fb098;margin-left:4px">${team.name}</span>`;
    if (finished && score != null) t.innerHTML += ` <span style="font-family:Anton;font-size:18px;color:var(--accent);margin-left:8px">${score}</span>`;
  } else {
    t.textContent = sourceText || 'TBD';
  }
  return t;
}

async function buildThirdPlaceCard(m) {
  const home = await resolveTeam(m.home_team);
  const away = await resolveTeam(m.away_team);
  const a = el('a', { class: 'third', href: `/wc/game/${m.id}` });
  a.appendChild(el('div', { class: 'ttl' }, 'Third-place match'));
  const kickoff = new Date(m.kickoff_utc);
  const homeS = home ? home.fifa_code : (m.home_team_source || 'TBD');
  const awayS = away ? away.fifa_code : (m.away_team_source || 'TBD');
  a.appendChild(el('div', { style: 'font-family:Anton;font-size:22px;color:#eef3ea;text-align:center' }, `${homeS} vs ${awayS}`));
  a.appendChild(el('div', { class: 'meta' }, `Match ${m.match_number} · ${dayLabel(kickoff).replace(/^\w+, /, '')} ${timeLabel(kickoff)} · ${m.stadium || ''}`));
  return a;
}

bootstrap();
</script>
</body>
</html>
