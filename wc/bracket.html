<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Bracket · World Cup 26</title>
<link rel="icon" type="image/svg+xml" href="/wc/assets/emblem.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<script>(function(){try{var t=localStorage.getItem("wc-theme");if(t!=="light"&&t!=="dark")t=(window.matchMedia&&window.matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark";document.documentElement.setAttribute("data-theme",t);}catch(e){document.documentElement.setAttribute("data-theme","dark");}})();</script>
<link rel="stylesheet" href="/wc/lib/shell.css" data-wc-shell-css>
<link rel="modulepreload" href="/wc/lib/shell.js">
<style id="shell-css"></style>
<style>
  /* ── Bracket page — fully token-driven; both themes; no bespoke palette ── */
  main{position:relative;z-index:1;padding:8px 0 96px}
  /* Title + emblem live in the nav now; the lock banner leads the page. */
  header.hero{position:relative;z-index:1;max-width:var(--content);margin:0 auto;padding:18px 28px 8px}

  /* ── Lock / status banner ── */
  .lock{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-top:0;padding:18px 22px;
    background:var(--accent-quiet);border:1px solid var(--accent-line);border-radius:var(--r-lg)}
  .lock.open{background:var(--success-quiet);border-color:var(--success)}
  .lock .ic{display:flex;align-items:center;justify-content:center;width:48px;height:48px;flex:none;
    border-radius:var(--r-md);background:var(--accent);color:var(--on-accent)}
  .lock.open .ic{background:var(--success);color:var(--on-accent)}
  .lock .ic .wc-ic{width:26px;height:26px}
  .lock .text{flex:1;min-width:240px}
  .lock .h{font-family:var(--f-display);font-size:clamp(21px,2.6vw,32px);color:var(--accent-text);
    text-transform:uppercase;line-height:.95}
  .lock.open .h{color:var(--success-text)}
  .lock .sub{font-family:var(--f-body);font-weight:600;font-size:14px;line-height:1.45;color:var(--text-2);margin-top:6px}
  .lock .days{text-align:center;flex:none;padding:9px 20px;background:var(--surface-1);border:1px solid var(--accent-line);border-radius:var(--r-md)}
  .lock .days .n{font-family:var(--f-display);font-size:42px;color:var(--text);line-height:.85;font-variant-numeric:tabular-nums}
  .lock .days .l{font-family:var(--f-body);font-weight:800;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--accent-text);margin-top:3px}

  /* ── Connector legend (desktop only) ── */
  .key{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-top:20px;
    font-family:var(--f-body);font-weight:700;font-size:12px;letter-spacing:.04em;color:var(--text-3)}
  .key span{display:flex;align-items:center;gap:9px}
  .key i{width:30px;height:0;border-top:2px solid var(--border-strong);display:inline-block}
  .key .decided i{border-top-color:var(--accent);border-top-width:2.4px}
  .key .toplay i{border-top-style:dashed;border-top-color:var(--accent-line)}

  /* ════════════════════════════════════════════════════════════════════════
     DESKTOP BRACKET — connectors are a MEASURED SVG OVERLAY (see the inline
     <script>: drawConnectors()). The overlay spans the scrolling bracket area,
     sits behind the cards, and draws orthogonal "elbow" links from each pair of
     feeder cards to their target card's mid-left. Geometry comes from each
     card's getBoundingClientRect() (recomputed on load + resize), so it's robust
     to variable card heights and the columns' space-around distribution. Feeders
     are derived from the match data's "Winner of Match N" source refs (NON-adjacent
     pairing), never from vertical position.
     ════════════════════════════════════════════════════════════════════════ */
  .bracket-wrap{position:relative;z-index:1;overflow-x:auto;padding:24px 28px 72px;
    --round-gap:64px}
  .bracket-wrap.locked{filter:grayscale(.55) opacity(.6)}
  .bracket{position:relative;display:flex;align-items:stretch;min-width:max-content}

  /* SVG connector overlay — absolutely positioned over .bracket, behind cards. */
  .bracket-links{position:absolute;top:0;left:0;pointer-events:none;z-index:0;overflow:visible}
  .bracket-links path{fill:none;stroke-linejoin:round;stroke-linecap:round}
  /* cards sit above the overlay so connectors read as "behind" them */
  .column,.final-col{position:relative;z-index:1}
  .column{position:relative;display:flex;flex-direction:column;justify-content:space-around;flex:none}
  .column:not(:last-child){margin-right:var(--round-gap)}
  .col-head{padding:4px 2px 16px}
  .col-head .lbl{font-family:var(--f-display);font-size:clamp(20px,2.4vw,30px);color:var(--text);text-transform:uppercase;line-height:.9}
  .col-head .sub{font-family:var(--f-body);font-weight:700;font-size:12px;letter-spacing:.06em;color:var(--accent-text);margin-top:5px}
  .col-matches{flex:1;display:flex;flex-direction:column;justify-content:space-around;gap:18px}

  /* match card */
  .match{position:relative;display:block;background:var(--surface-1);border:1px solid var(--border);
    border-radius:var(--r-md);padding:12px 14px;text-decoration:none;color:inherit;cursor:pointer;
    box-shadow:var(--sh-1);
    transition:transform var(--dur-2) var(--ease-press),border-color var(--dur-2),box-shadow var(--dur-2),background var(--dur-2)}
  .match:hover{transform:translateY(-3px);border-color:var(--accent-line);box-shadow:var(--sh-3)}
  .match .h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}
  .match .when{font-family:var(--f-body);font-weight:700;font-size:11px;color:var(--text-3);white-space:nowrap;font-variant-numeric:tabular-nums}
  .match .no{font-family:var(--f-display);font-size:12px;letter-spacing:.06em;color:var(--accent-text)}

  /* per-team row */
  .trow{display:flex;align-items:center;gap:9px;padding:4px 0;font-family:var(--f-body);font-weight:800;
    font-size:14px;color:var(--text);line-height:1.15;text-decoration:none}
  .trow:hover{color:var(--accent-text)}
  .trow .flag{width:24px;height:17px;border-radius:3px;flex:none}
  .trow.tbd{color:var(--text-2);font-style:italic;font-weight:600;cursor:default}
  .trow .code{letter-spacing:.01em}
  .trow .nm{font-weight:600;font-size:11px;color:var(--text-3);margin-left:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .trow .src{font-weight:600;font-size:12.5px;color:var(--text-2)}
  .trow .score{margin-left:auto;font-family:var(--f-mono);font-weight:800;font-size:17px;color:var(--text-2);font-variant-numeric:tabular-nums}
  .trow.win .code{color:var(--accent-text)}
  .trow.win .score{color:var(--accent-text)}
  .tsep{height:1px;background:var(--border-subtle);margin:1px 0}
  .match .ven{display:flex;align-items:center;gap:6px;font-family:var(--f-body);font-weight:600;font-size:11px;
    color:var(--text-3);margin-top:9px;padding-top:8px;border-top:1px solid var(--border-subtle)}
  .match .ven .wc-ic{width:13px;height:13px;color:var(--text-3)}

  /* finished / live states */
  .match.finished{background:var(--surface-sunken);border-color:var(--accent-line)}
  .match.live{border-color:var(--live);background:var(--live-quiet)}
  .match .h .badge-slot{display:flex}

  /* ── Final card (distinct gold treatment, terminal node) ── */
  .final-col{display:flex;flex-direction:column;justify-content:center;width:320px;flex:none}
  .final{position:relative;display:block;background:var(--surface-1);border:1.5px solid var(--accent-line);
    border-radius:var(--r-xl);padding:22px 22px 24px;text-align:center;text-decoration:none;color:inherit;
    box-shadow:var(--sh-2);transition:transform var(--dur-2) var(--ease-press),border-color var(--dur-2),box-shadow var(--dur-2)}
  .final:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--sh-3)}
  .final .crown{width:54px;height:54px;margin:0 auto 10px;border-radius:var(--r-md);display:grid;place-items:center;
    background:var(--accent);color:var(--on-accent)}
  .final .crown .wc-ic{width:30px;height:30px}
  .final .ttl{font-family:var(--f-display);font-size:36px;line-height:.85;color:var(--accent-text);text-transform:uppercase}
  .final .meta{font-family:var(--f-body);font-weight:800;font-size:12px;letter-spacing:.08em;color:var(--text-3);margin-top:7px;font-variant-numeric:tabular-nums}
  .final .teams{margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
  .final .teams .trow{justify-content:center;font-size:15px}
  .final .teams .trow .flag{width:26px;height:18px}
  .final .teams .vs{font-family:var(--f-display);font-size:14px;color:var(--text-3)}
  .final .ven{justify-content:center;border:0;padding:0;margin-top:12px}

  /* ── Third-place — a real match card, consistent with the tree ── */
  .third-row{display:flex;justify-content:center;padding:0 28px;margin-top:30px}
  .third-card{width:min(360px,100%)}
  .third-card .h .no{color:var(--text-2)}

  /* ════════════════════════════════════════════════════════════════════════
     MOBILE — sticky round tabs over scroll-snap panels (≤860px).
     Connectors are replaced by "winner advances to…" feed text.
     ════════════════════════════════════════════════════════════════════════ */
  .mbracket{display:none}
  .mbracket-tabs{position:sticky;top:var(--nav-h,64px);z-index:30;display:flex;gap:6px;overflow-x:auto;
    padding:10px 16px;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border-subtle);scrollbar-width:none;scroll-snap-type:x proximity}
  .mbracket-tabs::-webkit-scrollbar{display:none}
  .mtab{flex:0 0 auto;scroll-snap-align:center;font-family:var(--f-body);font-weight:800;font-size:12px;
    letter-spacing:.04em;text-transform:uppercase;padding:9px 15px;border-radius:var(--r-pill);
    border:1px solid var(--border);background:var(--surface-1);color:var(--text-2);cursor:pointer;
    transition:transform var(--dur-1) var(--ease-press),background var(--dur-2),border-color var(--dur-2),color var(--dur-2)}
  .mtab:active{transform:scale(.94)}
  .mtab[aria-selected="true"]{background:var(--accent);color:var(--on-accent);border-color:transparent}
  .mtab .n{opacity:.62;margin-left:4px;font-variant-numeric:tabular-nums}
  .mbracket-track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;scrollbar-width:none}
  .mbracket-track::-webkit-scrollbar{display:none}
  .mround{flex:0 0 100%;scroll-snap-align:start;display:flex;flex-direction:column;gap:12px;padding:16px 16px 36px}
  .mround-title{font-family:var(--f-display);font-size:24px;text-transform:uppercase;color:var(--text);line-height:.9;margin-bottom:2px}
  .mround-title .c{font-family:var(--f-body);font-weight:700;font-size:12px;color:var(--text-3);letter-spacing:.04em;margin-left:8px;text-transform:none}
  .mmatch-feed{margin-top:10px;padding-top:8px;border-top:1px solid var(--border-subtle);
    display:flex;align-items:center;gap:6px;font-family:var(--f-body);font-weight:600;font-size:11px;color:var(--text-2)}
  .mmatch-feed .wc-ic{width:13px;height:13px;color:var(--accent-text)}
  .mfinal-banner{display:flex;align-items:center;gap:10px;padding:14px 16px;margin-bottom:4px;
    background:var(--accent-quiet);border:1px solid var(--accent-line);border-radius:var(--r-md)}
  .mfinal-banner .wc-ic{width:22px;height:22px;color:var(--accent-text);flex:none}
  .mfinal-banner b{font-family:var(--f-display);font-size:18px;color:var(--accent-text);text-transform:uppercase;line-height:1}
  .mfinal-banner small{display:block;font-weight:600;font-size:11px;color:var(--text-2);margin-top:2px}

  @media (min-width:861px){ .mbracket{display:none !important} }
  @media (max-width:860px){
    .bracket-wrap,.third-row,.key{display:none}
    .mbracket{display:block}
    header.hero{padding:14px 16px 8px}
  }

  /* ── Loading / error ── */
  .loading{padding:60px 20px;text-align:center;font-family:var(--f-body);font-weight:700;font-size:13px;color:var(--text-3)}
  .loading::before{content:'';display:inline-block;width:14px;height:14px;border:2px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;animation:wc-spin .9s linear infinite;vertical-align:middle;margin-right:10px}
</style>
</head>
<body>

<header class="hero">
  <div class="lock" id="lock">
    <div class="ic" id="lock-ic"></div>
    <div class="text">
      <div class="h" id="lock-h">Loading bracket status…</div>
      <div class="sub" id="lock-sub"></div>
    </div>
    <div class="days" id="lock-days" style="display:none">
      <div class="n" id="lock-days-n">—</div>
      <div class="l">days to go</div>
    </div>
  </div>
  <div class="key" aria-hidden="true">
    <span class="toplay"><i></i>To be played</span>
    <span class="decided"><i></i>Decided</span>
  </div>
</header>

<main>
  <!-- Desktop: column tree with connectors -->
  <div class="bracket-wrap" id="wrap"><div class="loading">Loading bracket…</div></div>
  <div class="third-row" id="third-row"></div>

  <!-- Mobile: sticky round tabs + scroll-snap panels -->
  <div class="mbracket" id="mbracket"></div>
</main>

<script type="module">
import { SHELL_CSS, injectShell, revealVisible } from '/wc/lib/shell.js';
import * as api from '/wc/lib/api.js';
import { getTeams48, resolveTeam, getMatchesSample } from '/wc/lib/data.js';
import { flagSrc } from '/wc/lib/flags.js';
import { dayLabel, timeLabel } from '/wc/lib/format.js';
import { enablePopupLinks } from '/wc/lib/popup.js';
import { icon } from '/wc/lib/icons.js';
enablePopupLinks();

document.getElementById('shell-css').textContent = SHELL_CSS;
injectShell({ active: 'bracket', subtitle: 'Road to the Final' });

const ROUND_ORDER = ['round_of_32', 'round_of_16', 'quarter_final', 'semi_final'];
const ROUND_META = {
  round_of_32:   { label: 'Round of 32',   short: 'R32',     sub: 'Jun 28 – Jul 3' },
  round_of_16:   { label: 'Round of 16',   short: 'R16',     sub: 'Jul 4 – Jul 7' },
  quarter_final: { label: 'Quarterfinals', short: 'QF',      sub: 'Jul 9 – Jul 11' },
  semi_final:    { label: 'Semifinals',    short: 'SF',      sub: 'Jul 14 – Jul 15' },
  final:         { label: 'Final',         short: 'Final',   sub: 'Jul 19' },
};
// Map a round → the round it feeds into (for the mobile "advances to" text).
const NEXT_ROUND = {
  round_of_32: 'round_of_16',
  round_of_16: 'quarter_final',
  quarter_final: 'semi_final',
  semi_final: 'final',
};

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.style.cssText = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (v != null) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(c instanceof Node ? c : document.createTextNode(String(c)));
  }
  return e;
}

const isLiveMatch = (m) => m.status === 'live';
const isFinished  = (m) => m.status === 'finished';
// A match's slot is "decided" once both participants are real teams.
const isDecided   = (m) => !!(m.home_team && m.away_team);

// ── Connector model ──────────────────────────────────────────────────────────
// Feeders are derived from each knockout match's source refs ("Winner of Match N"),
// keyed by match number. The pairing is NON-adjacent (e.g. M73→90, M74→89), so we
// resolve targets by number, never by vertical order. `_koByNum` maps a target
// match number → { feeders:[num,…], finishedByNum }.
let _koByNum = new Map();        // matchNum -> { feeders, finished }
const FEEDER_RE = /Match\s+(\d+)/i;
const parseFeederNum = (src) => {
  const mtc = typeof src === 'string' ? src.match(FEEDER_RE) : null;
  return mtc ? Number(mtc[1]) : null;
};
function buildConnectorModel(ko) {
  const byNum = new Map();
  for (const m of ko) {
    const num = m.match_number || m.id;
    if (num == null) continue;
    const feeders = [parseFeederNum(m.home_team_source), parseFeederNum(m.away_team_source)]
      .filter((n) => n != null);
    byNum.set(num, { num, feeders, finished: isFinished(m) });
  }
  _koByNum = byNum;
}

// Live cadence (knockout): 75s, same budget logic as fixtures/groups.
const POLL_LIVE_MS = 75_000;
let _pollTimer = null;
function shouldPollLive(matches) {
  const now = Date.now();
  for (const m of matches) {
    if (m.status === 'live') return true;
    const ko = m.kickoff_utc ? new Date(m.kickoff_utc).getTime() : 0;
    if (m.status === 'scheduled' && ko && (ko - now) < 15 * 60_000 && (ko - now) > -180 * 60_000) return true;
  }
  return false;
}
function scheduleLivePoll(matches) {
  if (_pollTimer) clearTimeout(_pollTimer);
  _pollTimer = null;
  if (!shouldPollLive(matches)) return;
  _pollTimer = setTimeout(() => {
    if (document.hidden) { scheduleLivePoll(matches); return; }
    bootstrap().catch(() => {});   // re-fetch + re-render the bracket
  }, POLL_LIVE_MS);
}

async function bootstrap() {
  await getTeams48().catch(() => {});
  let matches = [];
  try {
    const r = await api.getMatches();
    const arr = Array.isArray(r) ? r : (r?.data || []);
    matches = Array.isArray(arr) ? arr : [];
  } catch (e) {
    matches = [];
  }
  // Fall back to the complete local schedule if the live API is unavailable/empty,
  // so the bracket always renders the full knockout tree.
  if (!matches.length) {
    try { matches = await getMatchesSample(); } catch {}
  }
  if (!matches.length) {
    document.getElementById('wrap').innerHTML =
      `<div class="loading" style="animation:none;color:var(--danger-text)">Couldn't load matches.</div>`;
    return;
  }

  const ko = matches.filter(m => m.round && m.round !== 'group');

  buildConnectorModel(ko);     // feeders by match number for the SVG overlay
  setLockBanner(ko);
  await renderDesktop(ko);
  await renderMobile(ko);

  // Draw connectors after layout settles (two RAFs: one for the just-appended
  // DOM, one after the browser has laid it out). Resize/redraw is idempotent.
  requestAnimationFrame(() => requestAnimationFrame(drawConnectors));
  observeBracketResize();

  requestAnimationFrame(revealVisible);
  scheduleLivePoll(matches);   // keep knockout scores live while ties are being played
}

function setLockBanner(ko) {
  const lock = document.getElementById('lock');
  const now = new Date();
  const r32First = ko.filter(m => m.round === 'round_of_32')
    .sort((a, b) => new Date(a.kickoff_utc) - new Date(b.kickoff_utc))[0];
  const setIcon = (name) => { document.getElementById('lock-ic').innerHTML = icon(name, { size: 26 }); };

  if (!r32First) {
    lock.classList.remove('open');
    setIcon('clock');
    document.getElementById('lock-h').textContent = 'Bracket data unavailable';
    document.getElementById('lock-sub').textContent = 'The knockout schedule will appear once wc2026api.com publishes it.';
    document.getElementById('lock-days').style.display = 'none';
    return;
  }
  const opens = new Date(r32First.kickoff_utc);
  if (now < opens) {
    const days = Math.ceil((opens - now) / 86_400_000);
    lock.classList.remove('open');
    setIcon('clock');
    document.getElementById('lock-h').textContent = `Bracket opens ${dayLabel(opens)}`;
    document.getElementById('lock-sub').textContent =
      'The knockout draw locks until the group stage ends. Matchups fill in once the final group games finish on Jun 27.';
    document.getElementById('lock-days').style.display = '';
    document.getElementById('lock-days-n').textContent = days;
  } else {
    lock.classList.add('open');
    setIcon('trophy');
    document.getElementById('lock-h').textContent = 'Bracket is live';
    document.getElementById('lock-sub').textContent =
      'Knockout matches in progress. Tap a tie for the full match centre.';
    document.getElementById('lock-days').style.display = 'none';
  }
}

// Status badge built from our reusable .wc-badge component.
function statusBadge(m) {
  if (isLiveMatch(m)) {
    return el('span', { class: 'wc-badge live' }, el('span', { class: 'd' }), m.phase || 'LIVE');
  }
  if (isFinished(m)) {
    return el('span', { class: 'wc-badge ft' }, m.phase === 'FT_PEN' ? 'FT (pens)' : 'Full time');
  }
  return el('span', { class: 'wc-badge ko' }, ROUND_META[m.round]?.short || 'KO');
}

// One team row: real team (flag + code + name + score) or a TBD source slot.
function teamRow(team, sourceText, score, finished, winner) {
  const row = el('div', { class: 'trow' + (team ? '' : ' tbd') + (winner ? ' win' : '') });
  if (team) {
    // data-popup-team lets the delegated handler open the team popup for this
    // slot, taking precedence over the parent match anchor (see popup.js).
    row.setAttribute('data-popup-team', team.fifa_code);
    row.style.cursor = 'pointer';
    const fl = el('span', { class: 'wc-flag flag' });
    const src = flagSrc(team.fifa_code);
    if (src) fl.style.backgroundImage = `url(${src})`;
    fl.style.backgroundSize = 'cover';
    fl.style.backgroundPosition = 'center';
    row.appendChild(fl);
    row.appendChild(el('span', { class: 'code' }, team.fifa_code));
    row.appendChild(el('span', { class: 'nm' }, team.name));
  } else {
    row.appendChild(el('span', { class: 'wc-flag tbd flag', style: 'font-size:11px', 'aria-hidden': 'true' }, '?'));
    row.appendChild(el('span', { class: 'src' }, sourceText || 'TBD'));
  }
  if (finished && score != null) row.appendChild(el('span', { class: 'score' }, String(score)));
  return row;
}

// Winner highlighting once a tie is finished.
function winners(m) {
  if (!isFinished(m) || m.home_score == null || m.away_score == null) return [false, false];
  if (m.home_score > m.away_score) return [true, false];
  if (m.away_score > m.home_score) return [false, true];
  // level after the listed score → penalties decided it; we can't know who
  // advanced from score alone, so leave both unmarked.
  return [false, false];
}

async function buildMatchCard(m, { extraClass = '' } = {}) {
  const home = await resolveTeam(m.home_team);
  const away = await resolveTeam(m.away_team);
  const [hw, aw] = winners(m);
  const cls = ['match', extraClass,
    isLiveMatch(m) ? 'live' : '', isFinished(m) ? 'finished' : '',
    isDecided(m) ? 'decided' : 'pending'].filter(Boolean).join(' ');
  const a = el('a', { class: cls, href: `/wc/game/${m.id}`, 'data-reveal': '',
    'data-match-num': m.match_number || m.id });
  const kickoff = new Date(m.kickoff_utc);
  a.appendChild(el('div', { class: 'h' },
    el('span', { class: 'no' }, `MATCH ${m.match_number || m.id}`),
    el('span', { class: 'badge-slot' }, statusBadge(m)),
  ));
  a.appendChild(teamRow(home, m.home_team_source, m.home_score, isFinished(m), hw));
  a.appendChild(el('div', { class: 'tsep' }));
  a.appendChild(teamRow(away, m.away_team_source, m.away_score, isFinished(m), aw));
  const ven = el('div', { class: 'ven' },
    el('span', { html: icon('clock', { size: 13 }) }),
    el('span', { class: 'when' }, `${dayLabel(kickoff).replace(/^\w+, /, '')} · ${timeLabel(kickoff)}`),
  );
  if (m.stadium) {
    ven.appendChild(el('span', { style: 'margin-left:auto;display:flex;align-items:center;gap:5px;min-width:0' },
      el('span', { html: icon('map-pin', { size: 13 }) }),
      el('span', { style: 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap' }, m.stadium)));
  }
  a.appendChild(ven);
  return a;
}

// ── Desktop column tree ─────────────────────────────────────────────────────
async function renderDesktop(ko) {
  const wrap = document.getElementById('wrap');
  wrap.innerHTML = '';
  const allTBD = ko.every(m => !m.home_team && !m.away_team);
  wrap.classList.toggle('locked', allTBD);

  const bracket = el('div', { class: 'bracket' });
  for (const round of ROUND_ORDER) {
    const colMatches = ko.filter(m => m.round === round)
      .sort((a, b) => (a.match_number || 0) - (b.match_number || 0));
    if (!colMatches.length) continue;
    const meta = ROUND_META[round];
    const col = el('div', { class: 'column' });
    col.appendChild(el('div', { class: 'col-head' },
      el('div', { class: 'lbl' }, meta.label),
      el('div', { class: 'sub' }, `${meta.sub} · ${colMatches.length} match${colMatches.length > 1 ? 'es' : ''}`),
    ));
    const list = el('div', { class: 'col-matches' });
    for (const m of colMatches) {
      // Connectors are drawn by the measured SVG overlay (drawConnectors),
      // keyed off each card's data-match-num + the match's source refs — no
      // per-card connector class is needed anymore.
      list.appendChild(await buildMatchCard(m));
    }
    col.appendChild(list);
    bracket.appendChild(col);
  }

  // Final column (terminal node, distinct gold treatment).
  const final = ko.find(m => m.round === 'final');
  if (final) {
    const fc = el('div', { class: 'final-col' }, await buildFinalCard(final));
    bracket.appendChild(fc);
  }
  wrap.appendChild(bracket);

  // Third-place — a real match card, consistent with the rest of the tree.
  const third = ko.find(m => m.round === 'third_place');
  const thirdRow = document.getElementById('third-row');
  thirdRow.innerHTML = '';
  if (third) {
    const card = await buildMatchCard(third, { extraClass: 'third-card' });
    // Relabel the match-number line with the round name.
    const noEl = card.querySelector('.no');
    if (noEl) noEl.textContent = 'THIRD-PLACE MATCH';
    thirdRow.appendChild(card);
  }
}

// ── Measured SVG connector overlay ───────────────────────────────────────────
const SVG_NS = 'http://www.w3.org/2000/svg';
let _rafConn = 0;

// Schedule a redraw on the next frame (coalesces resize bursts).
function requestDrawConnectors() {
  if (_rafConn) cancelAnimationFrame(_rafConn);
  _rafConn = requestAnimationFrame(() => { _rafConn = 0; drawConnectors(); });
}

// Build/refresh the orthogonal elbow connectors from each feeder card to its
// target card's mid-left. Idempotent: clears and redraws the whole overlay.
function drawConnectors() {
  const wrap = document.getElementById('wrap');
  if (!wrap) return;
  const bracket = wrap.querySelector('.bracket');

  // Suppress in the stacked/round-tab view (≤860px the desktop tree is hidden):
  // no cross-column lines there. Also bail if there's nothing to measure.
  const hidden = !bracket || wrap.offsetParent === null || wrap.clientWidth === 0;
  if (hidden) {
    const old = bracket && bracket.querySelector(':scope > svg.bracket-links');
    if (old) old.remove();
    return;
  }

  // Index every desktop card by its match number (final card included; the
  // third-place card lives outside .bracket and is intentionally excluded).
  const cardByNum = new Map();
  bracket.querySelectorAll('[data-match-num]').forEach((node) => {
    const n = Number(node.getAttribute('data-match-num'));
    if (Number.isFinite(n)) cardByNum.set(n, node);
  });
  if (!cardByNum.size) return;

  // Geometry is measured relative to .bracket's own box so values stay correct
  // regardless of page scroll or the wrap's horizontal scroll position.
  const base = bracket.getBoundingClientRect();
  if (!base.width || !base.height) return;
  const mid = (r) => (r.top + r.bottom) / 2 - base.top;
  const leftOf = (r) => r.left - base.left;
  const rightOf = (r) => r.right - base.left;

  // (Re)create the SVG overlay, sized to the full bracket (incl. overflow).
  let svg = bracket.querySelector(':scope > svg.bracket-links');
  if (!svg) {
    svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('class', 'bracket-links');
    svg.setAttribute('aria-hidden', 'true');
    bracket.insertBefore(svg, bracket.firstChild); // behind the columns
  }
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  const W = bracket.scrollWidth || base.width;
  const H = bracket.scrollHeight || base.height;
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const W_STROKE = 2;
  // For each target card, link both its feeder cards with an orthogonal elbow.
  for (const [num, info] of _koByNum) {
    const target = cardByNum.get(num);
    if (!target || !info || !info.feeders || !info.feeders.length) continue;
    const tRect = target.getBoundingClientRect();
    const tx = leftOf(tRect);          // target mid-left x
    const ty = mid(tRect);             // target mid y

    for (const fnum of info.feeders) {
      const feeder = cardByNum.get(fnum);
      if (!feeder) continue;           // null-safe: feeder not rendered
      const fRect = feeder.getBoundingClientRect();
      const fx = rightOf(fRect);       // feeder mid-right x
      const fy = mid(fRect);           // feeder mid y
      if (tx <= fx) continue;          // skip degenerate/backwards (e.g. same col)

      // An edge is "decided" (solid) once the feeder match has finished and a
      // winner exists to travel along it; otherwise it's "to be played" (dashed),
      // mirroring the legend.
      const decided = !!(_koByNum.get(fnum)?.finished);
      const elbowX = fx + (tx - fx) / 2; // vertical run sits halfway between columns
      const d = `M ${fx.toFixed(1)} ${fy.toFixed(1)} `
              + `H ${elbowX.toFixed(1)} `
              + `V ${ty.toFixed(1)} `
              + `H ${tx.toFixed(1)}`;
      const path = document.createElementNS(SVG_NS, 'path');
      path.setAttribute('d', d);
      path.setAttribute('stroke-width', String(W_STROKE));
      if (decided) {
        path.style.stroke = 'var(--accent)';
      } else {
        path.style.stroke = 'var(--accent-line)';
        path.setAttribute('stroke-dasharray', '5 5');
      }
      svg.appendChild(path);
    }
  }
}

// Recompute connectors on container resize (ResizeObserver) + a debounced
// window resize as a fallback. Set up once; safe to call repeatedly.
let _bracketRO = null;
let _resizeBound = false;
function observeBracketResize() {
  const wrap = document.getElementById('wrap');
  if (wrap && 'ResizeObserver' in window && !_bracketRO) {
    _bracketRO = new ResizeObserver(() => requestDrawConnectors());
    _bracketRO.observe(wrap);
  }
  if (!_resizeBound) {
    let t = 0;
    window.addEventListener('resize', () => {
      clearTimeout(t);
      t = setTimeout(requestDrawConnectors, 120);
    });
    _resizeBound = true;
  }
}

async function buildFinalCard(m) {
  const home = await resolveTeam(m.home_team);
  const away = await resolveTeam(m.away_team);
  const [hw, aw] = winners(m);
  const cls = ['final', isDecided(m) ? 'decided' : 'pending',
    isLiveMatch(m) ? 'live' : '', isFinished(m) ? 'finished' : ''].filter(Boolean).join(' ');
  const a = el('a', { class: cls, href: `/wc/game/${m.id}`, 'data-reveal': '',
    'data-match-num': m.match_number || m.id });
  a.appendChild(el('div', { class: 'crown', html: icon('trophy', { size: 30 }) }));
  a.appendChild(el('div', { class: 'ttl' }, 'The Final'));
  const kickoff = new Date(m.kickoff_utc);
  a.appendChild(el('div', { class: 'meta' },
    `MATCH ${m.match_number || m.id} · ${dayLabel(kickoff).replace(/^\w+, /, '')} ${timeLabel(kickoff)}`));
  const teams = el('div', { class: 'teams' });
  teams.appendChild(teamRow(home, m.home_team_source, m.home_score, isFinished(m), hw));
  teams.appendChild(el('div', { class: 'vs' }, 'VS'));
  teams.appendChild(teamRow(away, m.away_team_source, m.away_score, isFinished(m), aw));
  a.appendChild(teams);
  if (m.stadium) a.appendChild(el('div', { class: 'ven' },
    el('span', { html: icon('map-pin', { size: 13 }) }), m.stadium));
  return a;
}

// ── Mobile: sticky round tabs + scroll-snap panels ──────────────────────────
async function renderMobile(ko) {
  const root = document.getElementById('mbracket');
  root.innerHTML = '';

  const tabRounds = [...ROUND_ORDER, 'final'];
  // Tabs
  const tabs = el('nav', { class: 'mbracket-tabs', role: 'tablist', 'aria-label': 'Knockout rounds' });
  for (let i = 0; i < tabRounds.length; i++) {
    const r = tabRounds[i];
    const meta = ROUND_META[r];
    const count = ko.filter(m => m.round === r).length;
    if (!count) continue;
    const btn = el('button', {
      class: 'mtab', type: 'button', role: 'tab',
      'data-round': r, 'aria-selected': i === 0 ? 'true' : 'false',
      'aria-controls': `mr-${r}`,
    }, meta.short, count > 1 ? el('span', { class: 'n' }, count) : null);
    tabs.appendChild(btn);
  }
  root.appendChild(tabs);

  // Track of panels
  const track = el('div', { class: 'mbracket-track', id: 'mtrack' });
  for (const r of tabRounds) {
    const meta = ROUND_META[r];
    const colMatches = ko.filter(m => m.round === r)
      .sort((a, b) => (a.match_number || 0) - (b.match_number || 0));
    if (!colMatches.length) continue;

    const section = el('section', { class: 'mround', id: `mr-${r}`, role: 'tabpanel', 'aria-label': meta.label });
    section.appendChild(el('div', { class: 'mround-title' },
      meta.label, el('span', { class: 'c' }, `${colMatches.length} match${colMatches.length > 1 ? 'es' : ''}`)));

    if (r === 'final') {
      const third = ko.find(m => m.round === 'third_place');
      section.appendChild(el('div', { class: 'mfinal-banner' },
        el('span', { html: icon('trophy', { size: 22 }) }),
        el('div', {}, el('b', {}, 'The Final'), el('small', {}, meta.sub + ' · the champion is decided here'))));
      for (const m of colMatches) section.appendChild(await buildMobileMatch(m, r));
      // Third-place pinned at the end of the Final panel.
      if (third) {
        const card = await buildMobileMatch(third, 'third_place');
        const noEl = card.querySelector('.no');
        if (noEl) noEl.textContent = 'THIRD-PLACE MATCH';
        section.appendChild(card);
      }
    } else {
      for (const m of colMatches) section.appendChild(await buildMobileMatch(m, r));
    }
    track.appendChild(section);
  }
  root.appendChild(track);

  initMobileSync();
}

// Reuses the desktop match card, then appends a "winner advances to…" line
// that replaces the connector with words (built from the next round's slots).
async function buildMobileMatch(m, round) {
  const card = await buildMatchCard(m);
  const next = NEXT_ROUND[round];
  if (next && ROUND_META[next] && round !== 'third_place') {
    card.appendChild(el('div', { class: 'mmatch-feed' },
      el('span', { html: icon('git-fork', { size: 13 }) }),
      `Winner advances to the ${ROUND_META[next].label}`));
  }
  return card;
}

let _mobileIO = null;
function initMobileSync() {
  const track = document.getElementById('mtrack');
  if (!track) return;
  const tabs = [...document.querySelectorAll('.mtab')];
  const rounds = [...track.querySelectorAll('.mround')];

  // tab click → scroll the matching round into view
  tabs.forEach(tab => tab.addEventListener('click', () => {
    const sec = document.getElementById(`mr-${tab.dataset.round}`);
    if (sec) sec.scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
  }));

  // swipe → highlight the matching tab (IntersectionObserver is the robust
  // cross-browser way to know which round is on screen)
  if (_mobileIO) _mobileIO.disconnect();
  _mobileIO = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting || e.intersectionRatio < 0.6) return;
      const round = e.target.id.replace(/^mr-/, '');
      tabs.forEach(t => {
        const on = t.dataset.round === round;
        t.setAttribute('aria-selected', on ? 'true' : 'false');
        if (on) t.scrollIntoView({ inline: 'center', block: 'nearest' });
      });
    });
  }, { root: track, threshold: [0.6] });
  rounds.forEach(r => _mobileIO.observe(r));
}

bootstrap();
</script>
