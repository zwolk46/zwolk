<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Players · World Cup 26</title>
<link rel="icon" type="image/svg+xml" href="/wc/assets/emblem.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/wc/lib/shell.css" data-wc-shell-css>
<link rel="modulepreload" href="/wc/lib/shell.js">
<style id="shell-css"></style>
<style id="players-css"></style>
<style>
  main{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:18px 26px 120px}
  .hero-spacer{height:172px}
  @media (max-width:720px){ .hero-spacer{height:120px} main{padding:14px 20px 80px} }
</style>
</head>
<body>
<main>
  <div class="hero-spacer"></div>
  <div id="content"></div>
</main>
<script type="module">
import { SHELL_CSS, injectShell } from '/wc/lib/shell.js';
import { playersCss, renderPlayersInto } from '/wc/lib/render-players.js';
import { enablePopupLinks } from '/wc/lib/popup.js';

document.getElementById('shell-css').textContent = SHELL_CSS;
document.getElementById('players-css').textContent = playersCss;
injectShell({ active: 'players', subtitle: 'The Talent' });
enablePopupLinks();

const container = document.getElementById('content');
renderPlayersInto(container).catch(err => {
  container.innerHTML = `<div style="padding:30px;color:#c0444f;font-family:Archivo;font-weight:700">${String(err && err.message || err)}</div>`;
});
</script>
</body>
</html>
