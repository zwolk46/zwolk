// вФАвФАвФА Helpers вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function pad(n) { return String(Math.max(0, n)).padStart(2, '0'); }
function makeId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function hexAlpha(hex, a) {
  if (!hex || !hex.startsWith('#') || (hex.length !== 7 && hex.length !== 4)) return hex;
  let r, g, b;
  if (hex.length === 4) {
    r = parseInt(hex[1]+hex[1],16); g = parseInt(hex[2]+hex[2],16); b = parseInt(hex[3]+hex[3],16);
  } else {
    r = parseInt(hex.slice(1,3),16); g = parseInt(hex.slice(3,5),16); b = parseInt(hex.slice(5,7),16);
  }
  return `rgba(${r},${g},${b},${a})`;
}
function isLightHex(hex) {
  if (!hex || !hex.startsWith('#')) return false;
  let r, g, b;
  if (hex.length === 4) { r=parseInt(hex[1]+hex[1],16); g=parseInt(hex[2]+hex[2],16); b=parseInt(hex[3]+hex[3],16); }
  else { r=parseInt(hex.slice(1,3),16); g=parseInt(hex.slice(3,5),16); b=parseInt(hex.slice(5,7),16); }
  return (r*0.299 + g*0.587 + b*0.114) > 160;
}

// Convert "YYYY-MM-DDTHH:MM" in a timezone to a UTC ISO string
function localToISO(localStr, tz) {
  const [date, time] = localStr.split('T');
  const [y, m, d] = date.split('-').map(Number);
  const [hh, mm] = (time || '00:00').split(':').map(Number);
  const guess = Date.UTC(y, m-1, d, hh, mm, 0);
  try {
    const dtf = new Intl.DateTimeFormat('en-US', {
      timeZone: tz, year:'numeric', month:'2-digit', day:'2-digit',
      hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false,
    });
    const parts = dtf.formatToParts(new Date(guess));
    const map = {};
    for (const p of parts) if (p.type !== 'literal') map[p.type] = p.value;
    const hour = +map.hour === 24 ? 0 : +map.hour;
    const asUTC = Date.UTC(+map.year, +map.month-1, +map.day, hour, +map.minute, +map.second);
    return new Date(guess - (asUTC - guess)).toISOString();
  } catch {
    return new Date(`${localStr}:00`).toISOString();
  }
}

// Normalize old-format countdowns (target: "YYYY-MM-DDTHH:MM") to targetISO
function normalizeCountdown(cd) {
  if (cd.targetISO) return cd;
  return { ...cd, targetISO: localToISO(cd.target || '2030-01-01T00:00', cd.tz || 'UTC') };
}

// Build ISO string from date/time/tz parts (for modal save)
function isoFromParts(date, time, tz) {
  return localToISO(`${date}T${time || '00:00'}`, tz);
}

function formatTarget(targetISO, tz) {
  try {
    return new Date(targetISO).toLocaleString('en-US', {
      timeZone: tz, weekday:'long', month:'long', day:'numeric', year:'numeric',
      hour:'numeric', minute:'2-digit', timeZoneName:'short',
    });
  } catch { return targetISO; }
}

// вФАвФАвФА Tick hook вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function getTimeLeft(targetISO) {
  const diff = Math.max(0, new Date(targetISO).getTime() - Date.now());
  const total = Math.floor(diff / 1000);
  return {
    days: Math.floor(total / 86400),
    hours: Math.floor((total % 86400) / 3600),
    minutes: Math.floor((total % 3600) / 60),
    seconds: total % 60,
    done: diff <= 0,
  };
}
function useTick(targetISO) {
  const [t, setT] = useState(() => getTimeLeft(targetISO));
  useEffect(() => {
    setT(getTimeLeft(targetISO));
    const iv = setInterval(() => setT(getTimeLeft(targetISO)), 1000);
    return () => clearInterval(iv);
  }, [targetISO]);
  return t;
}

function SceneRenderer({ countdown }) {
  const k = countdown.scene || 'horizon';
  switch (k) {
    case 'brief':    return <BriefScene    countdown={countdown}/>;
    case 'halo':     return <HaloScene     countdown={countdown}/>;
    case 'bauhaus':  return <BauhausScene  countdown={countdown}/>;
    case 'inkwell':  return <InkwellScene  countdown={countdown}/>;
    case 'terminal': return <TerminalScene countdown={countdown}/>;
    case 'marquee':  return <MarqueeScene  countdown={countdown}/>;
    case 'folio':    return <FolioScene    countdown={countdown}/>;
    default:         return <HorizonScene  countdown={countdown}/>;
  }
}

function CountdownIcon({ icon, size, circular }) {
  const radius = circular ? '50%' : size*0.22;
  if (icon?.type === 'image' && icon.value) {
    return <img src={icon.value} alt="" style={{ width:size, height:size, borderRadius:radius, objectFit:'cover', display:'block', flexShrink:0 }}/>;
  }
  if (icon?.type === 'emoji' && icon.value) {
    return <div style={{ width:size, height:size, borderRadius:radius, background:'transparent', display:'flex', alignItems:'center', justifyContent:'center', fontSize:size*0.78, flexShrink:0, lineHeight:1 }}>{icon.value}</div>;
  }
  return <div style={{ width:size*0.5, height:size*0.5, borderRadius:'50%', background:'rgba(255,255,255,0.3)', flexShrink:0 }}/>;
}

// вФАвФАвФА Pill list with drag-to-reorder вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function PillList({ countdowns, activeId, onSelect, onReorder, fg, dim, subtle }) {
  const pillRefs   = useRef([]);
  const dragRef    = useRef(null);
  const didDragRef = useRef(false);
  const [drag, setDrag] = useState(null); // { fromIdx, toIdx, deltaX, pillW }

  function getToIdx(clientX) {
    const { origins, fromIdx } = dragRef.current;
    for (let i = 0; i < origins.length; i++) {
      if (i === fromIdx) continue;
      if (clientX < origins[i]) return i;
    }
    return origins.length - 1;
  }

  function handlePointerDown(e, idx) {
    if (e.button !== 0) return;
    e.preventDefault();
    const el = pillRefs.current[idx];
    if (!el) return;
    const pillW   = el.getBoundingClientRect().width;
    const origins = pillRefs.current.map(p => {
      if (!p) return 0;
      const r = p.getBoundingClientRect();
      return r.left + r.width / 2;
    });
    dragRef.current = { fromIdx: idx, startX: e.clientX, pillW, toIdx: idx, origins };
    setDrag({ fromIdx: idx, toIdx: idx, deltaX: 0, pillW });
    didDragRef.current = false;
    el.setPointerCapture(e.pointerId);
  }

  function handlePointerMove(e) {
    const dr = dragRef.current;
    if (!dr) return;
    const deltaX = e.clientX - dr.startX;
    if (Math.abs(deltaX) > 4) didDragRef.current = true;
    const toIdx = getToIdx(e.clientX);
    dr.toIdx = toIdx;
    setDrag({ fromIdx: dr.fromIdx, toIdx, deltaX, pillW: dr.pillW });
  }

  function handlePointerUp() {
    const dr = dragRef.current;
    if (!dr) return;
    if (didDragRef.current && dr.toIdx !== dr.fromIdx) {
      const next = [...countdowns];
      const [item] = next.splice(dr.fromIdx, 1);
      next.splice(dr.toIdx, 0, item);
      onReorder(next);
    }
    dragRef.current = null;
    setDrag(null);
  }

  function getShift(i) {
    if (!drag) return 0;
    const { fromIdx, toIdx, pillW } = drag;
    if (i === fromIdx) return 0;
    if (fromIdx < toIdx && i > fromIdx && i <= toIdx) return -(pillW + 4);
    if (fromIdx > toIdx && i >= toIdx && i < fromIdx) return  (pillW + 4);
    return 0;
  }

  return (
    <div style={{ display:'flex', alignItems:'center', gap:4, maxWidth:'60vw', overflowX:'auto', scrollbarWidth:'none' }}>
      {countdowns.map((c, i) => {
        const isActive   = c.id === activeId;
        const isDragging = drag && drag.fromIdx === i;
        const shift      = getShift(i);
        return (
          <button
            key={c.id}
            ref={el => { pillRefs.current[i] = el; }}
            onPointerDown={e => handlePointerDown(e, i)}
            onPointerMove={handlePointerMove}
            onPointerUp={handlePointerUp}
            onClick={() => { if (!didDragRef.current) onSelect(c.id); }}
            style={{
              background:    isActive ? subtle : 'transparent',
              border:        'none',
              borderRadius:  999,
              padding:       '4px 12px 4px 6px',
              color:         isActive ? fg : dim,
              fontSize:      12,
              fontWeight:    isActive ? 500 : 400,
              cursor:        isDragging ? 'grabbing' : 'grab',
              fontFamily:    'Geist, sans-serif',
              display:       'flex',
              alignItems:    'center',
              gap:           7,
              letterSpacing: '0.01em',
              whiteSpace:    'nowrap',
              flexShrink:    0,
              position:      'relative',
              zIndex:        isDragging ? 10 : 0,
              transform:     isDragging
                ? `translateX(${drag.deltaX}px) scale(1.06)`
                : shift ? `translateX(${shift}px)` : 'none',
              transition:    isDragging
                ? 'box-shadow 0.15s, opacity 0.15s'
                : 'transform 0.2s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.15s',
              opacity:       isDragging ? 0.88 : 1,
              boxShadow:     isDragging ? '0 4px 18px rgba(0,0,0,0.45)' : 'none',
              userSelect:    'none',
              touchAction:   'none',
            }}
          >
            <CountdownIcon icon={c.icon} size={20} circular/>
            {c.title}
          </button>
        );
      })}
    </div>
  );
}

function ColorRow({ label, value, onChange }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:8 }}>
      <input type="color" value={value||'#000000'} onChange={e=>onChange(e.target.value)} style={{ width:32, height:32, border:'none', borderRadius:6, padding:0, background:'transparent', cursor:'pointer' }}/>
      <input type="text" value={value||''} onChange={e=>onChange(e.target.value)} style={{...inputStyle, flex:1, fontFamily:'Geist Mono, monospace', fontSize:12}}/>
      <div style={{ minWidth:80, fontSize:11, color:'rgba(255,255,255,0.5)', letterSpacing:'0.1em', textTransform:'uppercase' }}>{label}</div>
    </div>

}

// вФАвФАвФА Icon picker вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function IconPicker({ icon, onChange }) {
  const fileRef = useRef(null);
  function handleFile(e) {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => onChange({ type:'image', value: reader.result });
    reader.readAsDataURL(file);
  }
  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
        <div style={{ width:46, height:46, borderRadius:'50%', background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)', display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden' }}>
          {icon?.type==='image' ? <img src={icon.value} alt="" style={{ width:'100%', height:'100%', objectFit:'cover' }}/> :
           icon?.type==='emoji' ? <span style={{ fontSize:28, lineHeight:1 }}>{icon.value}</span> :

        <button onClick={() => fileRef.current?.click()} style={{ background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)', color:'#fff', borderRadius:8, padding:'7px 12px', fontSize:12, fontFamily:'Geist, sans-serif', cursor:'pointer' }}>Upload image</button>
        <input ref={fileRef} type="file" accept="image/*" hidden onChange={handleFile}/>
        {icon && <button onClick={() => onChange(null)} style={{ background:'transparent', border:'none', color:'rgba(255,255,255,0.5)', fontSize:11, cursor:'pointer' }}>Clear</button>}
      </div>
      <div style={{ background:'rgba(0,0,0,0.25)', border:'1px solid rgba(255,255,255,0.06)', borderRadius:8, padding:8, display:'grid', gridTemplateColumns:'repeat(12,1fr)', gap:3, maxHeight:200, overflowY:'auto' }}>
        {ICON_LIBRARY.map(em => {
          const selected = icon?.type==='emoji' && icon.value===em;
          return (
            <button key={em} onClick={() => onChange({type:'emoji',value:em})} style={{ background:selected?'rgba(255,255,255,0.18)':'transparent', border:'1px solid transparent', borderRadius:6, padding:0, height:28, fontSize:18, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}
              onMouseEnter={e=>{if(!selected)e.currentTarget.style.background='rgba(255,255,255,0.08)';}}
              onMouseLeave={e=>{if(!selected)e.currentTarget.style.background='transparent';}}

  );
}

// вФАвФАвФА Modal вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function Modal({ mode, countdown, onSave, onCancel }) {
  const userTZ = Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/Chicago';

  function getDefaults() {
    if (countdown) {
      const local = new Date(new Date(countdown.targetISO).toLocaleString('en-US', { timeZone: countdown.tz }));
      return {
        title: countdown.title, tz: countdown.tz, scene: countdown.scene || 'horizon',
        date: `${local.getFullYear()}-${pad(local.getMonth()+1)}-${pad(local.getDate())}`,
        time: `${pad(local.getHours())}:${pad(local.getMinutes())}`,
        icon: countdown.icon || null, palette: countdown.palette || null,
        copy: countdown.copy || null, composition: countdown.composition || 'balanced', atmosphere: countdown.atmosphere || 'dressed',
      };
    }
    const now = new Date();
    return { title:'', date:`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`, time:'12:00', tz:userTZ, scene:'horizon', icon:null, palette:null, copy:null, composition:'balanced', atmosphere:'dressed' };
  }

  const d = getDefaults();
  const [title, setTitle]           = useState(d.title);
  const [date, setDate]             = useState(d.date);
  const [time, setTime]             = useState(d.time);
  const [tz, setTz]                 = useState(d.tz);
  const [scene, setScene]           = useState(d.scene);
  const [icon, setIcon]             = useState(d.icon);
  const [palette, setPalette]       = useState(d.palette);
  const [copy, setCopy]             = useState(d.copy);
  const [composition, setComposition] = useState(d.composition);
  const [atmosphere, setAtmosphere] = useState(d.atmosphere);
  const [tab, setTab]               = useState('basics');
  const [error, setError]           = useState('');

  const sceneObj       = SCENES[scene] || SCENES.horizon;
  const defPalette     = sceneObj.palette;
  const defCopy        = sceneObj.copy;
  const effPalette     = { ...defPalette, ...(palette || {}) };
  const effCopy        = { ...defCopy, ...(copy || {}) };

  function setColor(key, val) { setPalette(prev => ({ ...(prev||{}), [key]:val })); }
  function setCopyField(key, val) { setCopy(prev => ({ ...(prev||{}), [key]:val })); }

  function handleSave() {
    if (!title.trim()) { setError('Please enter a title.'); setTab('basics'); return; }
    if (!date) { setError('Please enter a date.'); setTab('basics'); return; }
    const targetISO = isoFromParts(date, time || '00:00', tz);
    if (!targetISO || isNaN(new Date(targetISO))) { setError('Invalid date/time.'); setTab('basics'); return; }
    onSave({ title: title.trim(), targetISO, tz, scene, icon, palette: palette && Object.keys(palette).length ? palette : null, copy: copy && Object.keys(copy).length ? copy : null, composition, atmosphere });
  }

  useEffect(() => {
    function onKey(e) { if (e.key === 'Escape') onCancel(); }
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, []);

  const TABS = [
    { id:'basics', label:'Basics' }, { id:'scene', label:'Scene' },
    { id:'colors', label:'Colors' }, { id:'copy',  label:'Copy'  },
    { id:'feel',   label:'Feel'  },
  ];

  return (
    <div style={{ position:'fixed', inset:0, zIndex:200, background:'rgba(8,8,12,0.7)', backdropFilter:'blur(20px)', display:'flex', alignItems:'center', justifyContent:'center', padding:24 }}
      onClick={e => { if (e.target===e.currentTarget) onCancel(); }}>
      <div style={{ background:'#15151b', border:'1px solid rgba(255,255,255,0.08)', borderRadius:18, width:'min(960px,100%)', maxHeight:'92vh', display:'grid', gridTemplateColumns:'200px 1fr', boxShadow:'0 32px 80px rgba(0,0,0,0.6)', fontFamily:'Geist, sans-serif', overflow:'hidden' }}>
        {/* Sidebar */}
        <div style={{ padding:'24px 0', borderRight:'1px solid rgba(255,255,255,0.06)', background:'rgba(255,255,255,0.015)', display:'flex', flexDirection:'column' }}>
          <div style={{ padding:'0 22px 16px' }}>
            <div style={{ fontSize:10, fontWeight:500, letterSpacing:'0.22em', textTransform:'uppercase', color:'rgba(255,255,255,0.4)', marginBottom:4 }}>{mode==='create'?'New':'Edit'}</div>
            <div style={{ fontSize:18, fontWeight:500, color:'#fff' }}>Countdown</div>
          </div>
          <nav style={{ display:'flex', flexDirection:'column', gap:1, padding:'4px 12px' }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{ background:tab===t.id?'rgba(255,255,255,0.08)':'transparent', border:'none', textAlign:'left', padding:'8px 10px', borderRadius:7, color:tab===t.id?'#fff':'rgba(255,255,255,0.55)', fontSize:13, fontFamily:'Geist, sans-serif', cursor:'pointer', fontWeight:tab===t.id?500:400 }}>{t.label}</button>
            ))}
          </nav>
          <div style={{ flex:1 }}></div>
          <div style={{ padding:'12px 16px', borderTop:'1px solid rgba(255,255,255,0.06)', display:'flex', gap:6 }}>
            <button onClick={onCancel} style={{...btnSecondary, flex:1, padding:'8px 0'}}>Cancel</button>
            <button onClick={handleSave} style={{...btnPrimary, flex:1.4, padding:'8px 0'}}>{mode==='create'?'Create':'Save'}</button>
          </div>
        </div>

        {/* Body */}
        <div style={{ padding:'28px 32px', overflowY:'auto', maxHeight:'92vh' }}>
          {error && <div style={{ fontSize:12, color:'#ff8888', marginBottom:14, padding:'8px 10px', background:'rgba(255,80,80,0.08)', borderRadius:6 }}>{error}</div>}

          {tab==='basics' && (
            <div>
              <SectionHeader title="Basics" subtitle="Name, date, and icon for this countdown."/>
              <ModalField label="Title">
                <input autoFocus value={title} onChange={e=>setTitle(e.target.value)} placeholder="Vacation, Wedding, LaunchвА¶" style={inputStyle}
                  onKeyDown={e=>{if(e.key==='Enter')handleSave();}}/>
              </ModalField>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                <ModalField label="Date"><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={inputStyle}/></ModalField>
                <ModalField label="Time"><input type="time" value={time} onChange={e=>setTime(e.target.value)} style={inputStyle}/></ModalField>
              </div>
              <ModalField label="Timezone">
                <select value={tz} onChange={e=>setTz(e.target.value)} style={{...inputStyle,cursor:'pointer'}}>
                  {TIMEZONES.map(z => <option key={z} value={z}>{z}</option>)}
                </select>
              </ModalField>
              <ModalField label="Icon">
                <IconPicker icon={icon} onChange={setIcon}/>
              </ModalField>
            </div>
          )}

          {tab==='scene' && (
            <div>
              <SectionHeader title="Scene" subtitle="Pick a visual treatment. Each has its own typographic system and atmosphere."/>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
                {SCENE_KEYS.map(k => {
                  const s = SCENES[k];
                  const selected = scene===k;
                  const sp = s.palette;
                  return (
                    <button key={k} onClick={()=>setScene(k)} style={{ background:'transparent', border:selected?'1.5px solid #fff':'1.5px solid rgba(255,255,255,0.1)', borderRadius:10, padding:10, cursor:'pointer', textAlign:'left' }}>
                      <div style={{ height:72, borderRadius:6, background:sp.bg, position:'relative', overflow:'hidden', border:'1px solid rgba(255,255,255,0.08)', marginBottom:10 }}>
                        <div style={{ position:'absolute', left:10, bottom:8, width:22, height:22, borderRadius:4, background:sp.c1 }}></div>
                        {sp.c2 && <div style={{ position:'absolute', left:36, bottom:8, width:22, height:22, borderRadius:4, background:sp.c2 }}></div>}
                        {sp.c3 && <div style={{ position:'absolute', left:62, bottom:8, width:22, height:22, borderRadius:4, background:sp.c3 }}></div>}
                      </div>
                      <div style={{ fontSize:13, fontWeight:500, color:'#fff', marginBottom:2 }}>{s.label}</div>
                      <div style={{ fontSize:11, color:'rgba(255,255,255,0.55)', lineHeight:1.4 }}>{s.blurb}</div>
                      <div style={{ fontSize:10, color:'rgba(255,255,255,0.35)', marginTop:6, letterSpacing:'0.1em', textTransform:'uppercase' }}>For {s.suits.toLowerCase()}</div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {tab==='colors' && (
            <div>
              <SectionHeader title="Colors" subtitle={`Customize the palette for the ${sceneObj.label} scene, or pick a preset.`}/>
              <div style={{ marginBottom:18 }}>
                <div style={{ fontSize:10, fontWeight:500, letterSpacing:'0.18em', textTransform:'uppercase', color:'rgba(255,255,255,0.45)', marginBottom:8 }}>Presets</div>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:6 }}>
                  {(PRESETS[scene]||[]).map(pr => (
                    <button key={pr.name} onClick={()=>setPalette(pr.palette)} style={{ display:'flex', alignItems:'center', gap:8, background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:7, padding:'6px 10px', cursor:'pointer', textAlign:'left', color:'#fff', fontSize:12, fontFamily:'Geist, sans-serif' }}>
                      <span style={{ display:'flex', gap:3 }}>
                        <span style={{ width:14, height:14, borderRadius:3, background:pr.palette.bg, border:'1px solid rgba(255,255,255,0.12)', display:'inline-block' }}></span>
                        <span style={{ width:14, height:14, borderRadius:3, background:pr.palette.c1, display:'inline-block' }}></span>
                        {pr.palette.c2 && <span style={{ width:14, height:14, borderRadius:3, background:pr.palette.c2, display:'inline-block' }}></span>}
                        {pr.palette.c3 && <span style={{ width:14, height:14, borderRadius:3, background:pr.palette.c3, display:'inline-block' }}></span>}
                      </span>
                      {pr.name}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:10, fontWeight:500, letterSpacing:'0.18em', textTransform:'uppercase', color:'rgba(255,255,255,0.45)', marginBottom:8 }}>Custom</div>
                <ColorRow label="Background" value={effPalette.bg}  onChange={v=>setColor('bg',v)}/>
                <ColorRow label="Ink"        value={effPalette.ink} onChange={v=>setColor('ink',v)}/>
                <ColorRow label="Primary"    value={effPalette.c1}  onChange={v=>setColor('c1',v)}/>
                {scene==='bauhaus' && <ColorRow label="Secondary" value={effPalette.c2||'#f5c92b'} onChange={v=>setColor('c2',v)}/>}
                {scene==='bauhaus' && <ColorRow label="Tertiary"  value={effPalette.c3||'#1a3da8'} onChange={v=>setColor('c3',v)}/>}
              </div>
              <button onClick={()=>setPalette(null)} style={{ background:'transparent', border:'1px solid rgba(255,255,255,0.12)', borderRadius:7, padding:'6px 12px', color:'rgba(255,255,255,0.6)', fontSize:11, cursor:'pointer' }}>вЖЇ Reset to scene defaults</button>
            </div>
          )}

          {tab==='copy' && (
            <div>
              <SectionHeader title="Copy" subtitle="Edit the surrounding text for this countdown."/>
              <ModalField label="Prefix (above the title)">
                <input value={effCopy.prefix||''} onChange={e=>setCopyField('prefix',e.target.value)} placeholder={defCopy.prefix} style={inputStyle}/>
                <Hint>Default: "{defCopy.prefix}"</Hint>
              </ModalField>
              <ModalField label="Day label">
                <input value={effCopy.dayLabel||''} onChange={e=>setCopyField('dayLabel',e.target.value)} placeholder={defCopy.dayLabel} style={inputStyle}/>
                <Hint>Default: "{defCopy.dayLabel}"</Hint>
              </ModalField>
              <button onClick={()=>setCopy(null)} style={{ background:'transparent', border:'1px solid rgba(255,255,255,0.12)', borderRadius:7, padding:'6px 12px', color:'rgba(255,255,255,0.6)', fontSize:11, cursor:'pointer', marginTop:8 }}>вЖЇ Reset copy to defaults</button>
            </div>
          )}

          {tab==='feel' && (
            <div>
              <SectionHeader title="Feel" subtitle="How loud or theatrical should this scene feel?"/>
              <ModalField label="Composition">
                <Segmented value={composition} onChange={setComposition} options={[{v:'quiet',label:'Quiet'},{v:'balanced',label:'Balanced'},{v:'loud',label:'Loud'}]}/>
                <Hint>Scales the size of the big number.</Hint>
              </ModalField>
              <ModalField label="Atmosphere">
                <Segmented value={atmosphere} onChange={setAtmosphere} options={[{v:'bare',label:'Bare'},{v:'dressed',label:'Dressed'},{v:'theatrical',label:'Theatrical'}]}/>
                <Hint>Intensity of background effects (glows, scanlines, blocks).</Hint>
              </ModalField>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// вФАвФАвФА App вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
function App() {
  const [countdowns, setCountdowns] = useState([]);
  const [activeId, setActiveId]     = useState(() => localStorage.getItem(ACTIVE_KEY));
  const [modal, setModal]           = useState(null);
  const [loading, setLoading]       = useState(true);
  const saveSeqRef                  = useRef(0);

  useEffect(() => {
    apiLoad()
      .then(list => { setCountdowns(list.map(normalizeCountdown)); })
      .catch(err => { console.error('Load failed', err); })
      .finally(() => setLoading(false));
  }, []);

  useEffect(() => { localStorage.setItem(ACTIVE_KEY, activeId || ''); }, [activeId]);

  const active = countdowns.find(c => c.id === activeId) || countdowns[0] || null;

  useEffect(() => {
    if (!loading && !activeId && countdowns.length > 0) setActiveId(countdowns[0].id);
  }, [loading, countdowns]);

  const sceneObj = active ? (SCENES[active.scene] || SCENES.horizon) : null;
  const effPal   = active ? resolvePalette(active) : null;
  const isLight  = !!(sceneObj?.light && effPal && isLightHex(effPal.bg));

  async function save(list) {
    const seq = ++saveSeqRef.current;
    try {
      const res = await fetch(API_URL, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ countdowns: list }),
      });
      if (!res.ok) {
        let detail = `HTTP ${res.status}`;
        try { detail += ': ' + (await res.json()).error; } catch {}
        throw new Error(detail);
      }
      const data = await res.json();
      if (seq === saveSeqRef.current && Array.isArray(data.countdowns)) {
        setCountdowns(data.countdowns.map(normalizeCountdown));
      }
    } catch (e) {
      console.error('Save failed', e);
      alert(`Save failed вАФ ${e.message}`);
    }
  }

  function handleCreate(fields) {
    const c = { id: makeId(), ...fields };
    const next = [...countdowns, c];
    setCountdowns(next);
    setActiveId(c.id);
    save(next);
    setModal(null);
  }

  function handleEdit(fields) {
    const next = countdowns.map(c => c.id === modal.countdown.id ? { ...c, ...fields } : c);
    setCountdowns(next);
    save(next);
    setModal(null);
  }

  function handleReorder(next) {
    setCountdowns(next);
    save(next);
  }

  function handleDelete() {
    if (!active) return;
    if (!confirm(`Delete "${active.title}"?`)) return;
    const next = countdowns.filter(c => c.id !== active.id);
    setCountdowns(next);
    setActiveId(next[0]?.id || null);
    save(next);
  }

  if (loading) {
    return (
      <div style={{ position:'fixed', inset:0, background:'#0d0d10', display:'flex', alignItems:'center', justifyContent:'center' }}>
        <div style={{ width:48, height:48, border:'2px solid rgba(255,255,255,0.1)', borderTop:'2px solid rgba(255,255,255,0.6)', borderRadius:'50%', animation:'spin 0.9s linear infinite' }}></div>
        <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      </div>
    );
  }

  return (
    <div style={{ position:'fixed', inset:0, overflow:'hidden' }}>
      {active ? <SceneRenderer key={active.id} countdown={active}/> : <EmptyState onNew={() => setModal({ mode:'create' })}/>}
      <Header countdowns={countdowns} activeId={active?.id} onSelect={id => setActiveId(id)} onNew={() => setModal({ mode:'create' })} onReorder={handleReorder} isLight={isLight}/>
      {active && <ActionBar onEdit={() => setModal({ mode:'edit', countdown: active })} onDelete={handleDelete} isLight={isLight}/>}
      {modal && <Modal mode={modal.mode} countdown={modal.countdown} onSave={modal.mode==='create' ? handleCreate : handleEdit} onCancel={() => setModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
