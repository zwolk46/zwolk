<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniConvert</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
<meta name="description" content="Convert images, documents, and data files — no account needed.">
<!-- Optional: point to a deployed full OmniConvert server for 50+ formats.
     Leave empty / remove to use the Vercel serverless API on this origin. -->
<meta name="omniconvert-server" content="https://zwolk-production.up.railway.app">
<meta property="og:type" content="website">
<meta property="og:site_name" content="zwolk">
<meta property="og:title" content="OmniConvert">
<meta property="og:description" content="Convert images, documents, and data files — no account needed.">
<meta property="og:url" content="https://zwolk.com/omniconvert">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/omniconvert/styles.css">
</head>
<body>
<div class="page">

  <nav class="nav">
    <a href="/" class="back-link">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      zwolk
    </a>
  </nav>

  <header class="header">
    <h1 class="title">OmniConvert</h1>
    <p class="subtitle">Convert images, documents, and data files — no account needed.</p>
  </header>

  <div class="card">
    <input id="file-input" type="file" style="display:none" aria-label="Choose a file to convert">

    <!-- Drop zone (idle) -->
    <div id="zone" class="zone" role="button" tabindex="0" aria-label="File upload area — click or drop a file here">
      <div class="zone-body">
        <div class="zone-icon-wrap">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <p class="zone-primary">Drop a file here</p>
        <p class="zone-secondary">or click to browse</p>
      </div>
    </div>

    <!-- File info row (after selection) -->
    <div id="file-row" class="file-row" hidden>
      <div id="file-badge" class="file-badge" aria-hidden="true">
        <span id="badge-ext" class="badge-ext"></span>
      </div>
      <div class="file-info">
        <p id="file-name" class="file-name"></p>
        <p id="file-meta" class="file-meta"></p>
      </div>
      <button id="clear-btn" class="clear-btn" title="Remove file" aria-label="Remove file">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div id="divider" class="divider" hidden></div>

    <!-- Conversion controls -->
    <div id="controls" class="controls" hidden>
      <div class="controls-row">
        <div class="field">
          <label class="field-label" for="format-select">Convert to</label>
          <div class="select-wrap">
            <select id="format-select" class="select"></select>
            <svg class="select-caret" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
        <button id="convert-btn" class="convert-btn" disabled>
          <span id="btn-label">Convert</span>
          <svg id="btn-arrow" class="btn-arrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>
    </div>

    <!-- No conversion available -->
    <div id="no-conv" class="no-conv" hidden>
      <svg class="no-conv-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div>
        <p id="no-conv-msg" class="no-conv-msg"></p>
      </div>
    </div>

    <!-- Status -->
    <p id="status" class="status" role="status" aria-live="polite"></p>
  </div>


  <!-- Available conversions -->
  <section class="section">
    <div class="section-head">
      <h2 class="section-title">Available conversions</h2>
      <p class="section-sub">Powered by professional conversion tools — no install, no account required.</p>
    </div>
    <div id="conv-grid" class="conv-grid">
      <p class="caps-loading">Loading…</p>
    </div>
  </section>


</div>
<script type="module" src="/omniconvert/app.js?v=6"></script>
</body>
</html>
