<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniConvert</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="stylesheet" href="/omniconvert/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>OmniConvert</h1>
        <p class="sub">
          Serverless file conversion on zwolk.com (supported conversions are shown below). For broader local conversion
          with external tools, see the full project in <code>/omniconvert</code>.
        </p>
      </header>

      <section class="card">
        <div id="drop" class="drop">
          <div class="drop-inner">
            <div class="drop-title">Drop a file here</div>
            <div class="drop-sub">or choose a file</div>
            <input id="file" type="file" />
          </div>
        </div>

        <div class="row">
          <label class="label">
            Target format
            <select id="to"></select>
          </label>
        </div>

        <div class="row">
          <button id="convert" class="btn" disabled>Convert</button>
          <div id="status" class="status"></div>
        </div>

        <details class="details">
          <summary>Capabilities</summary>
          <pre id="caps" class="pre"></pre>
        </details>
      </section>
    </main>

    <script type="module" src="/omniconvert/app.js"></script>
  </body>
</html>
