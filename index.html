<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zwolk</title>
  <meta name="description" content="A small collection of web apps by zwolk.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0e0e10;
      color: #f2f2f2;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #f2f2f2;
    }
    .apps {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 320px;
    }
    .apps a {
      display: block;
      padding: 0.85rem 1.25rem;
      background: #17171a;
      border: 1px solid #2a2a30;
      border-radius: 10px;
      color: #f2f2f2;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      transition: border-color 0.15s, background 0.15s;
    }
    .apps a:hover {
      border-color: #7aa2f7;
      background: #1a1a1f;
    }
    footer {
      font-size: 0.8rem;
      color: #8a8a92;
    }
  </style>
</head>
<body>
  <h1>zwolk</h1>

  <nav class="apps">
    <a href="/countdowns">Countdowns</a>
    <a href="/wage">Wage Counter</a>
  </nav>

  <footer>&copy; <span id="yr"></span> zwolk</footer>

  <script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
</body>
</html>
