<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wage Timer</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/favicon.png">
<meta name="description" content="Watch your earnings tick up in real time. Enter your hourly wage and see every cent land as you work." />
<meta name="theme-color" content="#0b0d11" />

<!-- Open Graph / iMessage / Facebook / LinkedIn / Slack -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Wage Timer" />
<meta property="og:title" content="Wage Timer — watch your earnings tick up live" />
<meta property="og:description" content="Enter your hourly wage and see every cent land as you work." />
<meta property="og:url" content="https://zwolk.com/wage/" />
<meta property="og:image" content="https://zwolk.com/social/wage.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="A dark earnings dashboard with a rising chart, coin ring, and time tracker." />

<!-- Twitter / X -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Wage Timer — watch your earnings tick up live" />
<meta name="twitter:description" content="Enter your hourly wage and see every cent land as you work." />
<meta name="twitter:image" content="https://zwolk.com/social/wage.png" />

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(ellipse at center, #1a1d24 0%, #0b0d11 100%);
    color: #f5f7fa;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  .view {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    opacity: 0;
    transform: translateY(20px);
    pointer-events: none;
    transition: opacity 500ms ease, transform 500ms ease;
  }

  .view.active {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  /* ---------- Input view ---------- */
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    max-width: 480px;
    width: 100%;
  }

  h1 {
    font-size: clamp(1.5rem, 4vw, 2.25rem);
    font-weight: 500;
    text-align: center;
    letter-spacing: -0.02em;
    color: #e7ecf3;
  }

  .input-wrap {
    position: relative;
    width: 100%;
    max-width: 320px;
  }

  .input-wrap::before {
    content: "$";
    position: absolute;
    left: 1.25rem;
    top: 50%;
    transform: translateY(-50%);
    color: #7a828f;
    font-size: 1.5rem;
    pointer-events: none;
  }

  #wage-input {
    width: 100%;
    padding: 1rem 1rem 1rem 2.5rem;
    font-size: 1.5rem;
    font-family: inherit;
    color: #f5f7fa;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    outline: none;
    transition: border-color 200ms ease, background 200ms ease;
    font-variant-numeric: tabular-nums;
  }

  #wage-input:focus {
    border-color: #4c8bf5;
    background: rgba(255, 255, 255, 0.08);
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  /* ---------- Advanced section (toggle + panel wrapped so flex gap is correct) ---------- */
  .advanced-group {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.5rem 0.25rem;
    cursor: pointer;
    user-select: none;
    color: #9aa2b1;
    font-size: 0.95rem;
    transition: color 200ms ease;
  }

  .toggle-row:hover { color: #e7ecf3; }

  .toggle-switch {
    position: relative;
    width: 40px;
    height: 22px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px;
    transition: background 250ms ease, border-color 250ms ease;
    flex-shrink: 0;
  }

  .toggle-switch::after {
    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #9aa2b1;
    transition: transform 280ms cubic-bezier(0.4, 0.0, 0.2, 1), background 250ms ease;
  }

  .toggle-row.on .toggle-switch {
    background: rgba(76, 139, 245, 0.4);
    border-color: rgba(76, 139, 245, 0.6);
  }

  .toggle-row.on .toggle-switch::after {
    transform: translateX(18px);
    background: #f5f7fa;
  }

  .toggle-label { flex: 1; }

  .advanced-panel {
    display: grid;
    grid-template-rows: 0fr;
    opacity: 0;
    transition: grid-template-rows 400ms cubic-bezier(0.4, 0.0, 0.2, 1),
                opacity 300ms ease;
  }

  .advanced-panel.open {
    grid-template-rows: 1fr;
    opacity: 1;
  }

  .advanced-inner {
    overflow: hidden;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding-top: 0.75rem;
  }

  .field-label {
    font-size: 0.8rem;
    color: #7a828f;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding-left: 0.25rem;
  }

  #start-time-input {
    width: 100%;
    padding: 0.9rem 1rem;
    font-size: 1.15rem;
    font-family: inherit;
    color: #f5f7fa;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    outline: none;
    transition: border-color 200ms ease, background 200ms ease;
    font-variant-numeric: tabular-nums;
    color-scheme: dark;
  }

  #start-time-input:focus {
    border-color: #4c8bf5;
    background: rgba(255, 255, 255, 0.08);
  }

  .hint {
    font-size: 0.8rem;
    color: #5a6271;
    padding-left: 0.25rem;
    min-height: 1em;
  }

  .sub {
    color: #7a828f;
    font-size: 0.95rem;
    text-align: center;
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
    -webkit-tap-highlight-color: transparent;
    transition: transform 120ms ease, background 200ms ease, opacity 200ms ease,
                color 200ms ease, border-color 200ms ease;
  }

  button:active { transform: scale(0.97); }

  #start-btn {
    padding: 0.9rem 3rem;
    font-size: 1.05rem;
    font-weight: 500;
    color: #0b0d11;
    background: #f5f7fa;
    border-radius: 999px;
    letter-spacing: 0.01em;
    margin-top: 0.25rem;
  }

  #start-btn:hover { background: #ffffff; }
  #start-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ---------- Timer view ---------- */
  .money {
    font-size: clamp(4rem, 18vw, 12rem);
    font-weight: 300;
    letter-spacing: -0.04em;
    font-variant-numeric: tabular-nums;
    color: #6ee7a1;
    text-shadow: 0 0 60px rgba(110, 231, 161, 0.15);
    line-height: 1;
    transition: opacity 300ms ease, color 300ms ease, text-shadow 300ms ease;
  }

  .timer-view.paused .money {
    color: #9aa2b1;
    text-shadow: none;
  }

  .elapsed {
    margin-top: 1.5rem;
    font-size: clamp(1.25rem, 3.5vw, 2rem);
    font-weight: 400;
    letter-spacing: 0.08em;
    font-variant-numeric: tabular-nums;
    color: #9aa2b1;
  }

  /* Projections row */
  .projections {
    margin-top: 2.25rem;
    display: flex;
    gap: clamp(1rem, 4vw, 2.5rem);
    justify-content: center;
    flex-wrap: wrap;
    padding: 0 1rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 500ms ease 200ms, transform 500ms ease 200ms;
  }

  .timer-view.active .projections {
    opacity: 1;
    transform: translateY(0);
  }

  .proj {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
    min-width: 70px;
  }

  .proj-label {
    font-size: 0.7rem;
    color: #5a6271;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .proj-value {
    font-size: clamp(0.95rem, 2.2vw, 1.1rem);
    color: #c6ccd6;
    font-weight: 400;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.01em;
  }

  .rate-label {
    margin-top: 2rem;
    font-size: 0.8rem;
    color: #5a6271;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-align: center;
  }

  .timer-actions {
    margin-top: 1.5rem;
    display: flex;
    gap: 0.75rem;
    align-items: center;
  }

  .ghost-btn {
    padding: 0.6rem 1.5rem;
    font-size: 0.9rem;
    color: #9aa2b1;
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }

  .ghost-btn:hover {
    color: #f5f7fa;
    border-color: rgba(255, 255, 255, 0.3);
  }

  .ghost-btn svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  .timer-view.paused #pause-btn {
    color: #6ee7a1;
    border-color: rgba(110, 231, 161, 0.35);
  }

  /* Reduce motion for users who prefer it */
  @media (prefers-reduced-motion: reduce) {
    * {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  @media (max-width: 640px) {
    .view { padding: 1.25rem; }
    .card { gap: 1.15rem; }
    h1 { font-size: 1.55rem; line-height: 1.2; }
    #wage-input { font-size: 1.35rem; min-height: 52px; }
    #start-btn, .ghost-btn, .toggle-row { min-height: 48px; }
    .money {
      font-size: clamp(3.1rem, 15vw, 5.2rem);
      letter-spacing: 0;
      max-width: 100%;
      overflow-wrap: anywhere;
      text-align: center;
    }
    .elapsed { font-size: 1.15rem; letter-spacing: 0.04em; }
    .projections { gap: 0.85rem; margin-top: 1.6rem; }
    .proj { min-width: 86px; }
    .timer-actions { width: 100%; justify-content: center; }
    .ghost-btn { flex: 1; justify-content: center; max-width: 150px; padding: 0.7rem 1rem; }
  }
</style>
</head>
<body>

  <section id="input-view" class="view active">
    <div class="card">
      <h1>What's your hourly wage?</h1>

      <div class="input-wrap">
        <input
          id="wage-input"
          type="number"
          step="0.01"
          min="0"
          placeholder="0.00"
          inputmode="decimal"
          autocomplete="off"
        />
      </div>

      <div class="advanced-group">
        <div class="toggle-row" id="advanced-toggle" role="button" tabindex="0" aria-pressed="false">
          <div class="toggle-switch"></div>
          <div class="toggle-label">I started earlier today</div>
        </div>

        <div class="advanced-panel" id="advanced-panel">
          <div class="advanced-inner">
            <div class="field-label">Start time</div>
            <input
              id="start-time-input"
              type="time"
              step="60"
              autocomplete="off"
            />
            <div class="hint" id="start-time-hint"></div>
          </div>
        </div>
      </div>

      <button id="start-btn" disabled>Start</button>
      <p class="sub">Watch your earnings tick up in real time.</p>
    </div>
  </section>

  <section id="timer-view" class="view timer-view">
    <div class="money" id="money-display">$0.00</div>
    <div class="elapsed" id="elapsed-display">00:00:00</div>

    <div class="projections" id="projections">
      <div class="proj">
        <div class="proj-label">per min</div>
        <div class="proj-value" id="proj-min">$0.00</div>
      </div>
      <div class="proj">
        <div class="proj-label">per 8h day</div>
        <div class="proj-value" id="proj-day">$0.00</div>
      </div>
      <div class="proj">
        <div class="proj-label">per year</div>
        <div class="proj-value" id="proj-year">$0.00</div>
      </div>
    </div>

    <div class="rate-label" id="rate-label"></div>

    <div class="timer-actions">
      <button id="pause-btn" class="ghost-btn" aria-label="Pause or resume">
        <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <rect x="6" y="5" width="4" height="14" rx="1"/>
          <rect x="14" y="5" width="4" height="14" rx="1"/>
        </svg>
        <span id="pause-label">Pause</span>
      </button>
      <button id="back-btn" class="ghost-btn" aria-label="Reset">Reset</button>
    </div>
  </section>

<script>
  const inputView = document.getElementById('input-view');
  const timerView = document.getElementById('timer-view');
  const wageInput = document.getElementById('wage-input');
  const startBtn = document.getElementById('start-btn');
  const backBtn = document.getElementById('back-btn');
  const pauseBtn = document.getElementById('pause-btn');
  const pauseIcon = document.getElementById('pause-icon');
  const pauseLabel = document.getElementById('pause-label');
  const moneyDisplay = document.getElementById('money-display');
  const elapsedDisplay = document.getElementById('elapsed-display');
  const rateLabel = document.getElementById('rate-label');
  const advancedToggle = document.getElementById('advanced-toggle');
  const advancedPanel = document.getElementById('advanced-panel');
  const startTimeInput = document.getElementById('start-time-input');
  const startTimeHint = document.getElementById('start-time-hint');
  const projMin = document.getElementById('proj-min');
  const projDay = document.getElementById('proj-day');
  const projYear = document.getElementById('proj-year');

  const WAGE_API = '/api/wage-settings';
  const BASE_TITLE = 'Wage Timer';

  const ICON_PAUSE = '<rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/>';
  const ICON_PLAY  = '<path d="M7 5.5v13a1 1 0 0 0 1.5.87l11-6.5a1 1 0 0 0 0-1.73l-11-6.5A1 1 0 0 0 7 5.5z"/>';

  let rafId = null;
  let titleIntervalId = null;  // setInterval fallback so tab title keeps updating when tab is hidden (rAF is paused)
  let workStartEpoch = 0;      // wall-clock ms when work started (effective)
  let wagePerMs = 0;
  let hourlyWage = 0;
  let paused = false;
  let frozenElapsedMs = 0;     // elapsed at moment of pause
  let lastTitleSec = -1;

  // ---------- Persistence ----------
  async function loadWage() {
    const res = await fetch(WAGE_API);
    if (!res.ok) throw new Error(`Backend load failed: ${res.status}`);
    const data = await res.json();
    return typeof data.hourlyWage === 'number' ? data.hourlyWage : null;
  }

  async function saveWage(v) {
    const res = await fetch(WAGE_API, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ hourlyWage: v }),
    });
    if (!res.ok) throw new Error(`Backend save failed: ${res.status}`);
  }

  loadWage()
    .then((saved) => {
      if (saved && saved > 0 && !wageInput.value) wageInput.value = String(saved);
      validate();
    })
    .catch(() => validate());

  // ---------- Helpers ----------
  function formatMoney(n) {
    // Compact grouping for large numbers (>= $1,000 use thousands separator).
    const abs = Math.abs(n);
    if (abs >= 1000) {
      return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    return '$' + n.toFixed(2);
  }

  function advancedOn() {
    return advancedToggle.classList.contains('on');
  }

  function parseStartTime() {
    const v = startTimeInput.value;
    if (!v) return null;
    const [hh, mm] = v.split(':').map(Number);
    if (!Number.isFinite(hh) || !Number.isFinite(mm)) return null;

    const now = new Date();
    const candidate = new Date(now);
    candidate.setHours(hh, mm, 0, 0);

    // If the entered time is in the future, interpret as yesterday.
    if (candidate.getTime() > now.getTime()) {
      candidate.setDate(candidate.getDate() - 1);
    }

    const priorMs = now.getTime() - candidate.getTime();
    const label = candidate.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    return { epoch: candidate.getTime(), priorMs, label };
  }

  function formatAgo(ms) {
    const totalSec = Math.floor(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    if (h > 0) return `${h}h ${m}m ago`;
    if (m > 0) return `${m}m ago`;
    return `just now`;
  }

  function formatTime(ms) {
    const totalSec = Math.floor(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    return (
      String(h).padStart(2, '0') + ':' +
      String(m).padStart(2, '0') + ':' +
      String(s).padStart(2, '0')
    );
  }

  // ---------- Validation ----------
  function validate() {
    const v = parseFloat(wageInput.value);
    const wageOk = v > 0 && isFinite(v);

    let timeOk = true;
    if (advancedOn()) {
      const parsed = parseStartTime();
      if (!parsed) {
        timeOk = false;
        startTimeHint.textContent = '';
      } else {
        startTimeHint.textContent = `Started ${parsed.label} — ${formatAgo(parsed.priorMs)}`;
      }
    } else {
      startTimeHint.textContent = '';
    }

    startBtn.disabled = !(wageOk && timeOk);
  }

  wageInput.addEventListener('input', validate);
  wageInput.addEventListener('focus', () => {
    if (wageInput.value) wageInput.select();
  });
  wageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !startBtn.disabled) start();
  });

  startTimeInput.addEventListener('input', validate);
  startTimeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !startBtn.disabled) start();
  });

  advancedToggle.addEventListener('click', toggleAdvanced);
  advancedToggle.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleAdvanced();
    }
  });

  function toggleAdvanced() {
    const on = !advancedOn();
    advancedToggle.classList.toggle('on', on);
    advancedToggle.setAttribute('aria-pressed', String(on));
    advancedPanel.classList.toggle('open', on);

    if (on) {
      if (!startTimeInput.value) {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        startTimeInput.value = `${hh}:${mm}`;
      }
      setTimeout(() => startTimeInput.focus(), 250);
    }
    validate();
  }

  startBtn.addEventListener('click', start);
  backBtn.addEventListener('click', reset);
  pauseBtn.addEventListener('click', togglePause);

  // Global keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (!timerView.classList.contains('active')) return;
    if (e.key === 'Escape') { e.preventDefault(); reset(); }
    else if (e.key === ' ')  { e.preventDefault(); togglePause(); }
  });

  // ---------- Start / Pause / Reset ----------
  function start() {
    hourlyWage = parseFloat(wageInput.value);
    if (!(hourlyWage > 0)) return;
    saveWage(hourlyWage).catch((err) => console.error('Could not persist wage preference', err));

    wagePerMs = hourlyWage / 3600000;

    let priorLabel = '';
    if (advancedOn()) {
      const parsed = parseStartTime();
      if (!parsed) return;
      workStartEpoch = parsed.epoch;
      priorLabel = ` · since ${parsed.label}`;
    } else {
      workStartEpoch = Date.now();
    }

    rateLabel.textContent = `at $${hourlyWage.toFixed(2)} / hour${priorLabel}`;
    updateProjections();

    paused = false;
    frozenElapsedMs = 0;
    updatePauseUI();
    timerView.classList.remove('paused');

    inputView.classList.remove('active');
    timerView.classList.add('active');

    renderFrame();
    startLoops();
  }

  function startLoops() {
    if (rafId === null) rafId = requestAnimationFrame(tick);
    if (titleIntervalId === null) {
      titleIntervalId = setInterval(() => {
        // Browsers throttle setInterval to ~1s when tab is hidden,
        // which is exactly the cadence we want for the title update.
        if (!paused) renderFrame();
      }, 500);
    }
  }

  function stopLoops() {
    if (rafId !== null) {
      cancelAnimationFrame(rafId);
      rafId = null;
    }
    if (titleIntervalId !== null) {
      clearInterval(titleIntervalId);
      titleIntervalId = null;
    }
  }

  function togglePause() {
    if (paused) {
      // Resume: shift start epoch so (now - startEpoch) equals frozenElapsedMs.
      workStartEpoch = Date.now() - frozenElapsedMs;
      paused = false;
      timerView.classList.remove('paused');
      updatePauseUI();
      startLoops();
    } else {
      // Pause: freeze elapsed, stop loops so display holds steady.
      frozenElapsedMs = Math.max(0, Date.now() - workStartEpoch);
      paused = true;
      timerView.classList.add('paused');
      updatePauseUI();
      stopLoops();
      renderFrame(true);
    }
  }

  function updatePauseUI() {
    if (paused) {
      pauseIcon.innerHTML = ICON_PLAY;
      pauseLabel.textContent = 'Resume';
      pauseBtn.setAttribute('aria-label', 'Resume');
    } else {
      pauseIcon.innerHTML = ICON_PAUSE;
      pauseLabel.textContent = 'Pause';
      pauseBtn.setAttribute('aria-label', 'Pause');
    }
  }

  function updateProjections() {
    const perMin = hourlyWage / 60;
    const perDay = hourlyWage * 8;
    const perYear = hourlyWage * 40 * 52;
    projMin.textContent  = formatMoney(perMin);
    projDay.textContent  = formatMoney(perDay);
    projYear.textContent = formatMoney(perYear);
  }

  function renderFrame(isPausedSnapshot = false) {
    const elapsedMs = isPausedSnapshot || paused
      ? frozenElapsedMs
      : Math.max(0, Date.now() - workStartEpoch);
    const earned = wagePerMs * elapsedMs;
    moneyDisplay.textContent = formatMoney(earned);
    elapsedDisplay.textContent = formatTime(elapsedMs);

    // Throttle title updates to once per second (only when active).
    const sec = Math.floor(elapsedMs / 1000);
    if (sec !== lastTitleSec) {
      lastTitleSec = sec;
      document.title = `${formatMoney(earned)} · ${BASE_TITLE}`;
    }
  }

  function tick() {
    renderFrame();
