<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zach's Countdowns</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/favicon.png" />
<meta property="og:title" content="Zach's Countdowns" />
<meta property="og:description" content="A collection of countdowns." />
<meta property="og:image" content="https://countdowns.zwolk.com/og.png" />
<meta property="og:url" content="https://countdowns.zwolk.com" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #6366f1;
    --accent2: #8b5cf6;
    --text: #f8fafc;
    --muted: rgba(248, 250, 252, 0.65);
    --pill-bg: rgba(255, 255, 255, 0.08);
    --pill-border: rgba(255, 255, 255, 0.14);
  }
  html, body {
    height: 100%;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-feature-settings: "cv11", "ss01";
    color: var(--text);
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #312e81 70%, #4c1d95 100%);
    background-size: 400% 400%;
    animation: gradientShift 22s ease infinite;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  button { font-family: inherit; }

  /* Loader */
  #loader {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000;
    z-index: 100;
    transition: opacity 0.6s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent));
    animation: spin 1.1s linear infinite;
    position: relative;
  }
  .spinner::after {
    content: ""; position: absolute; inset: 9px;
    background: #000; border-radius: 50%;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* App shell */
  #app {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  #app.visible { opacity: 1; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.75rem 2rem 0.5rem;
    gap: 1rem;
  }
  .brand {
    font-family: "Space Grotesk", "Inter", sans-serif;
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #fff;
  }
  .brand .accent {
    background: linear-gradient(135deg, #a5b4fc, #c4b5fd);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Tabs */
  .tabs-row {
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    min-width: 0;
  }
  .tabs-scroll {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 0.25rem 0;
    scrollbar-width: none;
  }
  .tabs-scroll::-webkit-scrollbar { display: none; }

  .tab {
    display: inline-flex;
    align-items: center;
    padding: 0.55rem 1.15rem;
    background: var(--pill-bg);
    border: 1px solid var(--pill-border);
    border-radius: 999px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.92rem;
    font-weight: 500;
    letter-spacing: -0.005em;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s ease, transform 0.2s ease, color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    backdrop-filter: blur(10px);
  }
  .tab:hover { background: rgba(255,255,255,0.14); }
  .tab.active {
    background: #ffffff;
    color: #0f172a;
    border-color: transparent;
    box-shadow: 0 6px 24px rgba(0,0,0,0.25);
  }

  .add-btn {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.55rem 1.15rem;
    background-color: var(--accent);
    background-image: linear-gradient(135deg, #818cf8 0%, #a78bfa 100%);
    color: white;
    border: none;
    border-radius: 999px;
    font-family: inherit;
    font-size: 0.92rem;
    font-weight: 600;
    letter-spacing: -0.005em;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    box-shadow: 0 6px 20px rgba(129, 140, 248, 0.35);
  }
  .add-btn:hover { transform: translateY(-1px); filter: brightness(1.08); box-shadow: 0 8px 26px rgba(129, 140, 248, 0.5); }
  .add-btn:active { transform: translateY(0); }
  .add-btn .plus { font-size: 1.1rem; line-height: 1; font-weight: 400; }

  /* Main */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 2rem 3rem;
  }

  /* Countdown view */
  .countdown-view {
    width: 100%;
    max-width: 1300px;
    text-align: center;
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .countdown-title {
    font-family: "Space Grotesk", "Inter", sans-serif;
    font-size: clamp(1.3rem, 3vw, 2rem);
    font-weight: 600;
    letter-spacing: -0.01em;
    opacity: 0.95;
    margin-bottom: 2rem;
  }

  .countdown {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: clamp(1rem, 4vw, 4rem);
  }
  .days, .time { display: flex; flex-direction: column; align-items: center; }
  .days .num {
    font-family: "Inter", sans-serif;
    font-size: clamp(8rem, 26vw, 22rem);
    font-weight: 800;
    line-height: 0.9;
    color: #ffffff;
    text-shadow: 0 10px 40px rgba(0,0,0,0.35);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.04em;
  }
  .days .label {
    font-size: clamp(1.3rem, 3.5vw, 2.5rem);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-top: 0.5rem;
    font-weight: 500;
    opacity: 0.92;
  }
  .time .num {
    font-family: "Inter", sans-serif;
    font-size: clamp(2.6rem, 9vw, 7rem);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    text-shadow: 0 4px 20px rgba(0,0,0,0.35);
  }
  .time .label {
    font-size: clamp(0.85rem, 2vw, 1.2rem);
    text-transform: uppercase;
    letter-spacing: 0.25em;
    margin-top: 0.5rem;
    font-weight: 500;
    opacity: 0.85;
  }
  .countdown-sub {
    margin-top: 2.5rem;
    font-size: 0.95rem;
    opacity: 0.7;
    letter-spacing: 0.05em;
  }
  .countdown-actions {
    margin-top: 1.5rem;
    display: flex;
    justify-content: center;
    gap: 0.6rem;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.5rem 1rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    color: var(--muted);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .chip:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.22); color: var(--text); }
  .chip.danger:hover { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.5); color: #fecaca; }
  .chip svg { width: 14px; height: 14px; }

  .tab { touch-action: none; user-select: none; }
  .tab.dragging { opacity: 0.4; }
  .tab.drag-over { box-shadow: inset 3px 0 0 var(--accent2); }

  /* Mobile dropdown selector (hidden on desktop) */
  .mobile-select { display: none; position: relative; flex: 1 1 auto; min-width: 0; }
  .mobile-select-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.6rem;
    padding: 0.65rem 1.1rem;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 999px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.98rem;
    font-weight: 600;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: background 0.2s ease;
  }
  .mobile-select-btn:hover { background: rgba(255,255,255,0.14); }
  .mobile-select-btn .chevron {
    transition: transform 0.25s ease;
    flex-shrink: 0;
    opacity: 0.8;
  }
  .mobile-select.open .mobile-select-btn .chevron { transform: rotate(180deg); }
  .mobile-select-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mobile-menu {
    position: absolute;
    top: calc(100% + 0.5rem);
    left: 0; right: 0;
    background: rgba(30, 27, 75, 0.96);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 16px;
    padding: 0.4rem;
    z-index: 20;
    backdrop-filter: blur(20px);
    box-shadow: 0 14px 40px rgba(0,0,0,0.45);
    max-height: 60vh;
    overflow-y: auto;
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .mobile-select.open .mobile-menu {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .mobile-menu-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    width: 100%;
    padding: 0.75rem 0.9rem;
    background: transparent;
    border: none;
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.98rem;
    font-weight: 500;
    text-align: left;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .mobile-menu-item:hover, .mobile-menu-item.active { background: rgba(255,255,255,0.1); }
  .mobile-menu-item .check {
    width: 16px; height: 16px; flex-shrink: 0; opacity: 0;
  }
  .mobile-menu-item.active .check { opacity: 1; color: var(--accent2); }
  .mobile-menu-reorder {
    display: flex; gap: 0.25rem; margin-left: auto; flex-shrink: 0;
  }
  .mobile-menu-reorder button {
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .mobile-menu-reorder button:hover:not(:disabled) { background: rgba(255,255,255,0.16); }
  .mobile-menu-reorder button:disabled { opacity: 0.3; cursor: default; }
  .mobile-menu-reorder svg { width: 14px; height: 14px; }

  /* Empty */
  .empty { text-align: center; opacity: 0.85; max-width: 420px; }
  .empty .clock-art {
    width: 72px; height: 72px;
    margin: 0 auto 1.25rem;
    opacity: 0.6;
  }
  .empty h2 {
    font-family: "Space Grotesk", sans-serif;
    font-size: clamp(1.5rem, 3vw, 2rem);
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 0.6rem;
  }
  .empty p { opacity: 0.7; margin-bottom: 1.5rem; font-size: 0.95rem; }

  /* Form */
  .form-view {
    width: 100%;
    max-width: 520px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 2.5rem;
    backdrop-filter: blur(20px);
    animation: fadeUp 0.4s ease;
  }
  .form-view h2 {
    font-family: "Space Grotesk", sans-serif;
    font-size: 1.7rem;
    font-weight: 600;
    letter-spacing: -0.015em;
    margin-bottom: 0.4rem;
  }
  .form-view .sub { opacity: 0.7; margin-bottom: 1.8rem; font-size: 0.95rem; }

  .field { margin-bottom: 1.2rem; }
  .field label {
    display: block;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    opacity: 0.75;
    margin-bottom: 0.5rem;
    font-weight: 600;
  }
  .field { min-width: 0; }
  .field input, .field select {
    width: 100%;
    max-width: 100%;
    min-width: 0;
    padding: 0.85rem 1rem;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    transition: all 0.2s ease;
    color-scheme: dark;
    -webkit-appearance: none;
    appearance: none;
  }
  .field input[type="date"], .field input[type="time"] {
    -webkit-appearance: none;
    appearance: none;
    display: block;
  }
  .field input:focus, .field select:focus {
    outline: none;
    border-color: var(--accent);
    background: rgba(0,0,0,0.35);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.22);
  }
  .field select option { background: #1e293b; color: var(--text); }
  .row { display: flex; gap: 0.8rem; }
  .row .field { flex: 1; }

  .actions { display: flex; gap: 0.8rem; margin-top: 1.8rem; }
  .btn {
    flex: 1;
    padding: 0.9rem 1.4rem;
    border-radius: 999px;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: -0.005em;
    cursor: pointer;
    border: none;
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease, background 0.2s ease;
  }
  .btn-primary {
    background-image: linear-gradient(135deg, #818cf8 0%, #a78bfa 100%);
    color: white;
    box-shadow: 0 6px 20px rgba(129, 140, 248, 0.35);
  }
  .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.08); box-shadow: 0 8px 26px rgba(129, 140, 248, 0.5); }
  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.14);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.14); }

  @media (max-width: 700px) {
    header { padding: 1.1rem 1rem 0.5rem; }
    .tabs-row { padding: 0.75rem 1rem; }
    main { padding: 0.5rem 1rem 1rem; }
    .form-view { padding: 1.6rem; }
    .row { flex-direction: column; gap: 0; }

    .tabs-scroll { display: none; }
    .mobile-select { display: block; }
    .add-btn .label-full { display: none; }
    .add-btn { padding: 0.6rem 0.85rem; gap: 0; }
    .add-btn .plus { font-size: 1.35rem; }

    .countdown-title {
      font-size: clamp(1.8rem, 6vw, 2.4rem);
      margin-bottom: 1.5rem;
    }
    .days .num { font-size: clamp(11rem, 40vw, 18rem); }
    .days .label { font-size: clamp(1.6rem, 5vw, 2rem); }
    .time .num { font-size: clamp(3.6rem, 13vw, 6rem); }
    .time .label { font-size: clamp(0.95rem, 3vw, 1.2rem); }
    .countdown-sub { font-size: 1rem; margin-top: 1.75rem; }
  }
</style>
</head>
<body>
  <div id="loader"><div class="spinner"></div></div>

  <div id="app">
    <header>
      <div class="brand">Zach's <span class="accent">Countdowns</span></div>
    </header>

    <div class="tabs-row">
      <div class="tabs-scroll" id="tabs"></div>
      <div class="mobile-select" id="mobile-select">
        <button class="mobile-select-btn" id="mobile-select-btn" aria-haspopup="listbox" aria-expanded="false">
          <span class="mobile-select-label" id="mobile-select-label">Select countdown</span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div class="mobile-menu" id="mobile-menu" role="listbox"></div>
      </div>
      <button class="add-btn" id="add-btn" title="New countdown"><span class="plus">+</span><span class="label-full">New Countdown</span></button>
    </div>

    <main id="main"></main>
  </div>

<script>
(function () {
  const ACTIVE_KEY = "zachs_countdowns_active_v1";
  const API_URL = "/api/countdowns";

  async function apiLoad() {
    const res = await fetch(API_URL, { cache: "no-store" });
    if (!res.ok) throw new Error(`GET ${API_URL} failed: ${res.status}`);
    const data = await res.json();
    return Array.isArray(data.countdowns) ? data.countdowns : [];
  }

  let saveSeq = 0;
  async function save(list) {
    const mySeq = ++saveSeq;
    try {
      const res = await fetch(API_URL, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ countdowns: list }),
      });
      if (!res.ok) throw new Error(`PUT ${API_URL} failed: ${res.status}`);
      const data = await res.json();
      if (mySeq === saveSeq && Array.isArray(data.countdowns)) {
        state.countdowns = data.countdowns;
      }
    } catch (e) {
      console.error("Failed to save countdowns", e);
      alert("Couldn't save to the server. Your change may not persist.");
    }
  }
  function saveActive(id) { localStorage.setItem(ACTIVE_KEY, id || ""); }

  // Convert "YYYY-MM-DDTHH:mm" interpreted in tz to a UTC ms timestamp.
  function zonedToUTC(isoLocal, tz) {
    const [datePart, timePart] = isoLocal.split("T");
    const [y, m, d] = datePart.split("-").map(Number);
    const [hh, mm] = timePart.split(":").map(Number);
    const guess = Date.UTC(y, m - 1, d, hh, mm, 0);
    const offset = tzOffsetMinutes(guess, tz);
    return guess - offset * 60000;
  }
  function tzOffsetMinutes(utcMs, tz) {
    const dtf = new Intl.DateTimeFormat("en-US", {
      timeZone: tz,
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit",
      hour12: false
    });
    const parts = dtf.formatToParts(new Date(utcMs));
    const map = {};
    for (const p of parts) if (p.type !== "literal") map[p.type] = p.value;
    const hour = +map.hour === 24 ? 0 : +map.hour;
    const asUTC = Date.UTC(+map.year, +map.month - 1, +map.day, hour, +map.minute, +map.second);
    return (asUTC - utcMs) / 60000;
  }

  const TIMEZONES = (typeof Intl.supportedValuesOf === "function")
    ? Intl.supportedValuesOf("timeZone")
    : [
        "America/New_York","America/Chicago","America/Denver","America/Los_Angeles",
        "America/Anchorage","Pacific/Honolulu","America/Phoenix",
        "UTC","Europe/London","Europe/Paris","Europe/Berlin","Europe/Madrid",
        "Asia/Tokyo","Asia/Shanghai","Asia/Singapore","Asia/Kolkata","Asia/Dubai",
        "Australia/Sydney","America/Bogota","America/Mexico_City","America/Sao_Paulo"
      ];

  const state = {
    countdowns: [],
    activeId: localStorage.getItem(ACTIVE_KEY) || null,
    mode: "view",
    _tickInterval: null
  };

  const tabsEl = document.getElementById("tabs");
  const mainEl = document.getElementById("main");
  const mobileSelect = document.getElementById("mobile-select");
  const mobileLabel = document.getElementById("mobile-select-label");
  const mobileMenu = document.getElementById("mobile-menu");
  const mobileBtn = document.getElementById("mobile-select-btn");

  function pad(n) { return String(n).padStart(2, "0"); }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    })[c]);
  }
  function getActive() { return state.countdowns.find(c => c.id === state.activeId); }

  function renderTabs() {
    tabsEl.innerHTML = "";
    state.countdowns.forEach((c, idx) => {
      const btn = document.createElement("button");
      btn.className = "tab" + (state.mode === "view" && c.id === state.activeId ? " active" : "");
      btn.textContent = c.title;
      btn.draggable = true;
      btn.dataset.id = c.id;
      btn.addEventListener("click", () => {
        state.mode = "view";
        state.activeId = c.id;
        state.editId = null;
        saveActive(c.id);
        render();
      });
      btn.addEventListener("dragstart", (e) => {
        state._dragId = c.id;
        btn.classList.add("dragging");
        e.dataTransfer.effectAllowed = "move";
        try { e.dataTransfer.setData("text/plain", c.id); } catch (_) {}
      });
      btn.addEventListener("dragend", () => {
        btn.classList.remove("dragging");
        document.querySelectorAll(".tab.drag-over").forEach(el => el.classList.remove("drag-over"));
        state._dragId = null;
      });
      btn.addEventListener("dragover", (e) => {
        if (!state._dragId || state._dragId === c.id) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        btn.classList.add("drag-over");
      });
      btn.addEventListener("dragleave", () => btn.classList.remove("drag-over"));
      btn.addEventListener("drop", (e) => {
        e.preventDefault();
        btn.classList.remove("drag-over");
        const fromId = state._dragId;
        if (!fromId || fromId === c.id) return;
        const from = state.countdowns.findIndex(x => x.id === fromId);
        const to = state.countdowns.findIndex(x => x.id === c.id);
        if (from < 0 || to < 0) return;
        const [moved] = state.countdowns.splice(from, 1);
        state.countdowns.splice(to, 0, moved);
        save(state.countdowns);
        render();
      });
      tabsEl.appendChild(btn);
    });
  }

  function removeCountdown(id) {
    const c = state.countdowns.find(x => x.id === id);
    if (!c) return;
    if (!confirm(`Delete countdown "${c.title}"?`)) return;
    state.countdowns = state.countdowns.filter(x => x.id !== id);
    save(state.countdowns);
    if (state.activeId === id) {
      state.activeId = state.countdowns[0] ? state.countdowns[0].id : null;
      saveActive(state.activeId);
    }
    render();
  }

  function renderMain() {
    clearInterval(state._tickInterval);
    mainEl.innerHTML = "";
    if (state.mode === "new" || state.mode === "edit") return renderForm();
    const c = getActive();
    if (!c) return renderEmpty();

    const wrap = document.createElement("div");
    wrap.className = "countdown-view";
    wrap.innerHTML = `
      <div class="countdown-title">${escapeHtml(c.title)}</div>
      <div class="countdown">
        <div class="days">
          <div class="num" id="days">--</div>
          <div class="label">Days</div>
        </div>
        <div class="time">
          <div class="num" id="time">--:--:--</div>
          <div class="label">Hours : Minutes : Seconds</div>
        </div>
      </div>
      <div class="countdown-sub" id="sub"></div>
      <div class="countdown-actions">
        <button class="chip" id="edit-btn" title="Edit this countdown">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path></svg>
          Edit countdown
        </button>
        <button class="chip danger" id="delete-btn" title="Delete this countdown">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path></svg>
          Delete countdown
        </button>
      </div>
    `;
    mainEl.appendChild(wrap);

    document.getElementById("delete-btn").addEventListener("click", () => removeCountdown(c.id));
    document.getElementById("edit-btn").addEventListener("click", () => {
      state.mode = "edit";
      state.editId = c.id;
      render();
    });

    const targetMs = zonedToUTC(c.target, c.tz);
    const daysEl = document.getElementById("days");
    const timeEl = document.getElementById("time");
    const subEl = document.getElementById("sub");

    const prettyDate = new Date(targetMs).toLocaleString("en-US", {
      timeZone: c.tz,
      weekday: "long", year: "numeric", month: "long", day: "numeric",
      hour: "numeric", minute: "2-digit"
    });
    subEl.textContent = `Until ${prettyDate} (${c.tz.replace(/_/g, " ")})`;

    function tick() {
      let diff = Math.max(0, targetMs - Date.now());
      const days = Math.floor(diff / 86400000); diff -= days * 86400000;
      const hours = Math.floor(diff / 3600000); diff -= hours * 3600000;
      const mins = Math.floor(diff / 60000); diff -= mins * 60000;
      const secs = Math.floor(diff / 1000);
      daysEl.textContent = days;
      timeEl.textContent = `${pad(hours)}:${pad(mins)}:${pad(secs)}`;
      const label = days === 1 ? "day" : "days";
      document.title = `${days} ${label} — ${c.title}`;
    }
    tick();
    state._tickInterval = setInterval(tick, 1000);
  }

  function renderEmpty() {
    document.title = "Zach's Countdowns";
    const div = document.createElement("div");
    div.className = "empty";
    div.innerHTML = `
      <svg class="clock-art" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"></circle><path d="M12 9v4l2.5 2"></path><path d="M9 2h6"></path><path d="M12 2v2"></path></svg>
      <h2>No countdowns yet</h2>
      <p>Tap "New Countdown" in the top right to add your first one.</p>
    `;
    mainEl.appendChild(div);
  }

  function renderForm() {
    const isEdit = state.mode === "edit";
    const editing = isEdit ? state.countdowns.find(x => x.id === state.editId) : null;
    document.title = (isEdit ? "Edit Countdown" : "New Countdown") + " — Zach's Countdowns";
    const guessTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const preTitle = editing ? editing.title : "";
    const preDate = editing ? editing.target.split("T")[0] : "";
    const preTime = editing ? editing.target.split("T")[1] : "00:00";
    const preTz = editing ? editing.tz : guessTz;

    const form = document.createElement("div");
    form.className = "form-view";
    form.innerHTML = `
      <h2>${isEdit ? "Edit Countdown" : "New Countdown"}</h2>
      <div class="sub">${isEdit ? "Update the details below." : "Enter a title and the exact moment you're counting down to."}</div>
      <form id="cd-form" novalidate>
        <div class="field">
          <label for="f-title">Title</label>
          <input id="f-title" type="text" required placeholder="e.g. Vacation, Wedding, Launch" maxlength="60" autocomplete="off" value="${escapeHtml(preTitle)}" />
        </div>
        <div class="row">
          <div class="field">
            <label for="f-date">Date</label>
            <input id="f-date" type="date" required value="${preDate}" />
          </div>
          <div class="field">
            <label for="f-time">Time</label>
            <input id="f-time" type="time" required value="${preTime}" />
          </div>
        </div>
        <div class="field">
          <label for="f-tz">Time Zone</label>
          <select id="f-tz" required></select>
        </div>
        <div class="actions">
          <button type="button" class="btn btn-secondary" id="f-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">${isEdit ? "Save Changes" : "Create Countdown"}</button>
        </div>
      </form>
    `;
    mainEl.appendChild(form);

    const tzSel = document.getElementById("f-tz");
    for (const z of TIMEZONES) {
      const opt = document.createElement("option");
      opt.value = z;
      opt.textContent = z.replace(/_/g, " ");
      if (z === preTz) opt.selected = true;
      tzSel.appendChild(opt);
    }

    setTimeout(() => document.getElementById("f-title").focus(), 50);

    document.getElementById("f-cancel").addEventListener("click", () => {
      state.mode = "view";
      state.editId = null;
      render();
    });

    document.getElementById("cd-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const title = document.getElementById("f-title").value.trim() || "Countdown";
      const date = document.getElementById("f-date").value;
      const time = document.getElementById("f-time").value;
      const tz = tzSel.value;
      if (!date || !time) return;
      if (isEdit && editing) {
        editing.title = title;
        editing.target = `${date}T${time}`;
        editing.tz = tz;
        save(state.countdowns);
        state.activeId = editing.id;
        saveActive(editing.id);
      } else {
        const id = "cd-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 6);
        const cd = { id, title, target: `${date}T${time}`, tz };
        state.countdowns.push(cd);
        save(state.countdowns);
        state.activeId = id;
        saveActive(id);
      }
      state.mode = "view";
      state.editId = null;
      render();
    });

    document.addEventListener("keydown", escHandler);
  }

  function escHandler(e) {
    if (e.key === "Escape" && (state.mode === "new" || state.mode === "edit")) {
      document.removeEventListener("keydown", escHandler);
      state.mode = "view";
      state.editId = null;
      render();
    }
  }

  function renderMobileSelect() {
    const active = getActive();
    mobileLabel.textContent = active ? active.title : "No countdowns";
    mobileMenu.innerHTML = "";
    state.countdowns.forEach((c, idx) => {
      const row = document.createElement("div");
      row.style.display = "flex";
      row.style.alignItems = "center";

      const item = document.createElement("button");
      item.className = "mobile-menu-item" + (c.id === state.activeId && state.mode === "view" ? " active" : "");
      item.setAttribute("role", "option");
      item.innerHTML = `
        <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(c.title)}</span>
      `;
      item.addEventListener("click", () => {
        state.mode = "view";
        state.activeId = c.id;
        state.editId = null;
        saveActive(c.id);
        closeMobileMenu();
        render();
      });

      const reorder = document.createElement("div");
      reorder.className = "mobile-menu-reorder";
      const upBtn = document.createElement("button");
      upBtn.title = "Move up";
      upBtn.disabled = idx === 0;
      upBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>`;
      upBtn.addEventListener("click", (e) => { e.stopPropagation(); moveCountdown(c.id, -1); });
      const downBtn = document.createElement("button");
      downBtn.title = "Move down";
      downBtn.disabled = idx === state.countdowns.length - 1;
      downBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
      downBtn.addEventListener("click", (e) => { e.stopPropagation(); moveCountdown(c.id, 1); });
      reorder.appendChild(upBtn);
      reorder.appendChild(downBtn);

      item.appendChild(reorder);
      mobileMenu.appendChild(item);
    });
  }
  function moveCountdown(id, delta) {
    const i = state.countdowns.findIndex(x => x.id === id);
    const j = i + delta;
    if (i < 0 || j < 0 || j >= state.countdowns.length) return;
    const [m] = state.countdowns.splice(i, 1);
    state.countdowns.splice(j, 0, m);
    save(state.countdowns);
    renderMobileSelect();
    renderTabs();
  }
  function openMobileMenu() { mobileSelect.classList.add("open"); mobileBtn.setAttribute("aria-expanded", "true"); }
  function closeMobileMenu() { mobileSelect.classList.remove("open"); mobileBtn.setAttribute("aria-expanded", "false"); }
  mobileBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    if (mobileSelect.classList.contains("open")) closeMobileMenu(); else openMobileMenu();
  });
  document.addEventListener("click", (e) => {
    if (!mobileSelect.contains(e.target)) closeMobileMenu();
  });

  function render() { renderTabs(); renderMobileSelect(); renderMain(); }

  document.getElementById("add-btn").addEventListener("click", () => { state.mode = "new"; render(); });

  async function boot() {
    try {
      state.countdowns = await apiLoad();
    } catch (e) {
      console.error("Failed to load countdowns", e);
      state.countdowns = [];
    }
    if (!state.activeId || !state.countdowns.find(c => c.id === state.activeId)) {
      state.activeId = state.countdowns[0] ? state.countdowns[0].id : null;
    }
    render();
    document.getElementById("loader").classList.add("hidden");
    document.getElementById("app").classList.add("visible");
  }
  window.addEventListener("load", boot);
})();
</script>
</body>
</html>
